# ArgoCD Applications for the Vymalo store — MedusaJS v2 replatform.
#
# Two OCI charts (ghcr.io/vymalo/charts): `vymalo-backend` (Medusa server+worker
# + the separate admin SPA image at /app + Redis + CNPG + migrate PreSync hook →
# api.vymalo.com) and `vymalo-storefront` (Next standalone → shop.vymalo.com).
#
# The BACKEND chart is role-aware (`role`: externalsecrets | cnpg | knative |
# all) and is deployed as THREE wave-ordered Applications so the failure domains
# sync independently AND — critically — so the `medusa db:migrate` PreSync hook
# (knative role, wave 2) runs only AFTER the env Secret (externalsecrets, wave 0)
# and the CNPG `-app` Secret (cnpg, wave 1) exist. A single role:all app would
# run the PreSync hook before CNPG/ESO and deadlock. All three pin
# `helm.releaseName: vymalo-backend` so the fullname (→ vymalo-backend-cnpg-app,
# etc.) is identical across them.
#
# Image Updater annotations (server `app` + admin SPA `admin`) live ONLY on the
# knative app, which owns the deployments. The storefront is a separate chart
# with no CNPG/migrate, so it's a single app (wave 3).
#
# vymalo/vymalo-shop is PRIVATE: chart pull uses the repo cred
# (argocd-charts-oci-repo.externalsecret.yaml here); $values clone + Image
# Updater git write-back use github-app-creds--vymalo (App 2926172).
# ─────────────────────────────────────────────────────────────────────────
# 1. vymalo-backend-externalsecrets — SecretStore + env/ghcr ExternalSecrets
# ─────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vymalo-backend-externalsecrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - repoURL: ghcr.io/vymalo/charts
      chart: vymalo-backend
      targetRevision: 0.1.*
      helm:
        releaseName: vymalo-backend
        parameters:
          - name: role
            value: externalsecrets
          # This slice renders only the ESO resources — disable the app-template
          # workload so it isn't also created here (the `app` slice owns it).
          - name: app-template.workload.enabled
            value: "false"
        valueFiles:
          - $values/deploy/envs/production/vymalo-backend.values.yaml
        ignoreMissingValueFiles: true
    - repoURL: https://github.com/vymalo/vymalo-shop.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: vymalo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 10
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
---
# ─────────────────────────────────────────────────────────────────────────
# 2. vymalo-backend-cnpg — CloudNativePG Cluster + barman S3 backup
# ─────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vymalo-backend-cnpg
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: ghcr.io/vymalo/charts
      chart: vymalo-backend
      targetRevision: 0.1.*
      helm:
        releaseName: vymalo-backend
        parameters:
          - name: role
            value: cnpg
          # This slice renders only the CNPG Cluster + barman backup — disable the
          # app-template workload so it isn't also created here.
          - name: app-template.workload.enabled
            value: "false"
        valueFiles:
          - $values/deploy/envs/production/vymalo-backend.values.yaml
        ignoreMissingValueFiles: true
    - repoURL: https://github.com/vymalo/vymalo-shop.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: vymalo
  # CNPG's Cluster health needs a populated .status; ignore the operator-managed
  # status so a freshly bootstrapping cluster doesn't flap OutOfSync.
  ignoreDifferences:
    - group: postgresql.cnpg.io
      kind: Cluster
      jsonPointers:
        - /status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 10
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
---
# ─────────────────────────────────────────────────────────────────────────
# 3. vymalo-backend — server + worker + admin SPA + Redis + ConfigMap
#    + HTTPRoute + the `medusa db:migrate` Job. Owns the images, so the Image
#    Updater annotations live here. (Renamed from the legacy `vymalo-backend-knative`;
#    the app has no resources-finalizer, so the deployer prunes the old app by
#    ORPHANING its resources, which this app then adopts — no workload restart.)
# ─────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vymalo-backend
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"

    # Three images: server (`app`) + worker (`worker`, SAME backend image, separate
    # app-template controller) + admin SPA (`admin`). ONE line — a folded `>-`
    # injects a space after the comma and breaks the parser. `app` and `worker`
    # resolve the same repo → the same signed digest, so server + worker never drift.
    argocd-image-updater.argoproj.io/image-list: "app=ghcr.io/vymalo/vymalo-backend:latest,worker=ghcr.io/vymalo/vymalo-backend:latest,admin=ghcr.io/vymalo/vymalo-admin:latest"
    # Multi-source app: Helm image params live on source 0 (the OCI chart).
    argocd-image-updater.argoproj.io/app.source-index: "0"
    argocd-image-updater.argoproj.io/worker.source-index: "0"
    argocd-image-updater.argoproj.io/admin.source-index: "0"
    # PRIVATE GHCR: the controller needs a read credential to query digests, or
    # it gets `unauthorized`. ESO Secret created in ghcr-pull.externalsecret.yaml.
    argocd-image-updater.argoproj.io/app.pull-secret: pullsecret:argocd/vymalo-ghcr-pull
    argocd-image-updater.argoproj.io/worker.pull-secret: pullsecret:argocd/vymalo-ghcr-pull
    argocd-image-updater.argoproj.io/admin.pull-secret: pullsecret:argocd/vymalo-ghcr-pull
    argocd-image-updater.argoproj.io/app.update-strategy: digest
    # The workload runs on the bjw-s app-template dependency, so the image lives
    # under the app-template controller path (was top-level image.* pre-migration).
    argocd-image-updater.argoproj.io/app.helm.image-name: app-template.controllers.server.containers.app.image.repository
    argocd-image-updater.argoproj.io/app.helm.image-tag: app-template.controllers.server.containers.app.image.tag
    argocd-image-updater.argoproj.io/app.force-update: "true"
    # Worker = the SAME image as the server, pinned to its own app-template controller
    # path so Image Updater keeps both in lockstep on every promotion.
    argocd-image-updater.argoproj.io/worker.update-strategy: digest
    argocd-image-updater.argoproj.io/worker.helm.image-name: app-template.controllers.worker.containers.app.image.repository
    argocd-image-updater.argoproj.io/worker.helm.image-tag: app-template.controllers.worker.containers.app.image.tag
    argocd-image-updater.argoproj.io/worker.force-update: "true"
    argocd-image-updater.argoproj.io/admin.update-strategy: digest
    argocd-image-updater.argoproj.io/admin.helm.image-name: app-template.controllers.admin.containers.spa.image.repository
    argocd-image-updater.argoproj.io/admin.helm.image-tag: app-template.controllers.admin.containers.spa.image.tag
    argocd-image-updater.argoproj.io/admin.force-update: "true"

    # cosign keyless verification — refuse any digest not signed by this repo's
    # CI workflow on main (Fulcio + Rekor).
    argocd-image-updater.argoproj.io/app.signature-type: cosign
    argocd-image-updater.argoproj.io/app.cosign.certificate-oidc-issuer: >-
      https://token.actions.githubusercontent.com
    argocd-image-updater.argoproj.io/app.cosign.certificate-identity-regexp: >-
      ^https://github\.com/vymalo/vymalo-shop/\.github/workflows/ci\.yml@.*$
    argocd-image-updater.argoproj.io/worker.signature-type: cosign
    argocd-image-updater.argoproj.io/worker.cosign.certificate-oidc-issuer: >-
      https://token.actions.githubusercontent.com
    argocd-image-updater.argoproj.io/worker.cosign.certificate-identity-regexp: >-
      ^https://github\.com/vymalo/vymalo-shop/\.github/workflows/ci\.yml@.*$
    argocd-image-updater.argoproj.io/admin.signature-type: cosign
    argocd-image-updater.argoproj.io/admin.cosign.certificate-oidc-issuer: >-
      https://token.actions.githubusercontent.com
    argocd-image-updater.argoproj.io/admin.cosign.certificate-identity-regexp: >-
      ^https://github\.com/vymalo/vymalo-shop/\.github/workflows/ci\.yml@.*$

    # git write-back: source is an OCI registry (not git), so an explicit HTTPS
    # git-repository + creds are required.
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/git-repository: >-
      https://github.com/vymalo/vymalo-shop.git
    argocd-image-updater.argoproj.io/write-back-target: >-
      helmvalues:deploy/envs/production/vymalo-backend.values.yaml
    argocd-image-updater.argoproj.io/git-credentials: >-
      secret:argocd/github-app-creds--vymalo

    notifications.argoproj.io/subscribe.on-deployed.vymalo: ""
    notifications.argoproj.io/subscribe.on-deploy-failed.vymalo: ""
    notifications.ssegning.me/github-repo-url: https://github.com/vymalo/vymalo-shop
    notifications.ssegning.me/github-revision: main
    notifications.ssegning.me/environment-url: https://api.vymalo.com
spec:
  project: default
  sources:
    - repoURL: ghcr.io/vymalo/charts
      chart: vymalo-backend
      targetRevision: 0.1.*
      helm:
        releaseName: vymalo-backend
        parameters:
          # The app slice (Deployments + Services + ConfigMap + migrate + HPA +
          # route + redis). Renamed from the legacy `knative` role.
          - name: role
            value: app
        valueFiles:
          - $values/deploy/envs/production/vymalo-backend.values.yaml
        ignoreMissingValueFiles: true
    - repoURL: https://github.com/vymalo/vymalo-shop.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: vymalo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 10
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
---
# ─────────────────────────────────────────────────────────────────────────
# 7. vymalo-mobile-payment-gateway — NestJS mobile-money gateway (MTN MoMo +
#    Orange Money; CQRS + BullMQ) → pay.vymalo.com (CALLBACKS ONLY; the rest of
#    /v1 is ClusterIP-internal, called by the backend's mobile-money provider).
#    Single app (role: all, chart default): the Deployment + persistent Redis +
#    the `mobile_payment` CNPG Database CRD (PreSync hook, wave -1, REUSES the
#    backend cluster) + the PreSync `prisma db push` migrate Job (wave 0) + its
#    ExternalSecret. Reuses the backend-owned vymalo-aws SecretStore + ghcr-pull
#    Secret + the CNPG cluster, so it syncs AFTER the backend AND auth (wave 6).
#    Image Updater pins the signed digest on the prod overlay; git write-back to
#    vymalo-shop main. PREREQS (see the overlay header): the AWS SM object
#    `prod/vymalo-mobile-payment-gateway` (3 secrets), the FIRST signed gateway
#    image, and a DNS record for pay.vymalo.com.
# ─────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vymalo-mobile-payment-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"

    argocd-image-updater.argoproj.io/image-list: >-
      app=ghcr.io/vymalo/vymalo-mobile-payment-gateway:latest
    argocd-image-updater.argoproj.io/app.source-index: "0"
    # PRIVATE GHCR read credential (see ghcr-pull.externalsecret.yaml).
    argocd-image-updater.argoproj.io/app.pull-secret: pullsecret:argocd/vymalo-ghcr-pull
    argocd-image-updater.argoproj.io/app.update-strategy: digest
    argocd-image-updater.argoproj.io/app.helm.image-name: app-template.controllers.server.containers.app.image.repository
    argocd-image-updater.argoproj.io/app.helm.image-tag: app-template.controllers.server.containers.app.image.tag
    argocd-image-updater.argoproj.io/app.force-update: "true"

    argocd-image-updater.argoproj.io/app.signature-type: cosign
    argocd-image-updater.argoproj.io/app.cosign.certificate-oidc-issuer: >-
      https://token.actions.githubusercontent.com
    argocd-image-updater.argoproj.io/app.cosign.certificate-identity-regexp: >-
      ^https://github\.com/vymalo/vymalo-shop/\.github/workflows/ci\.yml@.*$

    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/git-repository: >-
      https://github.com/vymalo/vymalo-shop.git
    argocd-image-updater.argoproj.io/write-back-target: >-
      helmvalues:deploy/envs/production/vymalo-mobile-payment-gateway.values.yaml
    argocd-image-updater.argoproj.io/git-credentials: >-
      secret:argocd/github-app-creds--vymalo

    notifications.argoproj.io/subscribe.on-deployed.vymalo: ""
    notifications.argoproj.io/subscribe.on-deploy-failed.vymalo: ""
    notifications.ssegning.me/github-repo-url: https://github.com/vymalo/vymalo-shop
    notifications.ssegning.me/github-revision: main
    notifications.ssegning.me/environment-url: https://pay.vymalo.com
spec:
  project: default
  sources:
    - repoURL: ghcr.io/vymalo/charts
      chart: vymalo-mobile-payment-gateway
      targetRevision: 0.1.*
      helm:
        releaseName: vymalo-mobile-payment-gateway
        valueFiles:
          - $values/deploy/envs/production/vymalo-mobile-payment-gateway.values.yaml
        ignoreMissingValueFiles: true
    - repoURL: https://github.com/vymalo/vymalo-shop.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: vymalo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 10
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
---
