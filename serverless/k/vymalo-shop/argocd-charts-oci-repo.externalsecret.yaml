# ArgoCD repository credential for the PRIVATE OCI Helm chart
# ghcr.io/vymalo/charts/vymalo-shop. A GitHub-App git cred can't auth a GHCR
# Helm pull, so ArgoCD needs a repository-type secret (type: helm + enableOCI +
# username/password). Reuses the same GHCR creds as the cluster's ghcr-pull
# pattern (ClusterSecretStore `ssegning-aws`, key `prod/meta/test-app`,
# properties github_username / github_token).
#
# Requires ESO on homeos (see the local-external-secrets / local-secret-store
# apps in charts/cd). Lands in the argocd namespace (forced by this dir's
# kustomization) and is applied by the vymalo-shop-deployer app, so the
# vymalo-shop Application can pull its chart without making the package public.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vymalo-charts-oci-repo
spec:
  refreshInterval: 10m
  secretStoreRef:
    name: ssegning-aws
    kind: ClusterSecretStore
  target:
    name: vymalo-charts-oci-repo
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          # Tells ArgoCD to treat this Secret as a repository credential.
          argocd.argoproj.io/secret-type: repository
      data:
        name: vymalo-charts
        type: helm
        # Must match spec.sources[].repoURL in argocd-application.yaml.
        url: ghcr.io/vymalo/charts
        enableOCI: "true"
        username: "{{ .github_username }}"
        password: "{{ .github_token }}"
  data:
    - secretKey: github_username
      remoteRef:
        key: prod/meta/test-app
        property: github_username
    - secretKey: github_token
      remoteRef:
        key: prod/meta/test-app
        property: github_token
