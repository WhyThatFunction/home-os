# GHCR read credential for the argocd-image-updater controller.
#
# The CRD-based image-updater (ns argocd-image-updater) queries GHCR for each
# vymalo app's new signed digest. vymalo's packages (ghcr.io/vymalo/vymalo-*)
# are PRIVATE, so an anonymous query returns `unauthorized` and no digest ever
# promotes — only chart republishes (an appVersion bump) deploy. This Secret is
# the missing credential: each app references it via a
# `argocd-image-updater.argoproj.io/<alias>.pull-secret: pullsecret:argocd/vymalo-ghcr-pull`
# annotation, and the controller's argocd-namespace secret-read RBAC already
# ships in charts/argocd-image-updater (Role argocd-image-updater-argocd-config).
#
# Same shape + creds as the vaam `vaam-store-ghcr-pull` pattern
# (charts/home-apps/vaam-store-prod-deployer/templates/ghcr-secrets.yaml) and the
# sibling vymalo-charts-oci-repo here: ClusterSecretStore `ssegning-aws`, key
# `prod/meta/test-app`, properties github_username / github_token (a PAT with
# read:packages on the vymalo org). Lands in the argocd namespace (forced by this
# dir's kustomization).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vymalo-ghcr-pull
  labels:
    app.kubernetes.io/part-of: vymalo-shop
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: ssegning-aws
    kind: ClusterSecretStore
  target:
    name: vymalo-ghcr-pull
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"{{ .github_username }}","password":"{{ .github_token }}","auth":"{{ printf "%s:%s" .github_username .github_token | b64enc }}"}}}
  data:
    - secretKey: github_username
      remoteRef:
        key: prod/meta/test-app
        property: github_username
    - secretKey: github_token
      remoteRef:
        key: prod/meta/test-app
        property: github_token
