# ArgoCD repository credential for the PRIVATE OCI Helm chart
# ghcr.io/adorsys-gis/charts/converse-frontend (published by
# converse-frontends' publish-charts-oci.yml on merge to main). The `converse-ui`
# Application in ai-helm (charts/apps) floats this chart on a semver range.
#
# A GitHub-App git cred can't auth a GHCR Helm pull (ArgoCD GitHub App creds are
# git-only), so ArgoCD needs a repository-type secret (type: helm + enableOCI +
# username/password). Reuses the same GHCR creds as the cluster's ghcr-pull /
# vymalo-charts-oci-repo pattern (ClusterSecretStore `ssegning-aws`, key
# `prod/meta/test-app`, properties github_username / github_token — a PAT with
# read:packages; the account is an adorsys-gis member so it can read the org's
# private packages).
#
# `url` is the FULL chart path and MUST equal (modulo the oci:// scheme) the
# `converse-ui` Source A `repoURL` in ai-helm charts/apps/values.yaml — a
# repository-type secret matches by exact normalized URL. Add a sibling secret
# per chart if converse-frontends publishes more charts under .../charts.
#
# Requires ESO (local-external-secrets / local-secret-store in charts/cd). Lands
# in the argocd namespace (forced by this dir's kustomization) and is applied by
# the `converse-deployer` app (home-os charts/apps), so ai-helm's converse-ui
# Application can pull its chart without making the package public.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: converse-frontends-charts-oci
spec:
  refreshInterval: 10m
  secretStoreRef:
    name: ssegning-aws
    kind: ClusterSecretStore
  target:
    name: converse-frontends-charts-oci
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          # Tells ArgoCD to treat this Secret as a repository credential.
          argocd.argoproj.io/secret-type: repository
      data:
        name: converse-frontends-charts
        type: helm
        # Must match spec.sources[].repoURL for converse-ui in ai-helm
        # charts/apps/values.yaml (oci://ghcr.io/adorsys-gis/charts/converse-frontend).
        url: ghcr.io/adorsys-gis/charts/converse-frontend
        enableOCI: "true"
        username: "{{ .github_username }}"
        password: "{{ .github_token }}"
  data:
    - secretKey: github_username
      remoteRef:
        key: prod/meta/test-app
        property: github_username
    - secretKey: github_token
      remoteRef:
        key: prod/meta/test-app
        property: github_token
