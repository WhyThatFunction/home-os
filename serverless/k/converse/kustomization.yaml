apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The repository credential must live in the argocd namespace (that's where
# ArgoCD reads repo creds). The converse-ui Application itself is NOT here — it
# is rendered by ai-helm's charts/apps app-of-apps; this dir only provisions the
# credential that lets ArgoCD pull the private converse-frontends OCI chart.
namespace: argocd

resources:
  # ArgoCD repo cred (ESO) so ArgoCD can pull the PRIVATE OCI Helm chart
  # ghcr.io/adorsys-gis/converse-frontends/charts/converse-frontend.
  - argocd-charts-oci-repo.externalsecret.yaml
