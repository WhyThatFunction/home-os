# ArgoCD Helm-OCI repository credential for ghcr.io/adorsys-gis/charts — the
# ai-helm chart registry (ai-helm ADR-0055 continuous delivery). ArgoCD needs a
# repository-type secret (type: helm + enableOCI) to recognise the OCI registry
# and resolve a chart's versions at <url>/<chart> when an Application sources a
# chart on a semver RANGE. Without this registration, range resolution queries
# the wrong path (`<url>/tags/list` instead of `<url>/<chart>/tags/list`) and
# 403s — observed on aii-mongodb-backup. Mirrors the vymalo-shop / vaam-store
# *-charts-oci-repo pattern.
#
# Credentials reuse the cluster GHCR creds (ClusterSecretStore ssegning-aws, key
# prod/meta/test-app, properties github_username / github_token). The package is
# public, so auth is belt-and-suspenders today + lets private charts work later.
#
# Requires ESO on homeos (see the local-external-secrets / local-secret-store
# apps in charts/cd). Lands in the argocd namespace (forced by this dir's
# kustomization), applied by the ai-helm-charts-oci-deployer app.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: adorsys-gis-charts-oci-repo
spec:
  refreshInterval: 10m
  secretStoreRef:
    name: ssegning-aws
    kind: ClusterSecretStore
  target:
    name: adorsys-gis-charts-oci-repo
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          # Tells ArgoCD to treat this Secret as a repository credential.
          argocd.argoproj.io/secret-type: repository
      data:
        name: adorsys-gis-charts
        type: helm
        # Must match argocd.chartRegistry in ai-helm charts/apps (the Source A
        # repoURL of OCI-mode apps): oci://ghcr.io/adorsys-gis/charts.
        url: ghcr.io/adorsys-gis/charts
        enableOCI: "true"
        username: "{{ .github_username }}"
        password: "{{ .github_token }}"
  data:
    - secretKey: github_username
      remoteRef:
        key: prod/meta/test-app
        property: github_username
    - secretKey: github_token
      remoteRef:
        key: prod/meta/test-app
        property: github_token
