apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The ArgoCD repository credential lives in the argocd namespace.
namespace: argocd

resources:
  # ArgoCD Helm-OCI repo registration for ghcr.io/adorsys-gis/charts so ai-apps-v2's
  # OCI-mode child Apps (ai-helm ADR-0055) can resolve charts on a semver range.
  - adorsys-gis-charts-oci-repo.externalsecret.yaml
