apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opfs-web
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: >-
      web=ghcr.io/stephane-segning/opfs-web:latest
    argocd-image-updater.argoproj.io/web.update-strategy: digest
    argocd-image-updater.argoproj.io/web.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/web.helm.image-tag: image.tag

    # Image Updater refuses to promote a digest that wasn't signed
    # by THIS repo's deploy-web workflow on `main`.
    argocd-image-updater.argoproj.io/web.signature-type: cosign
    argocd-image-updater.argoproj.io/web.cosign.certificate-oidc-issuer: >-
      https://token.actions.githubusercontent.com
    argocd-image-updater.argoproj.io/web.cosign.certificate-identity-regexp: >-
      ^https://github\.com/stephane-segning/opfs-webauthn/\.github/workflows/deploy-web\.yml@.*$

    # `git` write-back needs an explicit Git URL when the source is
    # an OCI Helm registry (`spec.source.repoURL` is not a Git URL,
    # so Image Updater can't clone it). `git-repository` +
    # `write-back-target` point at the GitOps repo / file that
    # holds the per-env values overlay. Adjust both for your repo
    # layout.
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/git-repository: >-
      git@github.com:stephane-segning/opfs-webauthn-gitops.git
    argocd-image-updater.argoproj.io/write-back-target: >-
      helmvalues:envs/production/opfs-web.values.yaml
    argocd-image-updater.argoproj.io/git-credentials: >-
      secret:argocd/opfs-webauthn-deploy
spec:
  project: external
  source:
    repoURL: ghcr.io/stephane-segning/charts
    chart: opfs-web
    # The build workflow bumps `Chart.yaml` `version` to
    # `0.1.<run_number>` on every push to main, so `0.1.0` from
    # source is never published. Track the latest patch with a
    # glob, or pin to a specific run for a frozen release.
    targetRevision: 0.1.*
  destination:
    server: https://kubernetes.default.svc
    namespace: opfs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true