# JSON6902 patches for the opfs-share-backend Application.
# Same shape as the opfs-web patch, with the share-backend side
# of the URL pair.

# ─── Helm sources and values overlay ────────────────────────────
- op: remove
  path: /spec/source

- op: add
  path: /spec/sources
  value:
    - repoURL: ghcr.io/stephane-segning/charts
      chart: opfs-share-backend
      targetRevision: 0.1.*
      helm:
        valueFiles:
          - $values/envs/production/opfs-share-backend.values.yaml
        ignoreMissingValueFiles: true
        values: |
          env:
            # CORS allow-list. The browser sends `Origin: <frontend>` on
            # cross-origin POSTs; matching this entry passes the check.
            # Empty default = every Origin'd request gets 403, so this
            # MUST be set. Discover with:
            #   kubectl -n opfs get ksvc opfs-web \
            #     -o jsonpath='{.status.url}'
            # Comma-separate for preview / staging environments.
            allowedOrigins: https://opfs-web-opfs--sls.ssegning.com
    - repoURL: https://github.com/stephane-segning/opfs-webauthn.git
      targetRevision: main
      ref: values

# ─── Image Updater write-back target ────────────────────────────
- op: replace
  path: /metadata/annotations/argocd-image-updater.argoproj.io~1git-repository
  value: https://github.com/stephane-segning/opfs-webauthn.git

- op: replace
  path: /metadata/annotations/argocd-image-updater.argoproj.io~1write-back-target
  value: helmvalues:envs/production/opfs-share-backend.values.yaml

- op: add
  path: /metadata/annotations/argocd-image-updater.argoproj.io~1backend.force-update
  value: "true"

# ─── argocd-notifications subscriptions ─────────────────────────
- op: add
  path: /metadata/annotations/notifications.argoproj.io~1subscribe.on-deployed.stephane-segning
  value: ""
- op: add
  path: /metadata/annotations/notifications.argoproj.io~1subscribe.on-deploy-failed.stephane-segning
  value: ""

- op: add
  path: /metadata/annotations/notifications.ssegning.me~1github-repo-url
  value: https://github.com/stephane-segning/opfs-webauthn
- op: add
  path: /metadata/annotations/notifications.ssegning.me~1github-revision
  value: main
- op: add
  path: /metadata/annotations/notifications.ssegning.me~1environment-url
  value: https://opfs-share-backend-opfs--sls.ssegning.com
