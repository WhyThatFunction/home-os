# JSON6902 patches for the opfs-web Application.
#
# `~1` is the JSON Pointer escape for `/`; that's why annotation
# keys with slashes (argocd-image-updater.argoproj.io/git-repository,
# notifications.argoproj.io/subscribe.on-deployed.stephane-segning, etc.) all
# carry `~1` in the path.

# ─── Helm sources and values overlay ────────────────────────────
- op: remove
  path: /spec/source

- op: add
  path: /spec/sources
  value:
    - repoURL: ghcr.io/stephane-segning/charts
      chart: opfs-web
      targetRevision: 0.1.*
      helm:
        valueFiles:
          - $values/envs/production/opfs-web.values.yaml
        ignoreMissingValueFiles: true
        values: |
          env:
            # URL Knative assigns to the share-backend KSvc in this
            # cluster. Discover with:
            #   kubectl -n opfs get ksvc opfs-share-backend \
            #     -o jsonpath='{.status.url}'
            shareBackendUrl: https://opfs-share-backend-opfs--sls.ssegning.com
    - repoURL: https://github.com/stephane-segning/opfs-webauthn.git
      targetRevision: main
      ref: values

# ─── Image Updater write-back target ────────────────────────────
- op: replace
  path: /metadata/annotations/argocd-image-updater.argoproj.io~1git-repository
  # repo-creds Secret is a GitHub App (HTTPS basic-auth via
  # installation token); SSH bypasses that path entirely.
  value: https://github.com/stephane-segning/opfs-webauthn.git

- op: replace
  path: /metadata/annotations/argocd-image-updater.argoproj.io~1write-back-target
  # Updater rewrites on each promotion. Adjust to your layout.
  value: helmvalues:envs/production/opfs-web.values.yaml

- op: add
  path: /metadata/annotations/argocd-image-updater.argoproj.io~1web.force-update
  value: "true"

# ─── argocd-notifications subscriptions ─────────────────────────
- op: add
  path: /metadata/annotations/notifications.argoproj.io~1subscribe.on-deployed.stephane-segning
  value: ""
- op: add
  path: /metadata/annotations/notifications.argoproj.io~1subscribe.on-deploy-failed.stephane-segning
  value: ""

# Per-app notification metadata. The shared notifications template
# reads these and stamps a GitHub Deployment for this Application.
- op: add
  path: /metadata/annotations/notifications.ssegning.me~1github-repo-url
  value: https://github.com/stephane-segning/opfs-webauthn
- op: add
  path: /metadata/annotations/notifications.ssegning.me~1github-revision
  value: main
- op: add
  path: /metadata/annotations/notifications.ssegning.me~1environment-url
  value: https://opfs-web-opfs--sls.ssegning.com
