# ArgoCD repository credential for the PRIVATE OCI Helm charts
# ghcr.io/adorsys-gis/charts/* (lightbridge-authz-stack + the -authz/-mcp/-usage
# component charts). ArgoCD's repo-server pulls these on every refresh; once the
# packages go private an anonymous pull returns `unauthorized` and the
# lightbridge-app Application goes ComparisonError. This repository-type secret
# (type: helm + enableOCI + username/password) is the credential.
#
# Password = a GitHub App installation token minted by the sibling
# GithubAccessToken generator (App-based, per request — not a personal PAT).
# username is arbitrary for token auth; `x-access-token` matches the git
# convention. refreshInterval 30m keeps the token fresh (TTL ~1h).
#
# Mirrors the vymalo `vymalo-charts-oci-repo` pattern, but App-token-backed.
# Lands in the argocd namespace (forced by this dir's kustomization).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: adorsys-gis-charts-oci-repo
spec:
  refreshInterval: 30m
  target:
    name: adorsys-gis-charts-oci-repo
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          # Tells ArgoCD to treat this Secret as a repository credential.
          argocd.argoproj.io/secret-type: repository
      data:
        name: adorsys-gis-charts
        type: helm
        # Must match spec.sources[].repoURL (minus the oci:// scheme) that the
        # lightbridge-app child pulls: oci://ghcr.io/adorsys-gis/charts/...
        url: ghcr.io/adorsys-gis/charts
        enableOCI: "true"
        username: x-access-token
        password: "{{ .token }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: GithubAccessToken
          name: adorsys-gis-ghcr-token
