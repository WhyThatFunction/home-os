# ArgoCD repository credential for the PRIVATE OCI Helm umbrella chart
# oci://ghcr.io/adorsys-gis/charts/lightbridge-authz-stack. ArgoCD's repo-server
# pulls it on every refresh; once the package is private an anonymous pull is
# 401 and the lightbridge-app Application goes ComparisonError.
#
# Credential = a PAT (github_username / github_token @ ssegning-aws
# `ai/camer/digital/prod/env`) — the SAME PAT the workload pods already use to
# pull the private images (converse `lightbridge-repo-auth-ghcr`), and the same
# shape as the vymalo `vymalo-charts-oci-repo`.
#
# A GitHub App installation token does NOT work here: it authenticates but is
# 403 Forbidden on org-owned PRIVATE packages (verified). Only a user PAT with
# read:packages (org owner) can pull them — hence PAT, not the App.
#
# Two matching requirements (both verified the hard way):
#   - secret-type: repository (exact match), and
#   - url MUST be the full source repoURL INCLUDING the oci:// scheme; a prefix
#     (ghcr.io/adorsys-gis/charts) or a scheme-less url does NOT match and ArgoCD
#     silently falls back to anonymous (401).
# Lands in the argocd namespace (forced by this dir's kustomization).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: adorsys-gis-charts-oci-repo
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ssegning-aws
    kind: ClusterSecretStore
  target:
    name: adorsys-gis-charts-oci-repo
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        name: adorsys-gis-charts-lightbridge-authz-stack
        type: helm
        # Exact match to the lightbridge-app Source A repoURL (scheme included).
        url: oci://ghcr.io/adorsys-gis/charts/lightbridge-authz-stack
        enableOCI: "true"
        username: "{{ .github_username }}"
        password: "{{ .github_token }}"
  data:
    - secretKey: github_username
      remoteRef:
        key: ai/camer/digital/prod/env
        property: github_username
    - secretKey: github_token
      remoteRef:
        key: ai/camer/digital/prod/env
        property: github_token
