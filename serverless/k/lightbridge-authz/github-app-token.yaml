# App-based GHCR credential for the ADORSYS-GIS lightbridge stack.
#
# Mints a GitHub App *installation* access token (short-lived, ~1h) for the
# `argocd-ssegning` App (appID 2926172, installID 112379420 — all-repos,
# packages:read), scoped down to packages:read. Unlike a git App cred, an
# installation token DOES authenticate GHCR pulls, so it can back both the
# ArgoCD OCI repository cred and the image-updater dockerconfigjson below —
# without depending on a personal PAT.
#
# The App private key is already in this namespace as the repo-creds Secret
# `github-app-creds--adorsys-gis` (managed by the `home-secrets`/cd app).
# The consuming ExternalSecrets refresh every 30m, well inside the token TTL.
#
# NOTE: filename deliberately avoids the substring "gen" — the repo .gitignore
# has `*gen*`, which silently drops any "*.generator.yaml" file from commits.
apiVersion: generators.external-secrets.io/v1alpha1
kind: GithubAccessToken
metadata:
  name: adorsys-gis-ghcr-token
spec:
  appID: "2926172"
  installID: "112379420"
  permissions:
    packages: read
  auth:
    privateKey:
      secretRef:
        name: github-app-creds--adorsys-gis
        key: githubAppPrivateKey
