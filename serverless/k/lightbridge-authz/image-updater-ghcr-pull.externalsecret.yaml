# GHCR read credential for the argocd-image-updater controller.
#
# image-updater queries GHCR for each lightbridge image's newest signed
# `sha-<gitsha>` digest (api=ghcr.io/adorsys-gis/lightbridge-authz,
# mcp=ghcr.io/adorsys-gis/lightbridge-authz-mcp) and git-writes it back to
# ai-helm-values. Now those image packages are private an anonymous query
# returns `unauthorized` and NO digest ever promotes (the app silently stops
# updating). This dockerconfigjson is the missing credential; the lightbridge-app
# Application references it via
#   argocd-image-updater.argoproj.io/<alias>.pull-secret: pullsecret:argocd/adorsys-gis-ghcr-pull
# (wired in ai-helm charts/lightbridge/templates/applications.yaml).
#
# Password = the same PAT as the OCI repo cred (github_username / github_token @
# ssegning-aws `ai/camer/digital/prod/env`) — a GitHub App installation token is
# 403 Forbidden on org-owned private packages, so a user PAT is required.
# Mirrors the vymalo `vymalo-ghcr-pull` pattern. Lands in the argocd namespace
# (forced by this dir's kustomization).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: adorsys-gis-ghcr-pull
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ssegning-aws
    kind: ClusterSecretStore
  target:
    name: adorsys-gis-ghcr-pull
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"{{ .github_username }}","password":"{{ .github_token }}","auth":"{{ printf "%s:%s" .github_username .github_token | b64enc }}"}}}
  data:
    - secretKey: github_username
      remoteRef:
        key: ai/camer/digital/prod/env
        property: github_username
    - secretKey: github_token
      remoteRef:
        key: ai/camer/digital/prod/env
        property: github_token
