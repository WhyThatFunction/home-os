# GHCR read credential for the argocd-image-updater controller.
#
# image-updater queries GHCR for each lightbridge image's newest signed
# `sha-<gitsha>` digest (api=ghcr.io/adorsys-gis/lightbridge-authz,
# mcp=ghcr.io/adorsys-gis/lightbridge-authz-mcp) and git-writes it back to
# ai-helm-values. Once those image packages go private an anonymous query
# returns `unauthorized` and NO digest ever promotes (the app silently stops
# updating). This dockerconfigjson is the missing credential; the lightbridge-app
# Application references it via
#   argocd-image-updater.argoproj.io/<alias>.pull-secret: pullsecret:argocd/adorsys-gis-ghcr-pull
# (wired in ai-helm charts/lightbridge/templates/applications.yaml).
#
# Password = the same App installation token as the OCI repo cred (App-based,
# not a personal PAT). Mirrors the vymalo `vymalo-ghcr-pull` pattern.
# Lands in the argocd namespace (forced by this dir's kustomization).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: adorsys-gis-ghcr-pull
spec:
  refreshInterval: 30m
  target:
    name: adorsys-gis-ghcr-pull
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"x-access-token","password":"{{ .token }}","auth":"{{ printf "x-access-token:%s" .token | b64enc }}"}}}
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: GithubAccessToken
          name: adorsys-gis-ghcr-token
