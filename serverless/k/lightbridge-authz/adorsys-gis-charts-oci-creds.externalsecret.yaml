# ArgoCD OCI Helm credential TEMPLATE (repo-creds) for the PRIVATE adorsys-gis
# chart registry oci://ghcr.io/adorsys-gis/charts.
#
# Unlike a `repository` secret (which matches ONE exact repoURL — see
# charts-oci-repo.externalsecret.yaml), a `repo-creds` credential template matches
# by URL PREFIX, so this ONE secret supplies creds to EVERY chart ArgoCD pulls
# under that registry once the packages go private — core-gateway,
# kuadrant-policies, observability(+dashboards), the model-serving-* leaves,
# librechart, ai-models, mcps, imageupdater, mongodb-backup, same-origin-proxy, …
# — without a per-chart secret each. The ai-helm apps set
# repoURL: oci://ghcr.io/adorsys-gis/charts/<chart> (chart: "."), so the prefix
# below covers all of them.
#
# Credential = the SAME PAT as the per-chart repository cred (github_username /
# github_token @ ssegning-aws `ai/camer/digital/prod/env`). A GitHub App
# installation token is 403 Forbidden on org-owned PRIVATE packages, so a user PAT
# with read:packages (org owner) is required — App auth does NOT work here.
#
# ⚠️ VERIFY LIVE that the prefix matches OCI sub-charts in this ArgoCD version:
# charts-oci-repo.externalsecret.yaml warns a prefix does NOT match — but that was
# for a `repository`-type (exact) secret; `repo-creds` templates are prefix
# matchers by design. The per-chart `adorsys-gis-charts-oci-repo` (authz-stack) is
# kept as a proven exact match (most-specific wins), so nothing regresses if this
# template turns out not to match; once it's confirmed covering the other charts,
# that per-chart secret can be removed as redundant.
#
# url INCLUDES the oci:// scheme to match the app repoURLs. Lands in the argocd
# namespace (forced by this dir's kustomization).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: adorsys-gis-charts-oci-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ssegning-aws
    kind: ClusterSecretStore
  target:
    name: adorsys-gis-charts-oci-creds
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repo-creds
      data:
        url: oci://ghcr.io/adorsys-gis/charts
        type: helm
        enableOCI: "true"
        username: "{{ .github_username }}"
        password: "{{ .github_token }}"
  data:
    - secretKey: github_username
      remoteRef:
        key: ai/camer/digital/prod/env
        property: github_username
    - secretKey: github_token
      remoteRef:
        key: ai/camer/digital/prod/env
        property: github_token
