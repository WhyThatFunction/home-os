# Applied to ALL nodes: talosctl gen config --config-patch @patch-all.yaml
machine:
  network:
    # netcup DHCP hands out an address but no usable resolver, so image pulls
    # fail with "lookup ghcr.io ... connection refused". Set upstream DNS
    # explicitly. (The interface still gets its IP/gateway via DHCP.)
    nameservers:
      - 1.1.1.1
      - 8.8.8.8
  features:
    # KubePrism gives each node a local loadbalanced endpoint to the API server
    # at localhost:7445. Cilium's kube-proxy replacement points here. On by
    # default in Talos 1.13, set explicitly since the whole CNI depends on it.
    kubePrism:
      enabled: true
      port: 7445
cluster:
  network:
    dnsDomain: cluster.local
    podSubnets:
      - 10.244.0.0/16      # Talos default, RFC1918-safe
    serviceSubnets:
      - 10.96.0.0/12       # Talos default (clusterDNS = 10.96.0.10)
  # Cluster membership discovery (kept from your old config): use the external
  # service registry, not the Kubernetes API registry.
  discovery:
    enabled: true
    registries:
      kubernetes:
        disabled: true
      service: {}