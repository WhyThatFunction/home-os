applications:
  - name: local-kube-state-metrics
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://prometheus-community.github.io/helm-charts
      targetRevision: "*"
      chart: kube-state-metrics
    destination:
      server: https://kubernetes.default.svc
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: netcup-kube-state-metrics
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://prometheus-community.github.io/helm-charts
      targetRevision: "*"
      chart: kube-state-metrics
      helm:
        releaseName: kube-state-metrics
    destination:
      name: netcup-k8s
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: otel-operator
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      targetRevision: 0.113.1
      chart: opentelemetry-operator
      helm:
        releaseName: opentelemetry-operator
        valuesObject:
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          admissionWebhooks:
            autoGenerateCert:
              enabled: false
            certManager:
              issuerRef:
                kind: ClusterIssuer
                name: self-signed-ca
                group: cert-manager.io
    destination:
      name: home-remote
      namespace: opentelemetry-system
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: otel-operator-local
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      targetRevision: 0.113.1
      chart: opentelemetry-operator
      helm:
        releaseName: opentelemetry-operator
        valuesObject:
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          admissionWebhooks:
            autoGenerateCert:
              enabled: false
            certManager:
              issuerRef:
                kind: ClusterIssuer
                name: self-signed-ca
                group: cert-manager.io
    destination:
      server: https://kubernetes.default.svc
      namespace: opentelemetry-system
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: grafana-operator-local
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: oci://ghcr.io/grafana/helm-charts/grafana-operator
      targetRevision: "5.*"
      chart: grafana-operator
      helm:
        releaseName: grafana-operator
    destination:
      server: https://kubernetes.default.svc
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - SkipDryRunOnMissingResource=true
      automated:
        prune: true
        selfHeal: true

