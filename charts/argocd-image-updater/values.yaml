config:
  argocd.namespace: argocd
  log.level: info
  watch.namespaces: argocd-image-updater,argocd

extraObjects:
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: Role
    metadata:
      name: argocd-image-updater-argocd-config
      namespace: argocd
    rules:
      - apiGroups:
          - ""
        resources:
          - secrets
          - configmaps
        verbs:
          - get
          - list
          - watch
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: argocd-image-updater-argocd-config
      namespace: argocd
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: Role
      name: argocd-image-updater-argocd-config
    subjects:
      - kind: ServiceAccount
        name: argocd-image-updater
        namespace: argocd-image-updater
  - apiVersion: argocd-image-updater.argoproj.io/v1alpha1
    kind: ImageUpdater
    metadata:
      name: opfs-webauthn
      namespace: argocd
    spec:
      applicationRefs:
        - namePattern: opfs-web
          useAnnotations: true
        - namePattern: opfs-share-backend
          useAnnotations: true
  - apiVersion: argocd-image-updater.argoproj.io/v1alpha1
    kind: ImageUpdater
    metadata:
      name: vymalo-shop
      namespace: argocd
    spec:
      applicationRefs:
        # Medusa replatform. Backend is a 3-app role split; only the knative app
        # carries the image-updater annotations (server `app` + admin SPA).
        - namePattern: vymalo-backend-knative
          useAnnotations: true
        - namePattern: vymalo-storefront
          useAnnotations: true
  # Lightbridge Code Intelligence (ai-helm `aii-lightbridge-code-intelligence`).
  # The control-plane + web image-updater annotations live on that Application;
  # this CR activates them. The `aii-` prefix is ai-helm's appNamePrefix. Tags are
  # written back to vymalo/lightbridge-code-intelligence:deploy/envs/production/values.yaml.
  - apiVersion: argocd-image-updater.argoproj.io/v1alpha1
    kind: ImageUpdater
    metadata:
      name: lightbridge-code-intelligence
      namespace: argocd
    spec:
      applicationRefs:
        - namePattern: aii-lightbridge-code-intelligence
          useAnnotations: true
