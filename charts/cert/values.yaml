
global:
  issuer:
    email: "selastlambou@protonmail.com"

solvers:
  cloudflare:
    enabled: true
    enabledStaging: false
    email: "{{ .Values.global.issuer.email }}"
    commonAnnotations: ~
  http:
    enabled: true
    enabledStaging: true
    ingressClassName: "traefik"
    email: "{{ .Values.global.issuer.email }}"
    commonAnnotations: ~
  # Route53 DNS-01 — for zones hosted on AWS Route53 (ai.camer.digital) and for
  # wildcard certs (Coder workspaces), which HTTP-01 cannot issue. Renders the
  # `cert-route53` ClusterIssuer. Requires a static IAM access key in the secret
  # named below, in the cert-manager cluster-resource-namespace (kube-system),
  # with route53:ChangeResourceRecordSets + GetChange + ListHostedZonesByName.
  # Enabled by default; the issuer stays non-functional (orders pend) until the
  # credentials secret exists, but its presence harms nothing.
  route53:
    enabled: true
    email: "{{ .Values.global.issuer.email }}"
    # Route53 is global; region is required by the resolver — us-east-1 is the
    # conventional choice and works for any zone.
    region: "us-east-1"
    # Leave empty to let cert-manager discover the zone by name.
    hostedZoneID: ""
    credentialsSecretName: "route53-secret"
    accessKeyIDKey: "access-key-id"
    secretAccessKeyKey: "secret-access-key"
    commonAnnotations: ~
  selfSigned:
    enabled: true
    enabledStaging: true
    commonAnnotations: ~

commonAnnotations:
  "helm.sh/hook": "post-install,post-upgrade,pre-delete"
  #"helm.sh/hook-delete-policy": "hook-succeeded"
  "helm.sh/hook-weight": "10"

cert-manager:
  installCRDs: true
  # Enable cert-manager's Gateway API integration: lets it solve ACME HTTP-01
  # via `gatewayHTTPRoute` solvers and honour `cert-manager.io/cluster-issuer`
  # annotations on Gateways (the gateway-shim). Off by default. The AI platform's
  # core-gateway (ai-helm) uses an HTTP-01 gatewayHTTPRoute Issuer to get TLS for
  # api.ai-v2.camer.digital without a DNS token.
  config:
    apiVersion: controller.config.cert-manager.io/v1alpha1
    kind: ControllerConfiguration
    enableGatewayAPI: true