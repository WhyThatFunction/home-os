
global:
  issuer:
    email: "selastlambou@protonmail.com"

solvers:
  cloudflare:
    enabled: true
    enabledStaging: false
    email: "{{ .Values.global.issuer.email }}"
    commonAnnotations: ~
  http:
    enabled: true
    enabledStaging: true
    ingressClassName: "traefik"
    email: "{{ .Values.global.issuer.email }}"
    commonAnnotations: ~
  selfSigned:
    enabled: true
    enabledStaging: true
    commonAnnotations: ~

commonAnnotations: {}
  #"helm.sh/hook": "post-install,post-upgrade,pre-delete"
  #"helm.sh/hook-delete-policy": "hook-succeeded"
  #"helm.sh/hook-weight": "10"

cert-manager:
  installCRDs: true
  # Enable cert-manager's Gateway API integration: lets it solve ACME HTTP-01
  # via `gatewayHTTPRoute` solvers and honour `cert-manager.io/cluster-issuer`
  # annotations on Gateways (the gateway-shim). Off by default. The AI platform's
  # core-gateway (ai-helm) uses an HTTP-01 gatewayHTTPRoute Issuer to get TLS for
  # api.ai-v2.camer.digital without a DNS token.
  config:
    apiVersion: controller.config.cert-manager.io/v1alpha1
    kind: ControllerConfiguration
    enableGatewayAPI: true