# MinIO `vymalo-backup` user for vymalo-shop's CloudNativePG barman backups.
#
# Materializes a `vymalo-minio-users` Secret in the bitnami-MinIO
# usersExistingSecrets format (one `field=value` per LINE: username /
# password / disabled / policies) from the backup creds stored in AWS SM
# (`prod/vymalo-shop` → minio_backup_access_key / minio_backup_secret_key).
# The user is bound to `vymalo-cnpg-backups-policy` (defined in values.yaml,
# scoped to the vymalo-cnpg-backups bucket). The same creds are read by the
# vymalo-shop chart's barman ObjectStore.
#
# Requires ESO + the `ssegning-aws` ClusterSecretStore on this cluster.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vymalo-minio-users
  namespace: {{ include "common.names.namespace" $ | quote }}
  labels:
    {{ include "common.labels.standard" $ | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ssegning-aws
    kind: ClusterSecretStore
  target:
    name: vymalo-minio-users
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # bitnami's provisioning parses each field on its OWN line
        # (^username= / ^password= / ^disabled= / ^policies=); a single
        # comma-joined line matches only `username=` and yields a broken user.
        # The Helm backticks escape the ESO Go-template so Helm leaves the
        # `{{ .access }}` / `{{ .secret }}` refs intact for ESO to resolve.
        vymalo-cnpg-backups-user: |
          username={{ `{{ .access }}` }}
          password={{ `{{ .secret }}` }}
          disabled=false
          policies=vymalo-cnpg-backups-policy
  data:
    - secretKey: access
      remoteRef:
        key: prod/vymalo-shop
        property: minio_backup_access_key
    - secretKey: secret
      remoteRef:
        key: prod/vymalo-shop
        property: minio_backup_secret_key
