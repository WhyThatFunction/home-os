# MinIO `vymalo-backup` user for vymalo-shop's CloudNativePG barman backups.
#
# Materializes a `vymalo-minio-users` Secret in the bitnami-MinIO
# usersExistingSecrets format (`username=…,password=…,disabled=…,policies=…`)
# from the GHCR/backup creds already stored in AWS Secrets Manager
# (`prod/vymalo-shop` → minio_backup_access_key / minio_backup_secret_key).
# The user is bound to `vymalo-cnpg-backups-policy` (defined in values.yaml,
# scoped to the vymalo-cnpg-backups bucket). The same creds are read by the
# vymalo-shop chart's barman ObjectStore.
#
# Requires ESO + the `ssegning-aws` ClusterSecretStore on this cluster.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vymalo-minio-users
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ssegning-aws
    kind: ClusterSecretStore
  target:
    name: vymalo-minio-users
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Backticks escape the ESO Go-template from Helm's templating.
        vymalo-cnpg-backups-user: "username={{ `{{ .access }}` }},password={{ `{{ .secret }}` }},disabled=false,policies=vymalo-cnpg-backups-policy"
  data:
    - secretKey: access
      remoteRef:
        key: prod/vymalo-shop
        property: minio_backup_access_key
    - secretKey: secret
      remoteRef:
        key: prod/vymalo-shop
        property: minio_backup_secret_key
