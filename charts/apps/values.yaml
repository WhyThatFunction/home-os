  - name: mlflow
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: ml
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/ml/mlflow
    destination:
      server: https://kubernetes.default.svc
      namespace: mlflow
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: vaam-store-ml-platform
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: vaam-store
    source:
      repoURL: https://github.com/vaam-store/vaam-store-ml
      targetRevision: HEAD
      path: helm/ml-platform
      helm:
        valuesObject:
          global:
            imagePullSecrets:
              - name: gh-pat
    destination:
      server: https://kubernetes.default.svc
      namespace: vaam-store-ml-platform
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: kyc-storage
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: kyc
    source:
      repoURL: oci://ghcr.io/adorsys-gis/charts/user-storage
      targetRevision: 0.1.0
      chart: .
      helm:
        valuesObject:
          controllers:
            user-storage:
              containers:
                user-storage:
                  env:
                    DATABASE_URL:
                      valueFrom:
                        secretKeyRef:
                          name: kyc-store-pg-app
                          key: uri
                    REDIS_URL: "redis://redis-master.database.svc.cluster.local:6379"
                    RUST_LOG: "info"
            worker:
              containers:
                worker:
                  env:
                    DATABASE_URL:
                      valueFrom:
                        secretKeyRef:
                          name: kyc-store-pg-app
                          key: uri
                    REDIS_URL: "redis://redis-master.database.svc.cluster.local:6379"
                    RUST_LOG: "info"
          ingress:
            user-storage:
              className: traefik
              annotations:
                cert-manager.io/cluster-issuer: cert-cloudflare
              hosts:
                - host: api.verif.fyi
                  paths:
                    - path: /
                      pathType: Prefix
                      service:
                        identifier: user-storage
                        port: http
              tls:
                - secretName: api.verif.fyi-tls
                  hosts:
                    - api.verif.fyi
    destination:
      server: https://kubernetes.default.svc
      namespace: kyc-store
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true