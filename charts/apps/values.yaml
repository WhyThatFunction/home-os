argoCdConfigs:
  secretMap:
    vaam-eat-aio-repo:
      type: repository
      data:
        url: "https://github.com/vaam-store/vaam-eat-aio"
        name: vaam-eat-aio
        type: git
    apple-health-export:
      type: repository
      data:
        url: "https://whythatfunction.github.io/apple-health-export"
        name: apple-health-export
        type: helm

applications:
  - name: jellyfin
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: external
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/home-apps/jellyfin
    destination:
      server: https://kubernetes.default.svc
      namespace: jellyfin
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
      automated:
        prune: true
        selfHeal: true

  - name: keycloak-ha
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: keycloak
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/home-apps/keycloak-ha
      helm:
        valuesObject:
          keycloak:
            ingress:
              main:
                enabled: false
          db:
            enabled: true
    destination:
      name: home-remote
      namespace: keycloak
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: redis-ha
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: redis
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/home-apps/redis-ha
      # Local deployment: collapse the HA/TLS/OAuth chart to a single bare
      # Redis node (no sentinel, no TLS, no RedisInsight/oauth2, no auth,
      # no external-secrets). Reachable in-cluster at
      # redis-ha-redis.redis-system.svc:6379 with no password.
      helm:
        valuesObject:
          controllers:
            redis:
              replicas: 1
              podDisruptionBudget: null              # lib renders PDB whenever the map exists; null removes it
              containers:
                app:
                  env:
                    REDIS_PASSWORD: null             # drop auth env
                  args:                              # bare single-node start, no ACL/masterauth
                    - /bin/sh
                    - -ec
                    - |
                      mkdir -p /data
                      cp /bootstrap/redis.conf /data/redis.conf
                      {
                        echo "dir /data"
                        echo "appendonly yes"
                      } >> /data/redis.conf
                      exec redis-server /data/redis.conf
                  probes:
                    liveness:
                      spec: { exec: { command: ["/bin/sh", "-ec", "redis-cli -h 127.0.0.1 -p 6379 PING | grep PONG"] } }
                    readiness:
                      spec: { exec: { command: ["/bin/sh", "-ec", "redis-cli -h 127.0.0.1 -p 6379 PING | grep PONG"] } }
                    startup:
                      spec: { exec: { command: ["/bin/sh", "-ec", "redis-cli -h 127.0.0.1 -p 6379 PING | grep PONG"] } }
            sentinel: { enabled: false }
            redisinsight: { enabled: false }
          service:
            sentinel: { enabled: false }
            sentinel-headless: { enabled: false }
            redisinsight: { enabled: false }
          ingress:
            redisinsight-auth2: { enabled: false }
            redisinsight: { enabled: false }
          persistence:
            sentinel-bootstrap: { enabled: false }
            redis-tls: { enabled: false }
            sentinel-tls: { enabled: false }
            redisinsight-data: { enabled: false }
          configMaps:
            sentinel-bootstrap: { enabled: false }
            redis-bootstrap:
              data:
                redis.conf: |
                  bind 0.0.0.0
                  protected-mode no
                  port 6379
                  save 900 1
                  save 300 10
                  save 60 10000
          rawResources:
            redis-tls: { enabled: false }
            sentinel-tls: { enabled: false }
            redisinsight-tls: { enabled: false }
            redisinsight-auth: { enabled: false }
            redisinsight-oauth2-errors: { enabled: false }
            oauth2-proxy-secret: { enabled: false }
            redis-auth-secret: { enabled: false }
    destination:
      name: home-remote
      namespace: redis-system
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: endpoints
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: external
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/home-apps/endpoints
    destination:
      server: https://kubernetes.default.svc
      namespace: endpoints
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: music
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: external
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/home-apps/music
    destination:
      server: https://kubernetes.default.svc
      namespace: music
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
      automated:
        prune: true
        selfHeal: true

  - name: opfs-webauthn
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: external
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: serverless/k/opfs-webauthn
    destination:
      server: https://kubernetes.default.svc
      namespace: serverless-opfs-webauthn
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
      automated:
        prune: true
        selfHeal: true

  # Named distinctly from the child Application it deploys (vymalo-shop) to
  # avoid an argocd-namespace name collision / self-referential sync loop.
  - name: vymalo-shop-deployer
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: external
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: serverless/k/vymalo-shop
    destination:
      server: https://kubernetes.default.svc
      namespace: serverless-vymalo-shop
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
      automated:
        prune: true
        selfHeal: true

  # vaam-store-prod umbrella. Deploys three child Applications (sync-waved):
  #   secrets (0) → pg + redis (5) → app (10)
  # Children defined under charts/home-apps/vaam-store-prod-deployer.
  - name: vaam-store-prod-deployer
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: external
    # ServerSideDiff computes the diff via an SSA dry-run, so fields the
    # apiserver/ESO default in (and that this app never declares) are not
    # flagged as drift. Avoids the permanent cosmetic OutOfSync on the 2
    # GHCR ExternalSecrets the deployer renders, with no brittle field lists.
    additionalAnnotations:
      argocd.argoproj.io/compare-options: ServerSideDiff=true
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/home-apps/vaam-store-prod-deployer
    destination:
      server: https://kubernetes.default.svc
      namespace: argocd                # the 3 child Application CRs land here
    syncPolicy:
      syncOptions:
        - CreateNamespace=false
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

