argoCdConfigs:
  secretMap:
    vaam-eat-aio-repo:
      type: repository
      data:
        url: "https://github.com/vaam-store/vaam-eat-aio"
        name: vaam-eat-aio
        type: git
    apple-health-export:
      type: repository
      data:
        url: "https://whythatfunction.github.io/apple-health-export"
        name: apple-health-export
        type: helm

applications:
  - name: jellyfin
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: external
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/home-apps/jellyfin
    destination:
      server: https://kubernetes.default.svc
      namespace: jellyfin
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
      automated:
        prune: true
        selfHeal: true

  - name: adminer
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: external
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/home-apps/adminer
    destination:
      server: https://kubernetes.default.svc
      namespace: adminer
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
      automated:
        prune: true
        selfHeal: true

  - name: browserless
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: external
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/home-apps/browserless
    destination:
      server: https://kubernetes.default.svc
      namespace: browserless
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
      automated:
        prune: true
        selfHeal: true

  - name: keycloak
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: keycloak
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/home-apps/keycloak
    destination:
      server: https://kubernetes.default.svc
      namespace: keycloak
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: password-manager
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: external
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/home-apps/password-manager
    destination:
      server: https://kubernetes.default.svc
      namespace: password-manager
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: endpoints
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: external
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/home-apps/endpoints
    destination:
      server: https://kubernetes.default.svc
      namespace: endpoints
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: music
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: external
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/home-apps/music
    destination:
      server: https://kubernetes.default.svc
      namespace: music
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
      automated:
        prune: true
        selfHeal: true

  - name: portainer
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: default
    source:
      repoURL: https://portainer.github.io/k8s/
      targetRevision: 2.33.1
      chart: portainer
      helm:
        valuesObject:
          persistence:
            storageClass: longhorn

          service:
            type: ClusterIP

          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: self-signed-ca
            tls:
              - secretName: portainer-tls
                hosts:
                  - portainer.home.ssegning
            hosts:
              - host: portainer.home.ssegning
                paths:
                  - path: /
    destination:
      server: https://kubernetes.default.svc
      namespace: portainer
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
      automated:
        prune: true
        selfHeal: true

  - name: keycloak-backup
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: keycloak
    source:
      repoURL: https://github.com/ADORSYS-GIS/ai-helm
      targetRevision: HEAD
      path: charts/keycloak-backup
      helm:
        releaseName: keycloak-backup
        valueFiles:
          - values.yaml
        valuesObject:
          app-template:
            adminSecret: keycloak-pg-app
            dbSecret: keycloak-pg-app
            s3Secret: keycloak-s3
            controller:
              main:
                initContainer:
                  exporter:
                    image:
                      tag: "26.0"
    destination:
      server: https://kubernetes.default.svc
      namespace: keycloak
    syncPolicy:
      syncOptions:
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: lakefs
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: external
    source:
      repoURL: https://charts.lakefs.io
      targetRevision: 1.8.0
      chart: lakefs
      helm:
        valuesObject:
          replicaCount: 1
          
          image:
            pullPolicy: IfNotPresent
          
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: self-signed-ca
            hosts:
              - host: lakefs.home.ssegning
                paths: []
            tls:
              - secretName: lakefs.home.ssegning-tls
                hosts:
                  - lakefs.home.ssegning
          
          lakefsConfig: |
            database:
              type: local
            blockstore:
              type: local
          
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          
          service:
            type: ClusterIP
            port: 80
    destination:
      server: https://kubernetes.default.svc
      namespace: lakefs
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: mlflow
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: ai
    source:
      repoURL: https://community-charts.github.io/helm-charts
      targetRevision: 1.8.1
      chart: mlflow
      helm:
        valuesObject:
          replicaCount: 1
          
          image:
            repository: burakince/mlflow
            pullPolicy: IfNotPresent
            tag: "3.7.0"
          
          ingress:
            enabled: true
            className: traefik
            annotations:
              cert-manager.io/cluster-issuer: self-signed-ca
            hosts:
              - host: mlflow.home.ssegning
                paths:
                  - path: /
                    pathType: Prefix
            tls:
              - secretName: mlflow.home.ssegning-tls
                hosts:
                  - mlflow.home.ssegning
          
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          
          artifactRoot:
            defaultArtifactRoot: "./mlruns"
            defaultArtifactsDestination: "./mlartifacts"
    destination:
      server: https://kubernetes.default.svc
      namespace: mlflow
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true