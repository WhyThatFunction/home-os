  - name: music
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: external
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/home-apps/music
    destination:
      server: https://kubernetes.default.svc
      namespace: music
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
      automated:
        prune: true
        selfHeal: true

  - name: portainer
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: default
    source:
      repoURL: https://portainer.github.io/k8s/
      targetRevision: 2.33.1
      chart: portainer
      helm:
        valuesObject:
          persistence:
            storageClass: longhorn

          service:
            type: ClusterIP

          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: self-signed-ca
            tls:
              - secretName: portainer-tls
                hosts:
                  - portainer.home.ssegning
            hosts:
              - host: portainer.home.ssegning
                paths:
                  - path: /
    destination:
      server: https://kubernetes.default.svc
      namespace: portainer
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
      automated:
        prune: true
        selfHeal: true

  - name: keycloak-backup
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: keycloak
    source:
      repoURL: https://github.com/ADORSYS-GIS/ai-helm
      targetRevision: HEAD
      path: charts/keycloak-backup
      helm:
        releaseName: keycloak-backup
        valueFiles:
          - values.yaml
        valuesObject:
          app-template:
            adminSecret: keycloak-pg-app
            dbSecret: keycloak-pg-app
            s3Secret: keycloak-s3
            controller:
              main:
                initContainer:
                  exporter:
                    image:
                      tag: "26.0"
    destination:
      server: https://kubernetes.default.svc
      namespace: keycloak
    syncPolicy:
      syncOptions:
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: lakefs
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: ml
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/ml/lake-fs
    destination:
      server: https://kubernetes.default.svc
      namespace: lakefs
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
