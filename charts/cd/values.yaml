                    refreshInterval: 1h0m0s
                    secretStoreRef:
                      name: ssegning-aws
                      kind: ClusterSecretStore
                    target:
                      name: mail-config
                      creationPolicy: Owner
                    data:
                      - secretKey: ALLOWED_SENDER_DOMAINS
