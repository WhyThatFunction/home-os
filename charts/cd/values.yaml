  - name: sky-runners-bff
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: arc-runner
    sources:
      - repoURL: "oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set"
        targetRevision: 0.13.1
        chart: "."
        helm:
          releaseName: arc-runner-set-sky
          valuesObject:
            githubConfigUrl: https://github.com/skyengpro/azamra-tokenization-bff
            githubConfigSecret: gh-runner-secret-pat

            maxRunners: 2

            minRunners: 0

            controllerServiceAccount:
              namespace: arc-systems
              name: arc-gha-rs-controller

            template:
              spec:
                # fsGroup makes the emptyDir volumes group-owned by 1001 and
                # group-writable, so the uid-1001 runner can mkdir inside the
                # tool cache mounted at /opt/hostedtoolcache (ruby/setup-ruby
                # hardcodes that path and ignores RUNNER_TOOL_CACHE).
                securityContext:
                  fsGroup: 1001
                imagePullSecrets:
                  - name: ghcr-pull-secret
                containers:
                  - name: runner
                    # Rootless buildah/podman (daemonless) — the privileged dind
                    # sidecar was removed; image builds run via buildah inside the
                    # runner itself (vfs storage + chroot isolation, no /dev/fuse
                    # or userns). Consumers build with buildah, not docker.
                    image: ghcr.io/vymalo/arc-runners:jdk21-node22
                    # moving tag → force a fresh pull each pod (K8s defaults non-:latest to IfNotPresent)
                    imagePullPolicy: Always
                    command: [ "/home/runner/run.sh" ]
                    resources:
                      requests:
                        cpu: 500m
                        memory: 1Gi
                      limits:
                        cpu: "2"
                        memory: 6Gi
                    env:
                      # Rootless container build/run (buildah/podman) with no
                      # /dev/fuse or userns: vfs storage + chroot isolation.
                      - name: STORAGE_DRIVER
                        value: vfs
                      - name: BUILDAH_ISOLATION
                        value: chroot
                      # ruby/setup-ruby always installs under /opt/hostedtoolcache
                      # on Linux, so anchor the whole tool cache there to share
                      # one volume across setup-node/java/ruby.
                      - name: RUNNER_TOOL_CACHE
                        value: /opt/hostedtoolcache
                      - name: SCCACHE_BUCKET
                        value: sc-cache
                      - name: SCCACHE_ENDPOINT
                        value: s3.ssegning.me
                      - name: TURBO_API
                        value: http://turbo-cache.turbo-cache.svc.cluster.local
                      - name: TURBO_TEAM
                        value: vaam
                      - name: TURBO_TOKEN
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: turbo-token } }
                      - name: SCCACHE_S3_ACCESS_KEY_ID
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: access-key-id } }
                      - name: SCCACHE_S3_SECRET_ACCESS_KEY
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: secret-access-key } }
                      - name: AWS_ACCESS_KEY_ID
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: access-key-id } }
                      - name: AWS_SECRET_ACCESS_KEY
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: secret-access-key } }
                    securityContext:
                      runAsUser: 1001
                      runAsGroup: 1001
                      allowPrivilegeEscalation: true
                    volumeMounts:
                      - name: work
                        mountPath: /home/runner/_work
                      - name: tool-cache
                        mountPath: /opt/hostedtoolcache
                      # rootless graphroot for buildah/podman image storage
                      - name: containers
                        mountPath: /home/runner/.local/share/containers
                volumes:
                  - name: work
                    emptyDir: { }
                  - name: tool-cache
                    emptyDir: { }
                  - name: containers
                    emptyDir: { }

    destination:
      name: home-remote
      namespace: gh-runners-sky
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

