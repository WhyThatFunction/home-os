  # SSE runners without Docker-in-Docker. Use for workflows that don't need
  # Docker (lint, test, static analysis, etc.). runs-on: arc-runner-set-sse
  - name: gis-sse-runners
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: arc-runner
    sources:
      - repoURL: "oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set"
        targetRevision: 0.13.1
        chart: "."
        helm:
          releaseName: arc-runner-set-sse
          valuesObject:
            githubConfigUrl: https://github.com/ADORSYS-GIS
            githubConfigSecret: gh-runner-secret-pat
            runnerScaleSetName: arc-runner-set-sse
            runnerGroup: flaky-rescue

            maxRunners: 4
            minRunners: 0

            controllerServiceAccount:
              namespace: arc-systems
              name: arc-gha-rs-controller

            template:
              spec:
                securityContext:
                  fsGroup: 1001
                imagePullSecrets:
                  - name: ghcr-pull-secret
                containers:
                  - name: runner
                    # vymalo/arc-runners#1 — rootless buildah/podman/yq + the baked
                    # toolchain the sse jobs need (yq for flutter-action, sccache, …).
                    # Replaces the stock actions-runner image, which had no yq (the
                    # mobile-ci "yq not found" failure) and no container tooling for
                    # the migrated buildah/podman jobs.
                    image: ghcr.io/vymalo/arc-runners:jdk21-node22
                    # moving tag → force a fresh pull each pod (K8s defaults non-:latest to IfNotPresent)
                    imagePullPolicy: Always
                    # The gha-runner-scale-set chart only injects the default
                    # `command: [/home/runner/run.sh]` on its own default runner
                    # container. Overriding `template.spec.containers` replaces
                    # that list wholesale, so without an explicit command the
                    # stock actions-runner image runs its no-op default CMD,
                    # exits 0 in <1s, and the JIT-registered runner never comes
                    # online — leaving queued jobs unserved and the listener
                    # churning replacements forever. Mirror sky-frontend.
                    command: [ "/home/runner/run.sh" ]
                    resources:
                      requests:
                        cpu: 500m
                        memory: 1Gi
                      limits:
                        cpu: "2"
                        memory: 6Gi
                    env:
                      # Rootless container build/run (buildah/podman) with no
                      # /dev/fuse or userns: vfs storage + chroot isolation.
                      - name: STORAGE_DRIVER
                        value: vfs
                      - name: BUILDAH_ISOLATION
                        value: chroot
                      - name: RUNNER_TOOL_CACHE
                        value: /opt/hostedtoolcache
                      - name: SCCACHE_BUCKET
                        value: sc-cache
                      - name: SCCACHE_ENDPOINT
                        value: s3.ssegning.me
                      - name: TURBO_API
                        value: http://turbo-cache.turbo-cache.svc.cluster.local
                      - name: TURBO_TEAM
                        value: vaam
                      - name: TURBO_TOKEN
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: turbo-token } }
                      - name: SCCACHE_S3_ACCESS_KEY_ID
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: access-key-id } }
                      - name: SCCACHE_S3_SECRET_ACCESS_KEY
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: secret-access-key } }
                      - name: AWS_ACCESS_KEY_ID
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: access-key-id } }
                      - name: AWS_SECRET_ACCESS_KEY
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: secret-access-key } }
                    securityContext:
                      runAsUser: 1001
                      runAsGroup: 1001
                      # Let the setuid newuidmap/newgidmap map subuids so rootless
                      # buildah/podman can create their user namespace. Still non-root
                      # (runAsUser 1001), no added caps — far less than the old
                      # privileged: true dind sidecar this replaces.
                      allowPrivilegeEscalation: true
                    volumeMounts:
                      - name: work
                        mountPath: /home/runner/_work
                      - name: tool-cache
                        mountPath: /opt/hostedtoolcache
                      # rootless graphroot for buildah/podman image storage
                      - name: containers
                        mountPath: /home/runner/.local/share/containers
                volumes:
                  - name: work
                    emptyDir: { }
                  - name: tool-cache
                    emptyDir: { }
                  - name: containers
                    emptyDir: { sizeLimit: 20Gi }

      - repoURL: https://bjw-s-labs.github.io/helm-charts
        targetRevision: 4.6.2
        chart: app-template
        helm:
          valuesObject:
            rawResources:
              auth-secret:
                enabled: true
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                spec:
                  spec:
                    refreshInterval: 0h10m0s
                    secretStoreRef:
                      name: ssegning-aws
                      kind: ClusterSecretStore
                    target:
                      name: gh-runner-secret-pat
                      creationPolicy: Owner
                    data:
                      - secretKey: github_token
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: github_token
              arc-runner-secrets:
                enabled: true
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                spec:
                  spec:
                    refreshInterval: 0h10m0s
                    secretStoreRef:
                      name: ssegning-aws
                      kind: ClusterSecretStore
                    target:
                      name: arc-runner-secrets
                      creationPolicy: Owner
                    data:
                      - secretKey: turbo-token
                        remoteRef:
                          key: "prod/artifact-cache/env"
                          property: turbo_token
                      - secretKey: access-key-id
                        remoteRef:
                          key: "prod/artifact-cache/env"
                          property: object_storage_access_key
                      - secretKey: secret-access-key
                        remoteRef:
                          key: "prod/artifact-cache/env"
                          property: object_storage_secret_key
              gh-pull-token:
                enabled: true
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                spec:
                  spec:
                    refreshInterval: 0h10m0s
                    secretStoreRef:
                      name: ssegning-aws
                      kind: ClusterSecretStore
                    target:
                      name: ghcr-pull-secret
                      creationPolicy: Owner
                      template:
                        engineVersion: v2
                        type: kubernetes.io/dockerconfigjson
                        data:
                          .dockerconfigjson: |
                            {
                              "auths": {
                                "ghcr.io": {
                                  "username": "{{ `{{ .github_username }}` }}",
                                  "password": "{{ `{{ .github_token }}` }}",
                                  "email": "{{ `{{ .github_email }}` }}",
                                  "auth": "{{ `{{ printf "%s:%s" .github_username .github_token | b64enc }}` }}"
                                }
                              }
                            }
                    data:
                      - secretKey: github_username
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: github_username
                      - secretKey: github_token
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: github_token
                      - secretKey: github_email
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: github_email

    destination:
      name: home-remote
      namespace: gh-runners-sse
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  # Self-hosted runners for the vymalo org (CI for vymalo-shop & co.). Org-level
