  - name: vaam-runners
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: arc-runner
    sources:
      - repoURL: "oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set"
        targetRevision: 0.13.1
        chart: "."
        helm:
          releaseName: arc-runner-set-vaam
          valuesObject:
            githubConfigUrl: https://github.com/vaam-store
            githubConfigSecret: gh-runner-secret-pat

            maxRunners: 10
            minRunners: 0

            controllerServiceAccount:
              namespace: arc-systems
              name: arc-gha-rs-controller

            template:
              spec:
                imagePullSecrets:
                  - name: ghcr-pull-secret
                containers:
                  - name: dind
                    image: docker:29-dind
                    securityContext:
                      privileged: true
                    env:
                      - name: DOCKER_TLS_CERTDIR
                        value: ""
                    args:
                      - dockerd
                      - --host=tcp://0.0.0.0:2375
                      - --host=unix:///var/run/docker.sock
                    startupProbe:
                      tcpSocket:
                        port: 2375
                      failureThreshold: 24
                      periodSeconds: 5
                    volumeMounts:
                      - name: docker-graph
                        mountPath: /var/lib/docker
                      - name: work
                        mountPath: /home/runner/_work

                  - name: runner
                    image: ghcr.io/vaam-store/vaam-arc-runner:110863c
                    command: [ "/bin/sh", "-c" ]
                    args:
                      - sleep 15; exec /home/runner/run.sh
                    env:
                      - name: DOCKER_HOST
                        value: tcp://localhost:2375
                    securityContext:
                      runAsUser: 1001
                      runAsGroup: 1001
                    volumeMounts:
                      - name: work
                        mountPath: /home/runner/_work
                volumes:
                  - name: docker-graph
                    emptyDir: { }
                  - name: work
                    emptyDir: { }

      - repoURL: https://bjw-s-labs.github.io/helm-charts
        targetRevision: 4.6.2
        chart: app-template
        helm:
          valuesObject:
            rawResources:
              redis-auth-secret:
                enabled: true
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                spec:
                  spec:
                    refreshInterval: 0h10m0s
                    secretStoreRef:
                      name: ssegning-aws
                      kind: ClusterSecretStore
                    target:
                      name: gh-runner-secret-pat
                      creationPolicy: Owner
                    data:
                      - secretKey: github_token
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: github_token
              gh-pull-token:
                enabled: true
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                spec:
                  spec:
                    refreshInterval: 0h10m0s
                    secretStoreRef:
                      name: ssegning-aws
                      kind: ClusterSecretStore
                    target:
                      name: ghcr-pull-secret
                      creationPolicy: Owner
                      template:
                        engineVersion: v2
                        type: kubernetes.io/dockerconfigjson
                        data:
                          .dockerconfigjson: |
                            {
                              "auths": {
                                "ghcr.io": {
                                  "username": "{{ `{{ .github_username }}` }}",
                                  "password": "{{ `{{ .github_token }}` }}",
                                  "email": "{{ `{{ .github_email }}` }}",
                                  "auth": "{{ `{{ printf "%s:%s" .github_username .github_token | b64enc }}` }}"
                                }
                              }
                            }
                    data:
                      - secretKey: github_username
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: github_username
                      - secretKey: github_token
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: github_token
                      - secretKey: github_email
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: github_email
    destination:
      name: home-remote
      namespace: gh-runners-vaam
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

