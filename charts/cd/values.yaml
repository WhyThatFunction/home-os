      helm:
        releaseName: knative-serving
        valuesObject:
          rawResources:
            serving:
              apiVersion: operator.knative.dev/v1beta1
              kind: KnativeServing
              spec:
                spec:
                  workloads:
                    - name: net-gateway-api-webhook
                      resources:
                        - container: webhook
                          requests:
                            cpu: 100m
                            memory: 100Mi
                          limits:
                            cpu: 500m
                            memory: 500Mi
                      livenessProbes:
                        - container: webhook
                          initialDelaySeconds: 60
                          periodSeconds: 10
                          failureThreshold: 6
                    - name: controller
                      resources:
                        - container: controller
                          requests:
                            cpu: 300m
                            memory: 100Mi
                          limits:
                            cpu: 1000m
                            memory: 250Mi
                  ingress:
                    gateway-api:
                      enabled: true
                  config:
                    features:
                      kubernetes.podspec-nodeselector: "enabled"
                      kubernetes.podspec-persistent-volume-claim: "enabled"
                      kubernetes.podspec-persistent-volume-write: "enabled"
                    domain:
                      "serverless.mlops.camer.digital": ""
                    gateway:
                      external-gateways: |
                        - class: traefik
                          gateway: kube-system/traefik-gateway
                          service: kube-system/traefik
                      local-gateways: |
                        - class: traefik
                          gateway: kube-system/traefik-gateway
                          service: kube-system/traefik
                    network:
                      ingress-class: gateway-api.ingress.networking.knative.dev
                      domain-template: "{{ `{{ .Name }}` }}-{{ `{{ .Namespace }}` }}--{{ `{{ .Domain }}` }}"
                    certmanager:
                      issuerRef: |
                        kind: ClusterIssuer
                        name: cert-home-cert-http
                      clusterLocalIssuerRef: |
                        kind: ClusterIssuer
                        name: self-signed-ca
                      systemInternalIssuerRef: |
                        kind: ClusterIssuer
                        name: self-signed-ca
    destination:
      name: home-remote
      namespace: knative-serving
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: knative-serving-netcup
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: "https://bjw-s-labs.github.io/helm-charts"
      targetRevision: "4.*"
      chart: "app-template"
      helm:
        releaseName: knative-serving
        valuesObject:
          rawResources:
            serving:
              apiVersion: operator.knative.dev/v1beta1
              kind: KnativeServing
              spec:
                spec:
                  workloads:
                    - name: net-gateway-api-webhook
                      resources:
                        - container: webhook
                          requests:
                            cpu: 100m
                            memory: 100Mi
                          limits:
                            cpu: 500m
                            memory: 500Mi
                      livenessProbes:
                        - container: webhook
                          initialDelaySeconds: 60
                          periodSeconds: 10
                          failureThreshold: 6
                    - name: controller
                      resources:
                        - container: controller
                          requests:
                            cpu: 300m
                            memory: 100Mi
                          limits:
                            cpu: 1000m
                            memory: 250Mi
                  ingress:
                    gateway-api:
                      enabled: true
                  config:
                    features:
                      kubernetes.podspec-nodeselector: "enabled"
                      kubernetes.podspec-persistent-volume-claim: "enabled"
                      kubernetes.podspec-persistent-volume-write: "enabled"
                    domain:
                      "sls.servers.segning.pro": ""
                    gateway:
                      external-gateways: |
                        - class: traefik
                          gateway: kube-system/traefik-gateway
                          service: kube-system/traefik
                      local-gateways: |
                        - class: traefik
                          gateway: kube-system/traefik-gateway
                          service: kube-system/traefik
                    network:
                      ingress-class: gateway-api.ingress.networking.knative.dev
                      domain-template: "{{ `{{ .Name }}` }}--ns-{{ `{{ .Namespace }}` }}.{{ `{{ .Domain }}` }}"
                    certmanager:
                      issuerRef: |
                        kind: ClusterIssuer
                        name: cert-cloudflare
                      clusterLocalIssuerRef: |
                        kind: ClusterIssuer
                        name: self-signed-ca
                      systemInternalIssuerRef: |
                        kind: ClusterIssuer
                        name: self-signed-ca
    destination:
      name: netcup-k8s
      namespace: knative-serving
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

# Shared byte-for-byte across all 4 arcRunnerPools below. Deliberately NOT
# templated here (this is a values file, not a template) - the
# `{{ `{{ .github_x }}` }}` text must survive untouched by this chart's own
# Helm pass and land as single-braced {{ .github_x }} after the bjw-s
# app-template chart's `tpl` call, for external-secrets' own template engine
# to fill in at Secret-creation time. Referenced verbatim (no further
# templating) from templates/arc-runner-pools.yaml.
arcRunnerGhcrDockerconfigTemplate: |
  {
    "auths": {
      "ghcr.io": {
        "username": "{{ `{{ .github_username }}` }}",
        "password": "{{ `{{ .github_token }}` }}",
        "email": "{{ `{{ .github_email }}` }}",
        "auth": "{{ `{{ printf "%s:%s" .github_username .github_token | b64enc }}` }}"
      }
    }
  }

# Rendered by templates/arc-runner-pools.yaml into 4 plain Applications
# (gis-sse-runners, gis-lightbridge-ai-runners, vymalo-runners,
# adorsys-gis-runner-runners) - previously 4 hand-duplicated ~250-line
# blocks under `applications:` above, ~95% identical. Only the fields
# below actually vary per pool; everything else (image, env, affinity,
# secrets) is shared boilerplate in the template.
arcRunnerPools:
  - name: gis-sse-runners
    releaseName: arc-runner-set-sse
    githubConfigUrl: https://github.com/ADORSYS-GIS
    runnerScaleSetName: arc-runner-set-sse
    runnerGroup: flaky-rescue
    maxRunners: 10
    requestsMemory: 1Gi
    containersSizeLimit: 20Gi
    turboApi: http://turbo-cache.turbo-cache.svc.cluster.local
    turboTeam: vaam
    destinationCluster: netcup-k8s
    namespace: gh-runners-gis-sse-runners
    managedNamespacePrivileged: true

  - name: gis-lightbridge-ai-runners
    releaseName: adorsys-gis-runner
    githubConfigUrl: https://github.com/ADORSYS-GIS
    runnerScaleSetName: adorsys-gis-runner
    runnerGroup: lightbridge-ai
    maxRunners: 3
    requestsMemory: 1Gi
    containersSizeLimit: 20Gi
    turboApi: http://turbo-cache.turbo-cache.svc.cluster.local
    turboTeam: vaam
    destinationCluster: home-remote
    namespace: gh-runners-lightbridge-ai
    managedNamespacePrivileged: false

  - name: vymalo-runners
    releaseName: vymalo-vps
    githubConfigUrl: https://github.com/vymalo
    runnerScaleSetName: vymalo-netcup-set
    runnerGroup: default
    scaleSetLabels:
      - linux
      - x64
      - vps
      - buildah
      - self-hosted
      - vymalo-vps
    maxRunners: 10
    requestsMemory: 2Gi
    containersSizeLimit: 30Gi
    turboApi: https://turbo-cache-api.ai.camer.digital
    turboTeam: vymalo
    destinationCluster: netcup-k8s
    namespace: gh-runners-vymalo
    managedNamespacePrivileged: true

  - name: adorsys-gis-runner-runners
    releaseName: adorsys-gis-runner
    githubConfigUrl: https://github.com/ADORSYS-GIS
    runnerScaleSetName: adorsys-gis-runner-netcup-set
    runnerGroup: lightbridge-ai
    scaleSetLabels:
      - linux
      - x64
      - vps
      - buildah
      - self-hosted
      - adorsys-gis-runner
    maxRunners: 7
    requestsMemory: 2Gi
    containersSizeLimit: 30Gi
    turboApi: https://turbo-cache-api.ai.camer.digital
    turboTeam: adorsys-gis
    destinationCluster: netcup-k8s
    namespace: gh-runners-adorsys-gis
    managedNamespacePrivileged: true
