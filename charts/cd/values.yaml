  - name: cnpg
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://cloudnative-pg.github.io/charts
      targetRevision: 0.27.1
      chart: cloudnative-pg
      helm:
        releaseName: cnpg
        valuesObject:
          resources:
            limits:
