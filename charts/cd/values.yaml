                      local-gateways: |
                        - class: traefik
                          gateway: kube-system/traefik-gateway
                          service: kube-system/traefik
                    network:
                      ingress-class: gateway-api.ingress.networking.knative.dev
                      domain-template: "{{ `{{ .Name }}` }}-{{ `{{ .Namespace }}` }}--{{ `{{ .Domain }}` }}"
                    certmanager:
                      issuerRef: |
                        kind: ClusterIssuer
                        name: cert-home-cert-http
                      clusterLocalIssuerRef: |
                        kind: ClusterIssuer
                        name: self-signed-ca
                      systemInternalIssuerRef: |
                        kind: ClusterIssuer
                        name: self-signed-ca
    destination:
      name: home-remote
