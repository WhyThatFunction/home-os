  - name: gis-sse-runners
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: arc-runner
    sources:
      - repoURL: "oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set"
        targetRevision: "0.*"
        chart: "."
        helm:
          releaseName: arc-runner-set-sse
          valuesObject:
            githubConfigUrl: https://github.com/ADORSYS-GIS
            githubConfigSecret: gh-runner-secret-pat
            runnerScaleSetName: arc-runner-set-sse
            runnerGroup: flaky-rescue

            maxRunners: 2
            minRunners: 0

            controllerServiceAccount:
              namespace: arc-systems
              name: arc-gha-rs-controller

            template:
              spec:
                affinity:
                  podAntiAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      - topologyKey: kubernetes.io/hostname
                        # cross-set, cross-namespace: at most ONE runner of
                        # ANY scale-set per node. namespaceSelector {} spans
                        # the per-set namespaces (anti-affinity defaults to
                        # same-ns); component=runner excludes the listeners.
                        namespaceSelector: {}
                        labelSelector:
                          matchLabels:
                            app.kubernetes.io/component: runner
                securityContext:
                  fsGroup: 1001
                imagePullSecrets:
                  - name: ghcr-pull-secret
                containers:
                  - name: runner
                    # vymalo/arc-runners#1 — rootless buildah/podman/yq + the baked
                    # toolchain the sse jobs need (yq for flutter-action, sccache, …).
                    # Replaces the stock actions-runner image, which had no yq (the
                    # mobile-ci "yq not found" failure) and no container tooling for
                    # the migrated buildah/podman jobs.
                    image: ghcr.io/vymalo/arc-runners:jdk21-node22
                    # moving tag → force a fresh pull each pod (K8s defaults non-:latest to IfNotPresent)
                    imagePullPolicy: Always
                    # The gha-runner-scale-set chart only injects the default
                    # `command: [/home/runner/run.sh]` on its own default runner
                    # container. Overriding `template.spec.containers` replaces
                    # that list wholesale, so without an explicit command the
                    # stock actions-runner image runs its no-op default CMD,
                    # exits 0 in <1s, and the JIT-registered runner never comes
                    # online — leaving queued jobs unserved and the listener
                    # churning replacements forever. Mirror sky-frontend.
                    command: [ "/home/runner/run.sh" ]
                    resources:
                      requests:
                        cpu: 500m
                        memory: 1Gi
                      limits:
                        cpu: "2"
                        memory: 8Gi
                    env:
                      # Rootless container build/run (buildah/podman) with no
                      # /dev/fuse or userns: vfs storage + chroot isolation.
                      - name: STORAGE_DRIVER
                        value: vfs
                      - name: BUILDAH_ISOLATION
                        value: chroot
                      # cargo/rustc (and make -j, nproc) read the HOST cpu count
                      # (8 on these nodes), NOT the cgroup cpu limit — so cargo
                      # defaults to -j8 and 8 parallel rustc blow past the 8Gi limit
                      # → cgroup OOMKill ("cargo builds destroyed"). Pin parallelism
                      # to the cpu allotment so peak memory stays well under 8Gi.
                      - name: CARGO_BUILD_JOBS
                        value: "2"
                      # CI gets no benefit from incremental and it inflates peak
                      # memory + disk; off is the CI norm.
                      - name: CARGO_INCREMENTAL
                        value: "0"
                      - name: RUNNER_TOOL_CACHE
                        value: /opt/hostedtoolcache
                      - name: SCCACHE_BUCKET
                        value: sc-cache
                      - name: SCCACHE_ENDPOINT
                        value: s3.ssegning.me
                      - name: TURBO_API
                        value: http://turbo-cache.turbo-cache.svc.cluster.local
                      - name: TURBO_TEAM
                        value: vaam
                      - name: TURBO_TOKEN
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: turbo-token } }
                      - name: SCCACHE_S3_ACCESS_KEY_ID
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: access-key-id } }
                      - name: SCCACHE_S3_SECRET_ACCESS_KEY
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: secret-access-key } }
                      - name: AWS_ACCESS_KEY_ID
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: access-key-id } }
                      - name: AWS_SECRET_ACCESS_KEY
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: secret-access-key } }
                    securityContext:
                      runAsUser: 1001
                      runAsGroup: 1001
                      # The Hetzner runner nodes block unprivileged userns uid_map
                      # writes, so rootless buildah/podman can't map subuids for a
                      # `podman run` — and a NON-privileged pod can't be made to (a
                      # shared host userns EPERMs newuidmap's multi-range map; a
                      # hostUsers:false pod's fixed 65536-uid namespace has no room for
                      # a subuid range, so image extraction dies on /etc/shadow). See
                      # home-os#106/#107. `privileged` runs the inner container without
                      # id-shifting, which is the reliable fix for podman-run jobs.
                      # (A CI runner already executes arbitrary job code.)
                      #
                      # privileged ALREADY grants all capabilities, disables
                      # no_new_privs, and runs unconfined by AppArmor + seccomp — so no
                      # allowPrivilegeEscalation / capabilities.add / appArmorProfile is
                      # needed here (verified end-to-end: bare `privileged: true` runs
                      # `podman run postgres:17-alpine` fine, AppArmor `unconfined`).
                      privileged: true
                    volumeMounts:
                      - name: work
                        mountPath: /home/runner/_work
                      - name: tool-cache
                        mountPath: /opt/hostedtoolcache
                      # rootless graphroot for buildah/podman image storage
                      - name: containers
                        mountPath: /home/runner/.local/share/containers
                volumes:
                  - name: work
                    emptyDir: { }
                  - name: tool-cache
                    emptyDir: { }
                  - name: containers
                    emptyDir: { sizeLimit: 20Gi }

      - repoURL: https://bjw-s-labs.github.io/helm-charts
        targetRevision: 4.6.2
        chart: app-template
        helm:
          valuesObject:
            rawResources:
              auth-secret:
                enabled: true
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                spec:
                  spec:
                    refreshInterval: 0h10m0s
                    secretStoreRef:
                      name: ssegning-aws
                      kind: ClusterSecretStore
                    target:
                      name: gh-runner-secret-pat
                      creationPolicy: Owner
                    data:
                      - secretKey: github_token
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: github_token
              arc-runner-secrets:
                enabled: true
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                spec:
                  spec:
                    refreshInterval: 0h10m0s
                    secretStoreRef:
                      name: ssegning-aws
                      kind: ClusterSecretStore
                    target:
                      name: arc-runner-secrets
                      creationPolicy: Owner
                    data:
                      - secretKey: turbo-token
                        remoteRef:
                          key: "prod/artifact-cache/env"
                          property: turbo_token
                      - secretKey: access-key-id
                        remoteRef:
                          key: "prod/artifact-cache/env"
                          property: object_storage_access_key
                      - secretKey: secret-access-key
                        remoteRef:
                          key: "prod/artifact-cache/env"
                          property: object_storage_secret_key
              gh-pull-token:
                enabled: true
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                spec:
                  spec:
                    refreshInterval: 0h10m0s
                    secretStoreRef:
                      name: ssegning-aws
                      kind: ClusterSecretStore
                    target:
                      name: ghcr-pull-secret
                      creationPolicy: Owner
                      template:
                        engineVersion: v2
                        type: kubernetes.io/dockerconfigjson
                        data:
                          .dockerconfigjson: |
                            {
                              "auths": {
                                "ghcr.io": {
                                  "username": "{{ `{{ .github_username }}` }}",
                                  "password": "{{ `{{ .github_token }}` }}",
                                  "email": "{{ `{{ .github_email }}` }}",
                                  "auth": "{{ `{{ printf "%s:%s" .github_username .github_token | b64enc }}` }}"
                                }
                              }
                            }
                    data:
                      - secretKey: github_username
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: github_username
                      - secretKey: github_token
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: github_token
                      - secretKey: github_email
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: github_email

    destination:
      name: home-remote
      namespace: gh-runners-sse
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

