applications:
  - name: cd
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/cd
    destination:
      server: https://kubernetes.default.svc
      namespace: argocd
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: home-secrets
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://github.com/WhyThatFunction/home-secrets
      targetRevision: HEAD
      path: manifests
    destination:
      server: https://kubernetes.default.svc
      namespace: argocd
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: storage
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/storage
    destination:
      server: https://kubernetes.default.svc
      namespace: kube-system
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: nvidia
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://nvidia.github.io/k8s-device-plugin
      targetRevision: 0.13.0
      chart: nvidia-device-plugin
      helm:
        valuesObject:
          runtimeClassName: nvidia
          nodeSelector:
            gpu-node: "true"
    destination:
      server: https://kubernetes.default.svc
      namespace: kube-system
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: cloudnative-pg
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://charts.bitnami.com/bitnami
      targetRevision: 1.0.11
      chart: cloudnative-pg
      helm:
        valuesObject:
          global:
            defaultStorageClass: longhorn-local
            security:
              allowInsecureImages: true
          operator:
            image:
              registry: bitnamilegacy
              repository: cloudnative-pg
            postgresqlImage:
              registry: bitnamilegacy
              repository: postgresql
          pluginBarmanCloud:
            enabled: true
            image:
              repository: bitnamilegacy/plugin-barman-cloud
            sidecarImage:
              repository: bitnamilegacy/plugin-barman-cloud-sidecar
    destination:
      server: https://kubernetes.default.svc
      namespace: cloudnative-pg
    syncPolicy:
      syncOptions:
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: traefik
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://traefik.github.io/charts
      targetRevision: 38.0.2
      chart: traefik
      helm:
        valuesObject:
          additionalArguments:
            - "--api.dashboard=true"
            - "--api.insecure=true"
            - "--serversTransport.insecureSkipVerify=true"
            - "--log.level=ERROR"
            - "--entryPoints.web.http.redirections.entryPoint.to=:443"
            - "--entryPoints.web.http.redirections.entryPoint.scheme=https"
            - "--entryPoints.web.http2.maxConcurrentStreams=1000"
            - "--entryPoints.websecure.http2.maxConcurrentStreams=1000"
            - "--global.sendAnonymousUsage=false"
            # Uncomment the next line if you want to use your self-signed cert for Traefik dashboard
            # - "--entrypoints.websecure.http.tls.domains[0].main=*.home.ssegning"
          logs:
            access:
              enabled: false
          service:
            loadBalancerIP: 10.10.0.140
          ports:
            web:
              forwardedHeaders:
                trustedIPs:
                  - 10.10.0.0/24
            websecure:
              forwardedHeaders:
                trustedIPs:
                  - 10.10.0.0/24
            traefik:
              expose:
                web: true
                websecure: true
          providers:
            kubernetesCRD:
              allowCrossNamespace: true
            kubernetesGateway:
              enabled: true
          
          gateway:
            namespacePolicy: All
          
          ingressRoute:
            dashboard:
              enabled: true
              entryPoints:
                - web
                - websecure
              matchRule: Host(`traefik.home.ssegning`)
              tls:
                secretName: traefik.home.ssegning-tls
          
          extraObjects:
            - |
              apiVersion: cert-manager.io/v1
              kind: Certificate
              metadata:
                name: traefik-certificate
              spec:
                secretName: traefik.home.ssegning-tls
                issuerRef:
                  kind: ClusterIssuer
                  name: self-signed-ca
                  group: cert-manager.io
                commonName: traefik.home.ssegning
                dnsNames: 
                  - traefik.home.ssegning
    destination:
      server: https://kubernetes.default.svc
      namespace: kube-system
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
      automated:
        prune: true
        selfHeal: true

  - name: cert
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/cert
    destination:
      server: https://kubernetes.default.svc
      namespace: kube-system
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
  
  - name: s3
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/s3
    destination:
      server: https://kubernetes.default.svc
      namespace: s3
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: apps
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: base-apps
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/apps
    destination:
      server: https://kubernetes.default.svc
      namespace: argocd
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: redis
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: base-apps
    source:
      repoURL: registry-1.docker.io/bitnamicharts
      targetRevision: 24.0.0
      chart: redis
      helm:
        valuesObject:
          global:
            defaultStorageClass: longhorn-local
          auth:
            enabled: false
          image:
            repository: bitnamilegacy/redis
          architecture: replication
          replica:
            replicaCount: 2
    destination:
      server: https://kubernetes.default.svc
      namespace: database
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: knative-operator
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://knative.github.io/operator
      targetRevision: v1.18.1
      chart: knative-operator
    destination:
      server: https://kubernetes.default.svc
      namespace: knative-operator
    syncPolicy:
      syncOptions:
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: mail
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://bokysan.github.io/docker-postfix
      targetRevision: 4.4.0
      chart: mail
      helm:
        valuesObject:
          existingSecret: mail-config
          config:
            general:
              TZ: "Europe/Berlin"
              ANONYMIZE_EMAILS: "smart"
          persistence:
            enabled: true
            storageClass: longhorn
    destination:
      server: https://kubernetes.default.svc
      namespace: mail
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: ai-apps
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: ai
    source:
      repoURL: https://github.com/ADORSYS-GIS/ai-helm
      targetRevision: HEAD
      path: charts/apps
    destination:
      server: https://kubernetes.default.svc
      namespace: argocd
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: arc-runners
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: arc-runner
    source:
      repoURL: "oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set-controller"
      targetRevision: 0.13.1
      chart: "."
      helm:
        releaseName: arc
    destination:
      server: https://kubernetes.default.svc
      namespace: arc-systems
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: sky-runners
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: arc-runner
    source:
      repoURL: "oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set"
      targetRevision: 0.13.1
      chart: "."
      helm:
        releaseName: arc-runner-set-sky
        valuesObject:
          githubConfigUrl: https://github.com/skyengpro/azamra-tokenization-bff
          githubConfigSecret: gh-runner-secret-pat

          maxRunners: 5

          minRunners: 0

          runnerGroup: "skyengpro-runner-group"

          ## name of the runner scale set to create. Defaults to the helm release name
          runnerScaleSetName: "skyengpro-projects-scale-set"

          controllerServiceAccount:
            namespace: arc-systems
            name: arc-gha-rs-controller

          template:
            spec:
              initContainers:
                - name: init-dind-externals
                  image: ghcr.io/actions/actions-runner:latest
                  command: [ "cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/" ]
                  volumeMounts:
                    - name: dind-externals
                      mountPath: /home/runner/tmpDir
                - name: init-dind-rootless
                  image: docker:dind-rootless
                  command:
                    - sh
                    - -c
                    - |
                      set -x
                      cp -a /etc/. /dind-etc/
                      echo 'runner:x:1001:1001:runner:/home/runner:/bin/ash' >> /dind-etc/passwd
                      echo 'runner:x:1001:' >> /dind-etc/group
                      echo 'runner:100000:65536' >> /dind-etc/subgid
                      echo 'runner:100000:65536' >> /dind-etc/subuid
                      chmod 755 /dind-etc;
                      chmod u=rwx,g=rx+s,o=rx /dind-home
                      chown 1001:1001 /dind-home
                  securityContext:
                    runAsUser: 0
                  volumeMounts:
                    - mountPath: /dind-etc
                      name: dind-etc
                    - mountPath: /dind-home
                      name: dind-home
                - name: dind
                  image: docker:dind-rootless
                  args:
                    - dockerd
                    - --host=unix:///run/user/1001/docker.sock
                  securityContext:
                    privileged: true
                    runAsUser: 1001
                    runAsGroup: 1001
                  restartPolicy: Always
                  startupProbe:
                    exec:
                      command:
                        - docker
                        - info
                    initialDelaySeconds: 0
                    failureThreshold: 24
                    periodSeconds: 5
                  volumeMounts:
                    - name: work
                      mountPath: /home/runner/_work
                    - name: dind-sock
                      mountPath: /run/user/1001
                    - name: dind-externals
                      mountPath: /home/runner/externals
                    - name: dind-etc
                      mountPath: /etc
                    - name: dind-home
                      mountPath: /home/runner
              containers:
                - name: runner
                  image: ghcr.io/actions/actions-runner:latest
                  command: [ "/home/runner/run.sh" ]
                  env:
                    - name: DOCKER_HOST
                      value: unix:///run/user/1001/docker.sock
                  securityContext:
                    privileged: true
                    runAsUser: 1001
                    runAsGroup: 1001
                  volumeMounts:
                    - name: work
                      mountPath: /home/runner/_work
                    - name: dind-sock
                      mountPath: /run/user/1001
              volumes:
                - name: work
                  emptyDir: { }
                - name: dind-externals
                  emptyDir: { }
                - name: dind-sock
                  emptyDir: { }
                - name: dind-etc
                  emptyDir: { }
                - name: dind-home
                  emptyDir: { }

    destination:
      server: https://kubernetes.default.svc
      namespace: gh-runners-sky
    syncPolicy:
      syncOptions:
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

