applications:
  - name: cd
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/cd
    destination:
      server: https://kubernetes.default.svc
      namespace: argocd
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: home-secrets
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://github.com/WhyThatFunction/home-secrets
      targetRevision: HEAD
      path: manifests
    destination:
      server: https://kubernetes.default.svc
      namespace: argocd
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: storage
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/storage
    destination:
      server: https://kubernetes.default.svc
      namespace: kube-system
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: gateway-api-crds
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://github.com/kubernetes-sigs/gateway-api.git
      targetRevision: v1.5.1
      path: config/crd
    destination:
      server: https://kubernetes.default.svc
      namespace: kube-system
    syncPolicy:
      syncOptions:
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: nvidia
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://nvidia.github.io/k8s-device-plugin
      targetRevision: 0.19.1
      chart: nvidia-device-plugin
      helm:
        valuesObject:
          runtimeClassName: nvidia
          nodeSelector:
            gpu-node: "true"
    destination:
      server: https://kubernetes.default.svc
      namespace: kube-system
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: cloudnative-pg
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://charts.bitnami.com/bitnami
      targetRevision: 1.0.11
      chart: cloudnative-pg
      helm:
        valuesObject:
          global:
            defaultStorageClass: longhorn-local
            security:
              allowInsecureImages: true
          operator:
            image:
              registry: bitnamilegacy
              repository: cloudnative-pg
            postgresqlImage:
              registry: bitnamilegacy
              repository: postgresql
          pluginBarmanCloud:
            enabled: true
            image:
              repository: bitnamilegacy/plugin-barman-cloud
            sidecarImage:
              repository: bitnamilegacy/plugin-barman-cloud-sidecar
    destination:
      server: https://kubernetes.default.svc
      namespace: cloudnative-pg
    syncPolicy:
      syncOptions:
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: traefik
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://traefik.github.io/charts
      targetRevision: 40.2.0
      chart: traefik
      helm:
        valuesObject:
          additionalArguments:
            - "--api.dashboard=true"
            - "--api.insecure=true"
            - "--serversTransport.insecureSkipVerify=true"
            - "--log.level=ERROR"
            - "--entryPoints.web.http.redirections.entryPoint.to=:443"
            - "--entryPoints.web.http.redirections.entryPoint.scheme=https"
            - "--entryPoints.web.http2.maxConcurrentStreams=1000"
            - "--entryPoints.websecure.http2.maxConcurrentStreams=1000"
            - "--global.sendAnonymousUsage=false"
            # Uncomment the next line if you want to use your self-signed cert for Traefik dashboard
            # - "--entrypoints.websecure.http.tls.domains[0].main=*.home.ssegning"
          logs:
            access:
              enabled: false
          deployment:
            replicas: 3
          service:
            loadBalancerIP: 10.10.0.140
          ports:
            web:
              forwardedHeaders:
                trustedIPs:
                  - 10.10.0.0/24
            websecure:
              forwardedHeaders:
                trustedIPs:
                  - 10.10.0.0/24
            traefik:
              expose:
                web: true
                websecure: true
          providers:
            kubernetesCRD:
              allowCrossNamespace: true
            kubernetesGateway:
              enabled: true
              experimentalChannel: false
            #knative:
            #  enabled: true

          #experimental:
          #  knative: true

          gateway:
            namespacePolicy: All
            listeners:
              web:
                namespacePolicy:
                  from: All
              websecure:
                port: 8443
                protocol: HTTPS
                namespacePolicy:
                  from: All
                certificateRefs:
                  - name: 'wildcard-sls-ssegning-com-tls'
                    kind: Secret
                    group: ''
                mode: Terminate
          
          ingressRoute:
            dashboard:
              enabled: true
              entryPoints:
                - web
                - websecure
              matchRule: Host(`traefik.home.ssegning`)
              tls:
                secretName: traefik.home.ssegning-tls
          
          extraObjects:
            - |
              apiVersion: cert-manager.io/v1
              kind: Certificate
              metadata:
                name: traefik-certificate
              spec:
                secretName: traefik.home.ssegning-tls
                issuerRef:
                  kind: ClusterIssuer
                  name: self-signed-ca
                  group: cert-manager.io
                commonName: traefik.home.ssegning
                dnsNames: 
                  - traefik.home.ssegning
            - |
              apiVersion: cert-manager.io/v1
              kind: Certificate
              metadata:
                name: wildcard-sls-ssegning-com-certificate
              spec:
                secretName: wildcard-sls-ssegning-com-tls
                issuerRef:
                  kind: ClusterIssuer
                  name: cert-cloudflare
                  group: cert-manager.io
                #commonName: sls.ssegning.com
                dnsNames: 
                  - "*.ssegning.com"
                  #- sls.ssegning.com
    destination:
      server: https://kubernetes.default.svc
      namespace: kube-system
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
      automated:
        prune: true
        selfHeal: true

  - name: cert
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/cert
    destination:
      server: https://kubernetes.default.svc
      namespace: kube-system
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: cert-remote
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/cert
      helm:
        releaseName: cert
        valuesObject:
          cert-manager:
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
    destination:
      name: home-remote
      namespace: kube-system
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: cnpg
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://cloudnative-pg.github.io/charts
      targetRevision: 0.28.2
      chart: cloudnative-pg
      helm:
        releaseName: cnpg
        valuesObject:
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          resources:
            limits:
              cpu: 100m
              memory: 200Mi
            requests:
              cpu: 100m
              memory: 100Mi
    destination:
      name: home-remote
      namespace: cnpg-system
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: cnpg-barman-cloud
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://cloudnative-pg.github.io/charts
      targetRevision: 0.5.0
      chart: plugin-barman-cloud
      helm:
        releaseName: cnpg-barman-cloud
        valuesObject:
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
    destination:
      name: home-remote
      namespace: cnpg-system
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: local-kube-state-metrics
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://prometheus-community.github.io/helm-charts
      targetRevision: "*"
      chart: kube-state-metrics
    destination:
      server: https://kubernetes.default.svc
      namespace: observability
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: s3
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/s3
    destination:
      server: https://kubernetes.default.svc
      namespace: s3
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: apps
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: base-apps
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/apps
    destination:
      server: https://kubernetes.default.svc
      namespace: argocd
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: secret-store
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/home-apps/secret-store
    destination:
      name: home-remote
      namespace: secret-store-system
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: knative-operator
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://knative.github.io/operator
      targetRevision: v1.22.1
      chart: knative-operator
      helm:
        valuesObject:
          knative_operator:
            knative_operator:
              tolerations:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
                  effect: NoSchedule
            operator_webhook:
              tolerations:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
                  effect: NoSchedule
    destination:
      name: home-remote
      namespace: knative-operator
    syncPolicy:
      syncOptions:
        - ServerSideApply=true
        - CreateNamespace=true
      automated:
        prune: true
        selfHeal: true

  - name: local-knative-operator
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://knative.github.io/operator
      targetRevision: v1.22.1
      chart: knative-operator
      helm:
        releaseName: knative-operator
    destination:
      server: https://kubernetes.default.svc
      namespace: knative-operator
    syncPolicy:
      syncOptions:
        - ServerSideApply=true
        - CreateNamespace=true
      automated:
        prune: true
        selfHeal: true

  - name: external-secrets
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://charts.external-secrets.io
      targetRevision: v2.5.0
      chart: external-secrets
      helm:
        valuesObject:
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          webhook:
            certManager:
              enabled: true
              cert:
                create: true
                issuerRef:
                  kind: ClusterIssuer
                  name: self-signed-ca
                  group: cert-manager.io
    destination:
      name: home-remote
      namespace: external-secrets
    syncPolicy:
      syncOptions:
        - ServerSideApply=true
        - CreateNamespace=true
      automated:
        prune: true
        selfHeal: true

  # ESO on the local (homeos) cluster — same chart/version as the home-remote
  # `external-secrets` app. Needed because vymalo-shop runs on homeos (Knative)
  # and pulls its secrets via ExternalSecrets. The self-signed-ca ClusterIssuer
  # already exists on homeos.
  - name: local-external-secrets
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://charts.external-secrets.io
      targetRevision: v2.5.0
      chart: external-secrets
      helm:
        releaseName: external-secrets
        valuesObject:
          webhook:
            certManager:
              enabled: true
              cert:
                create: true
                issuerRef:
                  kind: ClusterIssuer
                  name: self-signed-ca
                  group: cert-manager.io
    destination:
      server: https://kubernetes.default.svc
      namespace: external-secrets
    syncPolicy:
      syncOptions:
        - ServerSideApply=true
        - CreateNamespace=true
      automated:
        prune: true
        selfHeal: true

  # The ssegning-aws ClusterSecretStore on homeos (same chart as the
  # home-remote `secret-store` app). Requires the `awssm-secret` AWS-creds
  # Secret in the secret-store-system namespace on homeos (provisioned
  # out-of-band, e.g. via the home-secrets app).
  - name: local-secret-store
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/home-apps/secret-store
      helm:
        valuesObject:
          secretStores:
            vymalo-secret-store:
              aws:
                service: SecretsManager
                region: eu-central-1
                auth:
                  secretRef:
                    accessKeyIDSecretRef:
                      name: awssm-secret
                      key: access-key
                      namespace: secret-store-system
                    secretAccessKeySecretRef:
                      name: awssm-secret
                      key: secret-access-key
                      namespace: secret-store-system
            vaam-secret-store:
              aws:
                service: SecretsManager
                region: eu-central-1
                auth:
                  secretRef:
                    accessKeyIDSecretRef:
                      name: awssm-secret
                      key: access-key
                      namespace: secret-store-system
                    secretAccessKeySecretRef:
                      name: awssm-secret
                      key: secret-access-key
                      namespace: secret-store-system
    destination:
      server: https://kubernetes.default.svc
      namespace: secret-store-system
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: keycloak-operator
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/home-apps/keycloak-operator
    destination:
      name: home-remote
      namespace: keycloak-system
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: mail
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    sources:
      - repoURL: https://bokysan.github.io/docker-postfix
        targetRevision: 5.1.0
        chart: mail
        helm:
          valuesObject:
            existingSecret: mail-config
            config:
              general:
                TZ: "Europe/Berlin"
                ANONYMIZE_EMAILS: "smart"
            persistence:
              enabled: true
      - repoURL: https://bjw-s-labs.github.io/helm-charts
        targetRevision: 4.6.2
        chart: app-template
        helm:
          valuesObject:
            rawResources:
              mail-secret:
                enabled: true
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                spec:
                  spec:
                    refreshInterval: 1h0m0s
                    secretStoreRef:
                      name: ssegning-aws
                      kind: ClusterSecretStore
                    target:
                      name: mail-config
                      creationPolicy: Owner
                    data:
                      - secretKey: ALLOWED_SENDER_DOMAINS
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: allowed_sender_domains
                      - secretKey: RELAYHOST
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: relayhost
                      - secretKey: RELAYHOST_PASSWORD
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: relayhost_password
                      - secretKey: RELAYHOST_USERNAME
                        remoteRef:
                          key: "prod/meta/test-app"
