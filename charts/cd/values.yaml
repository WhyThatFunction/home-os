            template:
              spec:
                # Incident 2026-06-29: two arc-runner-set-vymalo pods co-located on
                # one 16Gi Hetzner worker ran Rust (rustc/cargo) builds simultaneously
                # → kernel global-OOM → Hetzner ACPI-reset worker-1 and worker-4
                # (flapping NotReady, ~58 pods stranded, librechat down). Hard
                # anti-affinity keeps at most ONE vymalo runner per node so a build
                # storm can never exhaust a host's RAM; with maxRunners 10 on a small
                # worker pool the surplus simply queues (Pending) instead of stacking
                # and OOMing a host — a deliberate throughput-for-stability trade.
                affinity:
                  podAntiAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      - topologyKey: kubernetes.io/hostname
                        labelSelector:
                          matchLabels:
                            app.kubernetes.io/instance: arc-runner-set-vymalo
                # fsGroup makes the emptyDir volumes group-owned by 1001 and
                # group-writable, so the uid-1001 runner can mkdir inside the
                # tool cache mounted at /opt/hostedtoolcache (ruby/setup-ruby
                # hardcodes that path and ignores RUNNER_TOOL_CACHE).
                securityContext:
                  fsGroup: 1001
                imagePullSecrets:
                  - name: ghcr-pull-secret
                containers:
                  - name: runner
                    # Shared batteries-included runner image (Node + pnpm + Rust +
                    # Flutter + Android + Ruby + k8s tooling), built & published by
                    # github.com/vymalo/arc-runners. Rootless buildah/podman — the
                    # privileged dind sidecar was removed; image builds run via
                    # buildah in this container (vfs + chroot, no /dev/fuse/userns).
                    image: ghcr.io/vymalo/arc-runners:jdk21-node22
                    # moving tag → force a fresh pull each pod (K8s defaults non-:latest to IfNotPresent)
                    imagePullPolicy: Always
                    command: [ "/home/runner/run.sh" ]
                    resources:
                      requests:
                        cpu: 1000m
                        memory: 4Gi
                      limits:
                        cpu: "2"
                        memory: 6Gi
                    env:
                      # Rootless container build/run (buildah/podman) with no
                      # /dev/fuse or userns: vfs storage + chroot isolation.
                      - name: STORAGE_DRIVER
                        value: vfs
                      - name: BUILDAH_ISOLATION
                        value: chroot
                      # ruby/setup-ruby always installs under /opt/hostedtoolcache
                      # on Linux, so anchor the whole tool cache there to share
                      # one volume across setup-node/java/ruby.
                      - name: RUNNER_TOOL_CACHE
                        value: /opt/hostedtoolcache
                      - name: SCCACHE_BUCKET
                        value: sc-cache
                      - name: SCCACHE_ENDPOINT
                        value: s3.ssegning.me
                      - name: TURBO_API
                        value: http://turbo-cache.turbo-cache.svc.cluster.local
                      - name: TURBO_TEAM
                        value: vaam
                      - name: MOBILE_ARTIFACTS_BUCKET
                        value: mobile-store
                      - name: S3_ENDPOINT
                        value: https://s3.ssegning.me
                      - name: TURBO_TOKEN
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: turbo-token } }
                      - name: SCCACHE_S3_ACCESS_KEY_ID
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: access-key-id } }
                      - name: SCCACHE_S3_SECRET_ACCESS_KEY
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: secret-access-key } }
                      - name: AWS_ACCESS_KEY_ID
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: access-key-id } }
                      - name: AWS_SECRET_ACCESS_KEY
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: secret-access-key } }
                      - name: S3_ACCESS_KEY_ID
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: access-key-id } }
                      - name: S3_SECRET_ACCESS_KEY
                        valueFrom: { secretKeyRef: { name: arc-runner-secrets, key: secret-access-key } }
                    securityContext:
                      runAsUser: 1001
                      runAsGroup: 1001
                      # Let the setuid newuidmap/newgidmap map subuids so rootless
                      # buildah can create its user namespace — REQUIRED for the
                      # vymalo-shop ci.yml image builds (buildah build). Without it
                      # the pod's no_new_privs blocks setuid → "newuidmap: write to
                      # uid_map failed: Operation not permitted" → single mapping →
                      # vfs "ApplyLayer ... remount /: permission denied". Still
                      # non-root (runAsUser 1001), no added caps — far less than the
                      # old privileged dind sidecar. Mirrors arc-runner-set-sse.
                      allowPrivilegeEscalation: true
                    volumeMounts:
                      - name: work
                        mountPath: /home/runner/_work
                      - name: tool-cache
                        mountPath: /opt/hostedtoolcache
                      # rootless graphroot for buildah/podman image storage
                      - name: containers
                        mountPath: /home/runner/.local/share/containers
                volumes:
                  - name: work
                    emptyDir: { }
                  - name: tool-cache
                    emptyDir: { }
                  - name: containers
                    emptyDir: { }

      - repoURL: https://bjw-s-labs.github.io/helm-charts
        targetRevision: 4.6.2
        chart: app-template
        helm:
          valuesObject:
            rawResources:
              auth-secret:
                enabled: true
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                spec:
                  spec:
                    refreshInterval: 0h10m0s
                    secretStoreRef:
                      name: ssegning-aws
                      kind: ClusterSecretStore
                    target:
                      name: gh-runner-secret-pat
                      creationPolicy: Owner
                    data:
                      - secretKey: github_token
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: github_token
              arc-runner-secrets:
                enabled: true
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                spec:
                  spec:
                    refreshInterval: 0h10m0s
                    secretStoreRef:
                      name: ssegning-aws
                      kind: ClusterSecretStore
                    target:
                      name: arc-runner-secrets
                      creationPolicy: Owner
                    data:
                      - secretKey: turbo-token
                        remoteRef:
                          key: "prod/artifact-cache/env"
                          property: turbo_token
                      - secretKey: access-key-id
                        remoteRef:
                          key: "prod/artifact-cache/env"
                          property: object_storage_access_key
                      - secretKey: secret-access-key
                        remoteRef:
                          key: "prod/artifact-cache/env"
                          property: object_storage_secret_key
              gh-pull-token:
                enabled: true
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                spec:
                  spec:
                    refreshInterval: 0h10m0s
                    secretStoreRef:
                      name: ssegning-aws
                      kind: ClusterSecretStore
                    target:
                      name: ghcr-pull-secret
                      creationPolicy: Owner
                      template:
                        engineVersion: v2
                        type: kubernetes.io/dockerconfigjson
                        data:
                          .dockerconfigjson: |
                            {
                              "auths": {
                                "ghcr.io": {
                                  "username": "{{ `{{ .github_username }}` }}",
                                  "password": "{{ `{{ .github_token }}` }}",
                                  "email": "{{ `{{ .github_email }}` }}",
                                  "auth": "{{ `{{ printf "%s:%s" .github_username .github_token | b64enc }}` }}"
                                }
                              }
                            }
                    data:
                      - secretKey: github_username
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: github_username
                      - secretKey: github_token
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: github_token
                      - secretKey: github_email
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: github_email
    destination:
      name: home-remote
      namespace: gh-runners-vymalo
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  # FLUTTER mobile CI runner — sibling of vymalo-runners (the Node one). Separate
  # scale-set + namespace so the heavy Flutter+Android image only spins up for
  # `mobile/**` PRs and can't collide with the Node runner's secrets. runs-on
  # label = the scale-set name: `arc-runner-set-vymalo-flutter`. NO DinD —
  # Flutter/Gradle need no Docker. The runner image
  # (ghcr.io/vymalo/vymalo-flutter-runner) is built by the vymalo-shop
  # `flutter runner image` workflow; minRunners 0 means no pod (and no image pull)
  # until a mobile-ci job is queued, so it's safe to deploy before the image exists.
  - name: vymalo-flutter-runners
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: arc-runner
    sources:
      - repoURL: "oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set"
        targetRevision: 0.13.1
        chart: "."
        helm:
          releaseName: arc-runner-set-vymalo-flutter
          valuesObject:
            githubConfigUrl: https://github.com/vymalo
            githubConfigSecret: gh-runner-secret-pat

            maxRunners: 2
            minRunners: 0

            controllerServiceAccount:
              namespace: arc-systems
              name: arc-gha-rs-controller

            template:
              spec:
                securityContext:
                  fsGroup: 1001
                imagePullSecrets:
                  - name: ghcr-pull-secret
                containers:
                  - name: runner
                    # Flutter + Android SDK baked. :latest → pullPolicy Always, so
                    # a rebuilt image rolls in on the next ephemeral pod.
                    image: ghcr.io/vymalo/vymalo-flutter-runner:latest
                    # analyze/test are Dart-only (light); the apk build runs
                    # Gradle/AGP in this container — give it ubuntu-class headroom.
                    resources:
                      requests:
                        cpu: "1"
                        memory: 4Gi
                      limits:
                        cpu: "2"
                        memory: 6Gi
                    env:
                      - name: RUNNER_TOOL_CACHE
                        value: /opt/hostedtoolcache
                    securityContext:
                      runAsUser: 1001
                      runAsGroup: 1001
                    volumeMounts:
                      - name: work
                        mountPath: /home/runner/_work
                      - name: tool-cache
                        mountPath: /opt/hostedtoolcache
                volumes:
                  - name: work
                    emptyDir: { }
                  - name: tool-cache
                    emptyDir: { }

      - repoURL: https://bjw-s-labs.github.io/helm-charts
        targetRevision: 4.6.2
        chart: app-template
        helm:
          valuesObject:
            rawResources:
              auth-secret:
                enabled: true
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                spec:
                  spec:
                    refreshInterval: 0h10m0s
                    secretStoreRef:
                      name: ssegning-aws
                      kind: ClusterSecretStore
                    target:
                      name: gh-runner-secret-pat
                      creationPolicy: Owner
                    data:
                      - secretKey: github_token
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: github_token
              gh-pull-token:
                enabled: true
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                spec:
                  spec:
                    refreshInterval: 0h10m0s
                    secretStoreRef:
                      name: ssegning-aws
                      kind: ClusterSecretStore
                    target:
                      name: ghcr-pull-secret
                      creationPolicy: Owner
                      template:
                        engineVersion: v2
                        type: kubernetes.io/dockerconfigjson
                        data:
                          .dockerconfigjson: |
                            {
                              "auths": {
                                "ghcr.io": {
                                  "username": "{{ `{{ .github_username }}` }}",
                                  "password": "{{ `{{ .github_token }}` }}",
                                  "email": "{{ `{{ .github_email }}` }}",
                                  "auth": "{{ `{{ printf "%s:%s" .github_username .github_token | b64enc }}` }}"
                                }
                              }
                            }
                    data:
                      - secretKey: github_username
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: github_username
                      - secretKey: github_token
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: github_token
                      - secretKey: github_email
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: github_email
    destination:
      name: home-remote
      namespace: gh-runners-vymalo-flutter
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  # Self-hosted Turborepo remote cache for the vymalo-shop CI `check` gate. Runs
  # on home-remote alongside the ARC runners so they reach it over cluster DNS
  # (turbo-cache.turbo-cache.svc.cluster.local) — no public route. Multi-source:
  # the private OCI chart + the vymalo-shop prod overlay ($values). Pulls
  # TURBO_TOKEN + MinIO creds from prod/artifact-cache/env via the cluster-wide
  # ssegning-aws ClusterSecretStore (already on home-remote).
  - name: turbo-cache
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: arc-runner
    sources:
      - repoURL: ghcr.io/vymalo/charts
        chart: turbo-cache
        targetRevision: 0.1.*
        helm:
          releaseName: turbo-cache
          valueFiles:
            - $values/deploy/envs/production/turbo-cache.values.yaml
          ignoreMissingValueFiles: true
      - repoURL: https://github.com/vymalo/vymalo-shop.git
        targetRevision: main
        ref: values
    destination:
      name: home-remote
      namespace: turbo-cache
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: otel-operator
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      targetRevision: 0.113.1
      chart: opentelemetry-operator
      helm:
        releaseName: opentelemetry-operator
        valuesObject:
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          admissionWebhooks:
            autoGenerateCert:
              enabled: false
            certManager:
              issuerRef:
                kind: ClusterIssuer
                name: self-signed-ca
                group: cert-manager.io
    destination:
      name: home-remote
      namespace: opentelemetry-system
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: kserve-crd
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: "oci://ghcr.io/kserve/charts/kserve-crd"
      targetRevision: v0.17.0
      chart: "."
      helm:
        releaseName: kserve-crd
        valuesObject: { }
    destination:
      server: https://kubernetes.default.svc
      namespace: kserve
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: kserve
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: "oci://ghcr.io/kserve/charts/kserve-resources"
      targetRevision: v0.17.0
      chart: "."
      helm:
        releaseName: kserve
        valuesObject: { }
    destination:
      server: https://kubernetes.default.svc
      namespace: kserve
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: knative-serving-local
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: "https://bjw-s-labs.github.io/helm-charts"
      targetRevision: "4.6.2"
      chart: "app-template"
      helm:
        releaseName: knative-serving
        valuesObject:
          rawResources:
            serving:
              apiVersion: operator.knative.dev/v1beta1
              kind: KnativeServing
              spec:
                spec:
                  workloads:
                    - name: net-gateway-api-webhook
                      resources:
                        - container: webhook
                          requests:
                            cpu: 100m
                            memory: 100Mi
                          limits:
                            cpu: 500m
                            memory: 500Mi
                      livenessProbes:
                        - container: webhook
                          initialDelaySeconds: 60
                          periodSeconds: 10
                          failureThreshold: 6
                    - name: controller
                      resources:
                        - container: controller
                          requests:
                            cpu: 300m
                            memory: 100Mi
                          limits:
                            cpu: 1000m
                            memory: 250Mi
                  ingress:
                    gateway-api:
                      enabled: true
                  config:
                    features:
                      kubernetes.podspec-runtimeclassname: "enabled"
                      kubernetes.podspec-nodeselector: "enabled"
                      kubernetes.podspec-persistent-volume-claim: "enabled"
                      kubernetes.podspec-persistent-volume-write: "enabled"
                    domain:
                      sls.ssegning.com: ""
                    gateway:
                      external-gateways: |
                        - class: traefik
                          gateway: kube-system/traefik-gateway
                          service: kube-system/traefik
                      local-gateways: |
                        - class: traefik
                          gateway: kube-system/traefik-gateway
                          service: kube-system/traefik
                    network:
                      ingress-class: gateway-api.ingress.networking.knative.dev
                      domain-template: "{{ `{{ .Name }}` }}-{{ `{{ .Namespace }}` }}--{{ `{{ .Domain }}` }}"
                    certmanager:
                      issuerRef: |
                        kind: ClusterIssuer
                        name: cert-cloudflare
                      clusterLocalIssuerRef: |
                        kind: ClusterIssuer
                        name: self-signed-ca
                      systemInternalIssuerRef: |
                        kind: ClusterIssuer
                        name: self-signed-ca
    destination:
      server: https://kubernetes.default.svc
      namespace: knative-serving
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: knative-serving
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: "https://bjw-s-labs.github.io/helm-charts"
      targetRevision: "4.6.2"
      chart: "app-template"
      helm:
        releaseName: knative-serving
        valuesObject:
          rawResources:
            serving:
