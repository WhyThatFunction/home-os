applications:
  - name: cd
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/cd
    destination:
      server: https://kubernetes.default.svc
      namespace: argocd
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: home-secrets
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://github.com/WhyThatFunction/home-secrets
      targetRevision: HEAD
      path: manifests
    destination:
      server: https://kubernetes.default.svc
      namespace: argocd
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: storage
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/storage
    destination:
      server: https://kubernetes.default.svc
      namespace: kube-system
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: nvidia
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://nvidia.github.io/k8s-device-plugin
      targetRevision: 0.13.0
      chart: nvidia-device-plugin
      helm:
        valuesObject:
          runtimeClassName: nvidia
          nodeSelector:
            gpu-node: "true"
    destination:
      server: https://kubernetes.default.svc
      namespace: kube-system
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: cloudnative-pg
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://charts.bitnami.com/bitnami
      targetRevision: 1.0.11
      chart: cloudnative-pg
      helm:
        valuesObject:
          global:
            defaultStorageClass: longhorn-local
            security:
              allowInsecureImages: true
          operator:
            image:
              registry: bitnamilegacy
              repository: cloudnative-pg
            postgresqlImage:
              registry: bitnamilegacy
              repository: postgresql
          pluginBarmanCloud:
            enabled: true
            image:
              repository: bitnamilegacy/plugin-barman-cloud
            sidecarImage:
              repository: bitnamilegacy/plugin-barman-cloud-sidecar
    destination:
      server: https://kubernetes.default.svc
      namespace: cloudnative-pg
    syncPolicy:
      syncOptions:
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: traefik
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://traefik.github.io/charts
      targetRevision: 38.0.2
      chart: traefik
      helm:
        valuesObject:
          additionalArguments:
            - "--api.dashboard=true"
            - "--api.insecure=true"
            - "--serversTransport.insecureSkipVerify=true"
            - "--log.level=ERROR"
            - "--entryPoints.web.http.redirections.entryPoint.to=:443"
            - "--entryPoints.web.http.redirections.entryPoint.scheme=https"
            - "--entryPoints.web.http2.maxConcurrentStreams=1000"
            - "--entryPoints.websecure.http2.maxConcurrentStreams=1000"
            - "--global.sendAnonymousUsage=false"
            # Uncomment the next line if you want to use your self-signed cert for Traefik dashboard
            # - "--entrypoints.websecure.http.tls.domains[0].main=*.home.ssegning"
          logs:
            access:
              enabled: false
          service:
            loadBalancerIP: 10.10.0.140
          ports:
            web:
              forwardedHeaders:
                trustedIPs:
                  - 10.10.0.0/24
            websecure:
              forwardedHeaders:
                trustedIPs:
                  - 10.10.0.0/24
            traefik:
              expose:
                web: true
                websecure: true
          providers:
            kubernetesCRD:
              allowCrossNamespace: true
            kubernetesGateway:
              enabled: true
          
          gateway:
            namespacePolicy: All
          
          ingressRoute:
            dashboard:
              enabled: true
              entryPoints:
                - web
                - websecure
              matchRule: Host(`traefik.home.ssegning`)
              tls:
                secretName: traefik.home.ssegning-tls
          
          extraObjects:
            - |
              apiVersion: cert-manager.io/v1
              kind: Certificate
              metadata:
                name: traefik-certificate
              spec:
                secretName: traefik.home.ssegning-tls
                issuerRef:
                  kind: ClusterIssuer
                  name: self-signed-ca
                  group: cert-manager.io
                commonName: traefik.home.ssegning
                dnsNames: 
                  - traefik.home.ssegning
    destination:
      server: https://kubernetes.default.svc
      namespace: kube-system
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
      automated:
        prune: true
        selfHeal: true

  - name: cert
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/cert
    destination:
      server: https://kubernetes.default.svc
      namespace: kube-system
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: s3
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/s3
    destination:
      server: https://kubernetes.default.svc
      namespace: s3
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: apps
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: base-apps
    source:
      repoURL: https://github.com/whythatfunction/home-os
      targetRevision: HEAD
      path: charts/apps
    destination:
      server: https://kubernetes.default.svc
      namespace: argocd
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: redis
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: base-apps
    source:
      repoURL: registry-1.docker.io/bitnamicharts
      targetRevision: 24.0.0
      chart: redis
      helm:
        valuesObject:
          global:
            defaultStorageClass: longhorn-local
          auth:
            enabled: false
          image:
            repository: bitnamilegacy/redis
          architecture: replication
          replica:
            replicaCount: 2
    destination:
      server: https://kubernetes.default.svc
      namespace: database
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: knative-operator
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://knative.github.io/operator
      targetRevision: v1.18.1
      chart: knative-operator
    destination:
      server: https://kubernetes.default.svc
      namespace: knative-operator
    syncPolicy:
      syncOptions:
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: mail
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://bokysan.github.io/docker-postfix
      targetRevision: 4.4.0
      chart: mail
      helm:
        valuesObject:
          existingSecret: mail-config
          config:
            general:
              TZ: "Europe/Berlin"
              ANONYMIZE_EMAILS: "smart"
          persistence:
            enabled: true
            storageClass: longhorn
    destination:
      server: https://kubernetes.default.svc
      namespace: mail
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: ai-apps
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: ai
    source:
      repoURL: https://github.com/ADORSYS-GIS/ai-helm
      targetRevision: HEAD
      path: charts/apps
    destination:
      server: https://kubernetes.default.svc
      namespace: argocd
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: argo-workflows
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://argoproj.github.io/argo-helm
      targetRevision: 1.0.6
      chart: argo-workflows
      helm:
        valuesObject:
          crds:
            install: true
          
          #images:
          #  tag: v4.0.2
          
          controller:
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
            workflowWorkers: 4
            podWorkers: 8
            rbac:
              create: true
          
          server:
            enabled: true
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
            extraArgs:
              - --auth-mode=server
            ingress:
              enabled: true
              ingressClassName: traefik
              annotations:
                cert-manager.io/cluster-issuer: self-signed-ca
              hosts:
                - argo-workflows.home.ssegning
              tls:
                - secretName: argo-workflows.home.ssegning-tls
                  hosts:
                    - argo-workflows.home.ssegning
          
          artifactRepository:
            archiveLogs: true
            s3:
              endpoint: s3-minio.s3.svc.cluster.local:9000
              insecure: true
              bucket: argo-artifacts
              keyFormat: "{{workflow.namespace}}/{{workflow.name}}/pod-{{pod.name}}"
              accessKeySecret:
                name: argo-artifacts-secret
                key: accessKey
              secretKeySecret:
                name: argo-artifacts-secret
                key: secretKey
          
          workflow:
            serviceAccount:
              create: true
              name: "argo-workflow"
          
          singleNamespace: false
    destination:
      server: https://kubernetes.default.svc
      namespace: argo
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: argo-events
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: https://argoproj.github.io/argo-helm
      targetRevision: 2.4.21
