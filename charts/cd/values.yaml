  - name: mail
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    sources:
      - repoURL: https://bokysan.github.io/docker-postfix
        targetRevision: 5.1.0
        chart: mail
        helm:
          valuesObject:
            existingSecret: mail-config
            config:
              general:
                TZ: "Europe/Berlin"
                ANONYMIZE_EMAILS: "smart"
            persistence:
              enabled: true
      - repoURL: https://bjw-s-labs.github.io/helm-charts
        targetRevision: 4.6.2
        chart: app-template
        helm:
          valuesObject:
            rawResources:
              redis-auth-secret:
                enabled: true
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                spec:
                  spec:
                    refreshInterval: 1h0m0s
                    secretStoreRef:
                      name: ssegning-aws
                      kind: ClusterSecretStore
                    target:
                      name: mail-config
                      creationPolicy: Owner
                    data:
                      - secretKey: ALLOWED_SENDER_DOMAINS
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: allowed_sender_domains
                      - secretKey: RELAYHOST
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: relayhost
                      - secretKey: RELAYHOST_PASSWORD
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: relayhost_password
                      - secretKey: RELAYHOST_USERNAME
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: relayhost_username
                      - secretKey: SMTPD_SASL_USERS
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: smtpd_sasl_users

    destination:
      name: home-remote
      namespace: mail-system
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: ai-apps
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: ai
    source:
      repoURL: https://github.com/ADORSYS-GIS/ai-helm
      targetRevision: HEAD
      path: charts/apps
    destination:
      server: https://kubernetes.default.svc
      namespace: argocd
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

  - name: arc-runners
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: arc-runner
    source:
      repoURL: "oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set-controller"
      targetRevision: 0.13.1
      chart: "."
      helm:
        releaseName: arc
    destination:
      name: home-remote
      namespace: arc-systems
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: sky-runners-bff
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: arc-runner
    sources:
      - repoURL: "oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set"
        targetRevision: 0.13.1
        chart: "."
        helm:
          releaseName: arc-runner-set-sky
          valuesObject:
            githubConfigUrl: https://github.com/skyengpro/azamra-tokenization-bff
            githubConfigSecret: gh-runner-secret-pat

            maxRunners: 5

            minRunners: 0

            controllerServiceAccount:
              namespace: arc-systems
              name: arc-gha-rs-controller

            template:
              spec:
                containers:
                  - name: dind
                    image: docker:29-dind
                    securityContext:
                      privileged: true
                    env:
                      - name: DOCKER_TLS_CERTDIR
                        value: ""
                    args:
                      - dockerd
                      - --host=tcp://0.0.0.0:2375
                      - --host=unix:///var/run/docker.sock
                    startupProbe:
                      tcpSocket:
                        port: 2375
                      failureThreshold: 24
                      periodSeconds: 5
                    volumeMounts:
                      - name: docker-graph
                        mountPath: /var/lib/docker
                      - name: work
                        mountPath: /home/runner/_work

                  - name: runner
                    image: ghcr.io/actions/actions-runner:latest
                    command: [ "/bin/sh", "-c" ]
                    args:
                      - sleep 15; exec /home/runner/run.sh
                    env:
                      - name: DOCKER_HOST
                        value: tcp://localhost:2375
                    securityContext:
                      runAsUser: 1001
                      runAsGroup: 1001
                    volumeMounts:
                      - name: work
                        mountPath: /home/runner/_work

                volumes:
                  - name: docker-graph
                    emptyDir: { }
                  - name: work
                    emptyDir: { }

    destination:
      name: home-remote
      namespace: gh-runners-sky
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: sky-runners-frontend
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: arc-runner
    sources:
      - repoURL: "oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set"
        targetRevision: 0.13.1
        chart: "."
        helm:
          releaseName: arc-runner-set-sky-frontend
          valuesObject:
            githubConfigUrl: https://github.com/skyengpro/azamra-tokenization-frontend
            githubConfigSecret: gh-runner-secret-pat

            maxRunners: 10

            minRunners: 0

            controllerServiceAccount:
              namespace: arc-systems
              name: arc-gha-rs-controller

            template:
              spec:
                containers:
                  - name: dind
                    image: docker:29-dind
                    securityContext:
                      privileged: true
                    env:
                      - name: DOCKER_TLS_CERTDIR
                        value: ""
                    args:
                      - dockerd
                      - --host=tcp://0.0.0.0:2375
                      - --host=unix:///var/run/docker.sock
                    startupProbe:
                      tcpSocket:
                        port: 2375
                      failureThreshold: 24
                      periodSeconds: 5
                    volumeMounts:
                      - name: docker-graph
                        mountPath: /var/lib/docker
                      - name: work
                        mountPath: /home/runner/_work

                  - name: runner
                    image: ghcr.io/actions/actions-runner:latest
                    command: [ "/home/runner/run.sh" ]
                    env:
                      - name: DOCKER_HOST
                        value: tcp://localhost:2375
                      - name: RUNNER_TOOL_CACHE
                        value: /home/runner/hostedtoolcache
                    securityContext:
                      runAsUser: 1001
                      runAsGroup: 1001
                    volumeMounts:
                      - name: work
                        mountPath: /home/runner/_work
                      - name: tool-cache
                        mountPath: /home/runner/hostedtoolcache
                volumes:
                  - name: docker-graph
                    emptyDir: { }
                  - name: work
                    emptyDir: { }
                  - name: tool-cache
                    emptyDir: { }

      - repoURL: https://bjw-s-labs.github.io/helm-charts
        targetRevision: 4.6.2
        chart: app-template
