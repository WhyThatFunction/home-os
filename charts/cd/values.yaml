  - name: knative-serving-local
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: "https://bjw-s-labs.github.io/helm-charts"
      targetRevision: "4.6.2"
      chart: "app-template"
      helm:
        releaseName: knative-serving
        valuesObject:
          rawResources:
            serving:
              apiVersion: operator.knative.dev/v1beta1
              kind: KnativeServing
              spec:
                spec:
                  #ingress:
                  #  gateway-api:
                  #    enabled: true
                  config:
                    domain:
                      sls.ssegning.com: ""
                    network:
                      ingress-class: traefik.ingress.networking.knative.dev
                      #system-internal-tls: "Enabled"
                      domain-template: "{{ `{{ .Name }}` }}-{{ `{{ .Namespace }}` }}--{{ `{{ .Domain }}` }}"
                      cluster-local-domain-tls: "Enabled"
                      external-domain-tls: "Enabled"
                      http-protocol: "Redirected"
                    certmanager:
                      issuerRef: |
                        kind: ClusterIssuer
                        name: cert-cloudflare
                      clusterLocalIssuerRef: |
                        kind: ClusterIssuer
                        name: self-signed-ca
                      systemInternalIssuerRef: |
                        kind: ClusterIssuer
                        name: self-signed-ca
    destination:
      server: https://kubernetes.default.svc
      namespace: knative-serving
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: knative-serving
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    source:
      repoURL: "https://bjw-s-labs.github.io/helm-charts"
      targetRevision: "4.6.2"
      chart: "app-template"
      helm:
        releaseName: knative-serving
        valuesObject:
          rawResources:
            serving:
              apiVersion: operator.knative.dev/v1beta1
              kind: KnativeServing
              spec:
                spec:
                  workloads:
                    - name: controller
                      resources:
                        - container: controller
                          requests:
                            cpu: 300m
                            memory: 100Mi
                          limits:
                            cpu: 1000m
                            memory: 250Mi
                  #ingress:
                  #  gateway-api:
                  #    enabled: true
                  config:
                    domain:
                      "serverless.vaam.store": ""
                    network:
                      ingress-class: traefik.ingress.networking.knative.dev
                      namespace-wildcard-cert-selector: "{}"
                      #system-internal-tls: "Enabled"
                      domain-template: "{{ `{{ .Name }}` }}-{{ `{{ .Namespace }}` }}--{{ `{{ .Domain }}` }}"
                      cluster-local-domain-tls: "Enabled"
                      external-domain-tls: "Enabled"
                      http-protocol: "Redirected"
                    certmanager:
                      issuerRef: |
                        kind: ClusterIssuer
                        name: cert-home-cert-http
                      clusterLocalIssuerRef: |
                        kind: ClusterIssuer
                        name: self-signed-ca
                      systemInternalIssuerRef: |
                        kind: ClusterIssuer
                        name: self-signed-ca
    destination:
      name: home-remote
      namespace: knative-serving
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true