      repoURL: https://knative.github.io/operator
      targetRevision: v1.22.1
      chart: knative-operator
      helm:
        valuesObject:
          knative_operator:
            knative_operator:
              tolerations:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
                  effect: NoSchedule
            operator_webhook:
              tolerations:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
                  effect: NoSchedule
    destination:
      name: home-remote
      namespace: knative-operator
    syncPolicy:
      syncOptions:
        - ServerSideApply=true
        - CreateNamespace=true
      automated:
        prune: true
        selfHeal: true

  - name: external-secrets
