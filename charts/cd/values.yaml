    destination:
      server: https://kubernetes.default.svc
      namespace: argo-events
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: arc-runners
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: arc-runner
    source:
      repoURL: "oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set-controller"
      targetRevision: 0.13.1
      chart: "."
      helm:
        releaseName: arc
    destination:
      server: https://kubernetes.default.svc
      namespace: arc-systems
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: sky-runners
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: arc-runner
    source:
      repoURL: "oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set"
      targetRevision: 0.13.1
      chart: "."
      helm:
        releaseName: arc-runner-set-sky
        valuesObject:
          githubConfigUrl: https://github.com/skyengpro/azamra-tokenization-bff
          githubConfigSecret: gh-runner-secret-pat

          maxRunners: 5

          minRunners: 0

          controllerServiceAccount:
            namespace: arc-systems
            name: arc-gha-rs-controller

          template:
            spec:
              containers:
                - name: dind
                  image: docker:29-dind
                  securityContext:
                    privileged: true
                  env:
                    - name: DOCKER_TLS_CERTDIR
                      value: ""
                  args:
                    - dockerd
                    - --host=tcp://0.0.0.0:2375
                    - --host=unix:///var/run/docker.sock
                  startupProbe:
                    tcpSocket:
                      port: 2375
                    failureThreshold: 24
                    periodSeconds: 5
                  volumeMounts:
                    - name: docker-graph
                      mountPath: /var/lib/docker
                    - name: work
                      mountPath: /home/runner/_work

                - name: runner
                  image: ghcr.io/actions/actions-runner:latest
                  command: [ "/bin/sh", "-c" ]
                  args:
                    - sleep 15; exec /home/runner/run.sh
                  env:
                    - name: DOCKER_HOST
                      value: tcp://localhost:2375
                  securityContext:
                    runAsUser: 1001
                    runAsGroup: 1001
                  volumeMounts:
                    - name: work
                      mountPath: /home/runner/_work

              volumes:
                - name: docker-graph
                  emptyDir: { }
                - name: work
                  emptyDir: { }

    destination:
      server: https://kubernetes.default.svc
      namespace: gh-runners-sky
    syncPolicy:
      syncOptions:
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

