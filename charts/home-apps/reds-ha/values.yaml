controllers:
  sentinel:
    type: statefulset
    replicas: 3

    podDisruptionBudget:
      enabled: true
      minAvailable: 2

    containers:
      app:
        image:
          repository: docker.io/redis
          tag: "8.6.2-trixie"
        command:
          - /bin/sh
          - -ec
        args:
          - exec redis-sentinel /usr/local/etc/redis/sentinel-base.conf
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 26379
              initialDelaySeconds: 10
              periodSeconds: 10
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 26379
              initialDelaySeconds: 5
              periodSeconds: 5
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 26379
              failureThreshold: 30
              periodSeconds: 5

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 256Mi

    statefulset:
      volumeClaimTemplates:
        - name: data
          globalMounts:
            - path: /data

defaultPodOptions:
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: '{{ $.Release.Name }}'

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: '{{ $.Release.Name }}'

service:
  sentinel:
    controller: sentinel
    primary: true
    type: ClusterIP
    ports:
      sentinel:
        port: 26379
        protocol: TCP
  headless:
    controller: sentinel
    primary: true
    type: ClusterIP
    clusterIp: None
    ports:
      sentinel:
        port: 26379
        protocol: TCP

configMaps:
  sentinel-config:
    enabled: true
    data:
      sentinel-base.conf: |
        port 26379
        bind 0.0.0.0
        protected-mode yes

        # monitor <name> <host> <port> <quorum>
        sentinel monitor {{ $.Release.Name }} {{ $.Release.Name }}-0.{{ $.Release.Name }}-headless.{{ $.Release.Namespace }}.svc.cluster.local 6379 2

        sentinel down-after-milliseconds {{ $.Release.Name }} 5000
        sentinel failover-timeout {{ $.Release.Name }} 60000
        sentinel parallel-syncs {{ $.Release.Name }} 1

persistence:
  sentinel-config:
    enabled: true
    type: configMap
    identifier: sentinel-config
    globalMounts:
      - path: /usr/local/etc/redis/sentinel-base.conf
        subPath: sentinel-base.conf
        readOnly: true