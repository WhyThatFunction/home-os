# Single ExternalSecret sourcing AWS SM `prod/vaam/env` via the
# home-os ssegning-aws ClusterSecretStore.
#
#   vaam-prod-cnpg-s3-creds   — access + secret key the CNPG ObjectStore
#                               uses for barman-cloud uploads to MinIO
#                               (s3.ssegning.me). Reuses the same vaam-store
#                               MinIO user the applications themselves use.
#
# Notes:
#   - PostgreSQL credentials are NOT synced from SM. CNPG auto-generates
#     them and publishes the `vaam-prod-pg-cluster-app` Secret which the
#     vaam-service chart's compose mode reads directly. No bootstrap
#     password lives in AWS SM.
#   - Redis runs AUTH-less inside the cluster (private ClusterIP, no
#     external exposure). No Redis password lives in AWS SM.
#
# Per-service application properties (signature_trusted_keys,
# <svc>_signing_key, object_storage_*, etc.) are referenced directly by
# the vaam-service chart's per-service ExternalSecrets — not synced here.
#
# Required AWS SM properties (under secret prod/vaam/env), for THIS chart:
#   - object_storage_access_key
#   - object_storage_secret_key
#   - github_username / github_token  (PAT with read:packages on vaam-store;
#                                      used to pull the private service images)

rawResources:
  ext-secret-cnpg-s3-creds:
    enabled: true
    apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    spec:
      spec:
        refreshInterval: 1h0m0s
        secretStoreRef:
          name: ssegning-aws
          kind: ClusterSecretStore
        target:
          name: vaam-prod-cnpg-s3-creds
          creationPolicy: Owner
        data:
          - secretKey: accessKeyId
            remoteRef:
              key: prod/vaam/env
              property: object_storage_access_key
          - secretKey: secretKey
            remoteRef:
              key: prod/vaam/env
              property: object_storage_secret_key

  # dockerconfigjson the kubelet uses to pull the private
  # ghcr.io/vaam-store/<service> images. Referenced by every prod service
  # values file via imagePullSecrets: [{ name: ghcr-pull }]. Previously
  # created by hand; now reprovisioned from SM on a fresh cluster.
  ext-secret-ghcr-pull:
    enabled: true
    apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    spec:
      spec:
        refreshInterval: 1h0m0s
        secretStoreRef:
          name: ssegning-aws
          kind: ClusterSecretStore
        target:
          name: ghcr-pull
          creationPolicy: Owner
          template:
            engineVersion: v2
            type: kubernetes.io/dockerconfigjson
            data:
              .dockerconfigjson: '{"auths":{"ghcr.io":{"username":"{{ .github_username }}","password":"{{ .github_token }}","auth":"{{ printf "%s:%s" .github_username .github_token | b64enc }}"}}}'
        data:
          - secretKey: github_username
            remoteRef:
              key: prod/vaam/env
              property: github_username
          - secretKey: github_token
            remoteRef:
              key: prod/vaam/env
              property: github_token
