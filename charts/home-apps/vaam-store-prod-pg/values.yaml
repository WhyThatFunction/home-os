# vaam-store-prod-pg — CNPG cluster + 8 databases + barman-cloud backups
# (s3.ssegning.me/vaam-cnpg-backups) + a simple AUTH-less in-namespace Redis.
#
# CNPG auto-generates the `vaam` role password and publishes the
# `vaam-prod-pg-cluster-app` Secret. The companion `vaam-store-prod-secrets`
# chart only provides the S3 creds for barman-cloud (the same MinIO user
# the applications themselves use).
#
# Cluster name is fixed at `vaam-prod-pg` so the auto-generated
# `vaam-prod-pg-cluster-app` Secret matches what the vaam-service chart's
# compose mode reads. Redis is private ClusterIP, no AUTH.

cluster:
  name: vaam-prod-pg          # → service vaam-prod-pg-cluster-rw, secret vaam-prod-pg-cluster-app
  instances: 3
  storageSize: 10Gi
  # storageClass: longhorn    # uncomment to pin SC; defaults to the cluster default
  imageName: ""               # leave blank for the CNPG operator default
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

databases:
  # One CNPG Database CR per service. Owner is the bootstrap user (`vaam`)
  # CNPG auto-creates; the vaam-service chart connects via the auto-generated
  # vaam-prod-pg-app Secret with dbName overridden per service.
  # `extensions` are created by CNPG as superuser (the vaam role can't create
  # untrusted extensions like postgis); the Bitnami image bundles the libs.
  - name: auth_db
  - name: catalog_db
    extensions: [postgis]   # catalog 0001_init.sql: CREATE EXTENSION postgis
  - name: chat_db
  - name: delivery_db
    extensions: [postgis]   # delivery 0005_postgis_geo.sql
  - name: order_db
  - name: payment_db
  - name: upload_db
  - name: vendor_db

backup:
  enabled: true
  # barman-cloud target. Bucket must exist on s3.ssegning.me; create with:
  #   mc mb ssegning/vaam-cnpg-backups
  endpoint: https://s3.ssegning.me
  bucket: vaam-cnpg-backups
  path: /vaam-store-prod
  retention: 30d
  schedule: "0 0 3 * * *"   # daily at 03:00

certificates:
  enabled: true
  # Reuses the home-os self-signed-ca ClusterIssuer for Postgres TLS,
  # matching the keycloak-ha pattern.
  issuerName: self-signed-ca
  issuerKind: ClusterIssuer

redis:
  enabled: true
  image: redis:8.6.2-trixie
  replicas: 1
  storageSize: 5Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi
