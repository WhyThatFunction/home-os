rawResources:
  app:
    apiVersion: k8s.keycloak.org/v2beta1
    kind: Keycloak
    spec:
      spec:
        instances: 3
        additionalOptions:
          # Point Keycloak's system truststore at the mounted CA dir so the SPI's
          # JDK HttpClient (default SSLContext) trusts the OPA server cert. conf/
          # truststores is the default scan dir; set explicitly to be unambiguous.
          - name: truststore-paths
            value: /opt/keycloak/conf/truststores
        db:
          database: app
          host: "{{ .Release.Name }}-cluster-rw"
          vendor: postgres
          usernameSecret:
            name: "{{ .Release.Name }}-cluster-app"
            key: username
          passwordSecret:
            name: "{{ .Release.Name }}-cluster-app"
            key: password
        ingress:
          tlsSecret: "{{ $.Release.Name }}-auth-tls"
        http:
          httpEnabled: false
          tlsSecret: "{{ $.Release.Name }}-auth-tls"
          annotations:
            traefik.ingress.kubernetes.io/service.serverstransport: "{{ $.Release.Namespace }}-{{ $.Release.Name }}-keycloak-transport@kubernetescrd"
            traefik.ingress.kubernetes.io/service.serversscheme: "https"
        hostname:
          hostname: auth.verif.fyi
        proxy:
          headers: xforwarded # double check your reverse proxy sets and overwrites the X-Forwarded-* headers
        telemetry:
          endpoint: 'https://{{ .Release.Name }}-otel-collector:4317'
        tracing:
          endpoint: 'https://{{ .Release.Name }}-otel-collector:4317'
        unsupported:
          podTemplate:
            spec:
              volumes:
                - name: spi-volume
                  emptyDir: { }
                # CA (self-signed-ca) that signed the Lightbridge OPA server's
                # authz-tls cert in the converse namespace. Mounted into Keycloak's
                # system truststore so the SPI's JDK HttpClient (default SSLContext)
                # trusts https://lightbridge-opa.converse.svc:3000. Only ca.crt is
                # projected (never tls.key) so the truststore loader stays clean.
                - name: lightbridge-truststore
                  secret:
                    secretName: '{{ .Release.Name }}-lightbridge-truststore'
                    items:
                      - key: ca.crt
                        path: lightbridge-opa-ca.crt

              initContainers:
                - name: install-spi
                  image: busybox
                  env:
                    - name: THEME_VERSION
                      value: "v86b23a7"
                    - name: WEBHOOK_VERSION
                      value: "0.9.1"
                    - name: LIGHTBRIDGE_KC_SPI
                      value: "0.1.1"
                  command:
                    - /bin/sh
                  args:
                    - -c
                    - |
                      set -ex
                      
                      wget -O /spi/theme-vaam-01.jar "https://github.com/vymalo/vymalo-keycloak-theme/releases/download/$THEME_VERSION/theme-vaam-01.jar"
                      wget -O /spi/theme-vymalo-01.jar  "https://github.com/vymalo/vymalo-keycloak-theme/releases/download/$THEME_VERSION/theme-vymalo-01.jar"
                      wget -O /spi/theme-vymalo-02.jar  "https://github.com/vymalo/vymalo-keycloak-theme/releases/download/$THEME_VERSION/theme-vymalo-02.jar"
                      wget -O /spi/theme-ssegning-tw-01.jar  "https://github.com/vymalo/vymalo-keycloak-theme/releases/download/$THEME_VERSION/theme-ssegning-tw-01.jar"
                      
                      wget -O /spi/keycloak-webhook-provider-core.jar https://github.com/vymalo/keycloak-webhook/releases/download/v$WEBHOOK_VERSION/keycloak-webhook-provider-core-$WEBHOOK_VERSION-all.jar
                      wget -O /spi/keycloak-webhook-provider-syslog.jar https://github.com/vymalo/keycloak-webhook/releases/download/v$WEBHOOK_VERSION/keycloak-webhook-provider-syslog-$WEBHOOK_VERSION-all.jar
                      wget -O /spi/keycloak-webhook-provider-http.jar https://github.com/vymalo/keycloak-webhook/releases/download/v$WEBHOOK_VERSION/keycloak-webhook-provider-http-$WEBHOOK_VERSION-all.jar
                      
                      wget -O /spi/lightbridge-kc-spi--context-client.jar https://github.com/ADORSYS-GIS/lightbridge-keycloak-spi/releases/download/v$LIGHTBRIDGE_KC_SPI/context-client-$LIGHTBRIDGE_KC_SPI.jar
                      wget -O /spi/lightbridge-kc-spi--protocol-mapper.jar https://github.com/ADORSYS-GIS/lightbridge-keycloak-spi/releases/download/v$LIGHTBRIDGE_KC_SPI/protocol-mapper-$LIGHTBRIDGE_KC_SPI.jar
                      wget -O /spi/lightbridge-kc-spi--spi-common.jar https://github.com/ADORSYS-GIS/lightbridge-keycloak-spi/releases/download/v$LIGHTBRIDGE_KC_SPI/spi-common-$LIGHTBRIDGE_KC_SPI.jar
                      wget -O /spi/lightbridge-kc-spi--token-exchange.jar https://github.com/ADORSYS-GIS/lightbridge-keycloak-spi/releases/download/v$LIGHTBRIDGE_KC_SPI/token-exchange-$LIGHTBRIDGE_KC_SPI.jar
                      
                      echo "Downloaded theme";
                      ls -lash /spi;

                  volumeMounts:
                    - name: spi-volume
                      mountPath: /spi

              containers:
                - name: keycloak
                  # Lightbridge context-resolution SPI (context-client) config. The
                  # provider reads these LIGHTBRIDGE_* env fallbacks (see the SPI's
                  # LightbridgeConfigFactory) and calls the backend on a project_id
                  # token exchange to seal account_id/project_id into the JWT.
                  env:
                    - name: LIGHTBRIDGE_RESOLVER_BASE_URL
                      value: https://lightbridge-opa.converse.svc:3000
                    - name: LIGHTBRIDGE_RESOLVER_PATH
                      value: /idp/v1/resolve-context
                    - name: LIGHTBRIDGE_AUTH_MODE
                      value: BASIC
                    - name: LIGHTBRIDGE_BASIC_USERNAME
                      value: authorino
                    - name: LIGHTBRIDGE_BASIC_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: '{{ .Release.Name }}-lightbridge-opa'
                          key: password
                    - name: LIGHTBRIDGE_PROJECT_ID_PARAM
                      value: project_id
                    # Fail closed: only the camer-digital realm may use the exchange.
                    - name: LIGHTBRIDGE_ALLOWED_REALMS
                      value: camer-digital
                  volumeMounts:
                    - name: spi-volume
                      mountPath: /opt/keycloak/providers
                    # Mount into a SUBDIRECTORY, not conf/truststores itself:
                    # Keycloak scans conf/truststores recursively, and mounting at
                    # the dir root would mask any operator-managed truststores
                    # (spec.truststores → conf/truststores/secret-…/configmap-…).
                    - name: lightbridge-truststore
                      mountPath: /opt/keycloak/conf/truststores/lightbridge
                      readOnly: true

  otel:
    enabled: true
    apiVersion: opentelemetry.io/v1beta1
    kind: OpenTelemetryCollector
    spec:
      spec:
        config:
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318

          processors:
            batch: { }

          exporters:
            debug: { }

          service:
            pipelines:
              traces:
                receivers:
                  - otlp
                processors:
                  - batch
                exporters:
                  - debug

  ext-secret:
    enabled: true
    apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    spec:
      spec:
        refreshInterval: 1h0m0s
        secretStoreRef:
          name: ssegning-aws
          kind: ClusterSecretStore
        target:
          name: '{{ .Release.Name }}-s3-creds'
          creationPolicy: Owner
        data:
          - secretKey: accessKeyId
            remoteRef:
              key: "prod/meta/test-app"
              property: s3_backup_cnpg_client_id
          - secretKey: secretKeyId
            remoteRef:
              key: "prod/meta/test-app"
              property: s3_backup_cnpg_secret

  scheduled-backup:
    enabled: true
    apiVersion: postgresql.cnpg.io/v1
    kind: ScheduledBackup
    spec:
      spec:
        cluster:
          name: '{{ .Release.Name }}-cluster'
        schedule: 0 0 */4 * * *
        method: plugin
        pluginConfiguration:
          name: barman-cloud.cloudnative-pg.io
        immediate: true
        backupOwnerReference: self

  object-store:
    enabled: true
    apiVersion: barmancloud.cnpg.io/v1
    kind: ObjectStore
    spec:
      spec:
        configuration:
          destinationPath: s3://ssegning-k8s-state/keycloak-cnpg-backups
          endpointURL: https://nbg1.your-objectstorage.com
          s3Credentials:
            accessKeyId:
              key: accessKeyId
              name: '{{ .Release.Name }}-s3-creds'
            secretAccessKey:
              key: secretKeyId
              name: '{{ .Release.Name }}-s3-creds'
          wal:
            compression: gzip
          data:
            compression: gzip
        retentionPolicy: 30d

  cluster:
    enabled: true
    apiVersion: postgresql.cnpg.io/v1
    kind: Cluster
    spec:
      spec:
        instances: 3

        certificates:
          serverTLSSecret: '{{ .Release.Name }}-certificate-holder'
          serverCASecret: '{{ .Release.Name }}-certificate-holder'

        storage:
          size: 1Gi
          #storageClass: longhorn

        plugins:
          - name: barman-cloud.cloudnative-pg.io
            isWALArchiver: true
            parameters:
              barmanObjectName: '{{ .Release.Name }}-object-store'

        # Declarative read-only login role for the Grafana "user_id attribution"
        # datasource (ai-helm-values → observability ns; ADR-0063 in ai-helm).
        # CNPG creates/maintains the role + sets its password from the basic-auth
        # Secret below; it is NOT a member of pg_read_all_data (that would expose
        # `credential` hashes, client secrets, federated tokens). The SELECT grant
        # is scoped to the user+token tables ONLY, applied by the `grafana-ro-grant`
        # Job below (CNPG managed roles can't express per-table grants).
        managed:
          roles:
            - name: grafana_ro
              ensure: present
              login: true
              comment: "Read-only — Grafana user_id→identity attribution (ai-helm ADR-0063). SELECT on user+token tables only; no pg_read_all_data."
              passwordSecret:
                name: '{{ .Release.Name }}-grafana-ro'

        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi

  certificate-holder:
    enabled: true
    apiVersion: v1
    kind: Secret
    #annotations:
    #  argocd.argoproj.io/compare-options: IgnoreExtraneous
    #  argocd.argoproj.io/sync-options: Prune=false
    labels:
      cnpg.io/reload: ""
    spec:
      data: { }

  certificate:
    enabled: true
    apiVersion: cert-manager.io/v1
    kind: Certificate
    spec:
      spec:
        secretName: '{{ .Release.Name }}-certificate-holder'
        usages:
          - server auth
        dnsNames:
          - '{{ .Release.Name }}-cluster-rw'
          - '{{ .Release.Name }}-cluster-rw.{{ .Release.Namespace }}'
          - '{{ .Release.Name }}-cluster-rw.{{ .Release.Namespace }}.svc'
          - '{{ .Release.Name }}-cluster-r'
          - '{{ .Release.Name }}-cluster-r.{{ .Release.Namespace }}'
          - '{{ .Release.Name }}-cluster-r.{{ .Release.Namespace }}.svc'
          - '{{ .Release.Name }}-cluster-ro'
          - '{{ .Release.Name }}-cluster-ro.{{ .Release.Namespace }}'
          - '{{ .Release.Name }}-cluster-ro.{{ .Release.Namespace }}.svc'
        issuerRef:
          name: self-signed-ca
          kind: ClusterIssuer
          group: cert-manager.io

  certificate-auth-tls:
    enabled: true
    apiVersion: cert-manager.io/v1
    kind: Certificate
    spec:
      spec:
        secretName: "{{ $.Release.Name }}-auth-tls"
        issuerRef:
          kind: ClusterIssuer
          name: cert-home-cert-http
          group: cert-manager.io
        dnsNames:
          - "auth.verif.fyi"

  keycloak-transport:
    apiVersion: traefik.io/v1alpha1
    kind: ServersTransport
    spec:
      spec:
        serverName: auth.verif.fyi

  # ────────────────────────────────────────────────────────────────────
  # Lightbridge context-resolution SPI wiring (keycloak ns → converse ns).
  # The token-exchange SPI calls the OPA/validation server in `converse`
  # (lightbridge-opa.converse.svc:3000/idp/v1/resolve-context) over TLS with
  # Basic auth. Two supporting resources:
  #   1. lightbridge-truststore — a throwaway leaf cert from the SAME
  #      self-signed-ca ClusterIssuer that signs converse's authz-tls; we mount
  #      only its ca.crt so Keycloak trusts the OPA server cert (SAN *.converse.svc).
  #   2. lightbridge-opa — the shared OPA Basic-auth password (authorino/…),
  #      pulled from the SAME store key converse's opa-secret uses so the two
  #      sides always match.
  # ────────────────────────────────────────────────────────────────────
  lightbridge-truststore:
    enabled: true
    apiVersion: cert-manager.io/v1
    kind: Certificate
    spec:
      spec:
        secretName: '{{ .Release.Name }}-lightbridge-truststore'
        commonName: '{{ .Release.Name }}-lightbridge-truststore'
        dnsNames:
          - '{{ .Release.Name }}-lightbridge-truststore'
        issuerRef:
          name: self-signed-ca
          kind: ClusterIssuer
          group: cert-manager.io
        usages:
          - server auth

  lightbridge-opa:
    enabled: true
    apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    spec:
      spec:
        refreshInterval: 1h0m0s
        secretStoreRef:
          name: ssegning-aws
          kind: ClusterSecretStore
        target:
          name: '{{ .Release.Name }}-lightbridge-opa'
          creationPolicy: Owner
        data:
          - secretKey: password
            remoteRef:
              key: "ai/camer/digital/prod/env"
              property: lightbridge_opa_password

  # ────────────────────────────────────────────────────────────────────
  # Grafana read-only datasource plumbing (ai-helm ADR-0063).
  #
  # The AI-platform Grafana (observability ns, Hetzner home-remote) shows
  # per-user cost keyed on the Keycloak `sub` (a UUID). To resolve those UUIDs
  # to people, Grafana gets a read-only Postgres datasource onto THIS database.
  # Two pieces live here (home-os owns the Keycloak CNPG cluster):
  #   1. the `grafana_ro` managed role (above, on the Cluster) + this Secret
  #      that sets its password, and
  #   2. a one-shot GRANT Job (below) that scopes its SELECT to user+token
  #      tables only.
  # The datasource CR, the password copy into the observability ns, and the
  # Cilium egress all live in ai-helm-values. ⚠️ Requires a new
  # `keycloak_grafana_ro_db_password` property in the ssegning-aws
  # `prod/meta/test-app` bucket BEFORE this syncs (else the role gets no
  # password and the ExternalSecret sits in SecretSyncedError).
  # ────────────────────────────────────────────────────────────────────
  grafana-ro:
    enabled: true
    apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    spec:
      spec:
        refreshInterval: 1h0m0s
        secretStoreRef:
          name: ssegning-aws
          kind: ClusterSecretStore
        target:
          # CNPG managed-role passwordSecret must be type basic-auth with the
          # `username` matching the role name. Name matches the passwordSecret
          # ref on the managed role above ('{{ .Release.Name }}-grafana-ro').
          name: '{{ .Release.Name }}-grafana-ro'
          creationPolicy: Owner
          template:
            # cnpg.io/reload makes CNPG re-read this passwordSecret promptly when
            # the password is rotated in the store (ESO refreshes hourly), so the
            # `grafana_ro` DB role password tracks the Grafana-side copy instead of
            # drifting until the next full reconcile. Same label the cluster's
            # certificate-holder Secret carries.
            metadata:
              labels:
                cnpg.io/reload: "true"
            type: kubernetes.io/basic-auth
            data:
              username: grafana_ro
              password: '{{ "{{ .password }}" }}'
        data:
          - secretKey: password
            remoteRef:
              key: "prod/meta/test-app"
              property: keycloak_grafana_ro_db_password

  # Idempotent GRANT job — scopes grafana_ro to user-identity + token tables ONLY.
  # CNPG `managed.roles` creates the role but can't express per-table grants, so
  # this runs the GRANT as the `app` owner (which owns the Keycloak tables).
  # Re-applied on every ArgoCD sync (Sync hook + BeforeHookCreation delete).
  # GRANT is idempotent.
  #
  # Granted = the agreed "users and tokens" scope: user identity
  # (user_entity, user_attribute) + the offline session/token tables
  # (offline_{user,client}_session) consumed by the "Sessions & grants"
  # dashboard, PLUS a COLUMN-level grant on client(id, client_id, name) so an
  # offline session's client UUID resolves to its clientId/name. The column-level
  # grant pointedly excludes client.secret.
  # Deliberately NOT granted — neither identity nor tokens, and they'd only widen
  # the blast radius if the datasource credential leaks: credential (password/OTP
  # hashes), federated_identity (3rd-party tokens), the rest of `client`
  # (esp. the secret column), component_config, realm, user_federation_* (LDAP
  # creds), AND the authz/consent tables (user_role_mapping, user_group_membership,
  # user_consent*, user_required_action).
  #
  # Robustness: the wait loop is BOUNDED (max-retry) and the Job has an
  # activeDeadlineSeconds backstop, so a never-created role (e.g. the password
  # ExternalSecret never synced) fails the hook fast instead of hanging the
  # ArgoCD Sync indefinitely. backoffLimit is low to fail fast on hard errors.
  grafana-ro-grant:
    enabled: true
    apiVersion: batch/v1
    kind: Job
    annotations:
      argocd.argoproj.io/hook: Sync
      argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    spec:
      spec:
        backoffLimit: 6
        # Hard backstop so a stuck hook can never wedge the Application OutOfSync.
        activeDeadlineSeconds: 900
        ttlSecondsAfterFinished: 600
        template:
          spec:
            restartPolicy: OnFailure
            containers:
              - name: grant
                # Pinned to the image the cluster actually runs (verified live:
                # keycloak-ha-cluster on 18.1-system-trixie) — psql only, so a
                # minor-version drift is harmless; bump alongside the cluster.
                image: ghcr.io/cloudnative-pg/postgresql:18.1-system-trixie
                command:
                  - /bin/sh
                  - -ec
                  # psql reads PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD/PGSSLMODE
                  # from the libpq env vars below — no connection string to word-split.
                  - |
                    echo "waiting for grafana_ro role + keycloak schema to exist…"
                    i=0
                    until psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='grafana_ro'" | grep -q 1 \
                       && psql -tAc "SELECT 1 FROM information_schema.tables WHERE table_schema='public' AND table_name='user_entity'" | grep -q 1; do
                      i=$((i + 1))
                      if [ "$i" -ge 60 ]; then
                        echo "ERROR: grafana_ro role / user_entity table not present after 5min — aborting" >&2
                        exit 1
                      fi
                      echo "  not ready yet — retrying in 5s ($i/60)"; sleep 5
                    done
                    echo "granting scoped read-only access (user-identity + token tables only)…"
                    psql -v ON_ERROR_STOP=1 <<'SQL'
                    GRANT CONNECT ON DATABASE app TO grafana_ro;
                    GRANT USAGE ON SCHEMA public TO grafana_ro;
                    GRANT SELECT ON
                      user_entity,
                      user_attribute,
                      offline_user_session,
                      offline_client_session
                    TO grafana_ro;
                    -- COLUMN-level grant on client: only the 3 columns needed to
                    -- resolve an offline session's client UUID → its clientId/name
                    -- (the "Sessions & grants" dashboard). Deliberately NOT the
                    -- whole table — that would expose client.secret.
                    GRANT SELECT (id, client_id, name) ON client TO grafana_ro;
                    SQL
                    echo "done."
                env:
                  - name: PGSSLMODE
                    value: require
                  - name: PGHOST
                    value: '{{ .Release.Name }}-cluster-rw'
                  - name: PGPORT
                    value: "5432"
                  - name: PGDATABASE
                    value: app
                  - name: PGUSER
                    valueFrom:
                      secretKeyRef:
                        name: '{{ .Release.Name }}-cluster-app'
                        key: username
                  - name: PGPASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: '{{ .Release.Name }}-cluster-app'
                        key: password
