controllers:
  main:
    enabled: false
    type: deployment
    strategy: RollingUpdate
    replicas: 3
    pod:
      labels:
        app: keycloak-app
    initContainers:
      download-theme:
        image:
          repository: busybox
          tag: "{{ $.Values.global.tags.busybox }}"
          pullPolicy: IfNotPresent
        command: [ "/bin/sh", "-c" ]
        args:
          - |
            set -ex;
            wget -O /spi/theme-vaam-01.jar "https://github.com/vymalo/vymalo-keycloak-theme/releases/download/v8cfdfb2/theme-vaam-01.jar"
            wget -O /spi/theme-vymalo-01.jar  "https://github.com/vymalo/vymalo-keycloak-theme/releases/download/v8cfdfb2/theme-vymalo-01.jar"
            wget -O /spi/theme-vymalo-02.jar  "https://github.com/vymalo/vymalo-keycloak-theme/releases/download/v8cfdfb2/theme-vymalo-02.jar"
            wget -O /spi/theme-ssegning-tw-01.jar  "https://github.com/vymalo/vymalo-keycloak-theme/releases/download/v8cfdfb2/theme-ssegning-tw-01.jar"
            echo "Downloaded theme";
            ls -lash /spi;

    containers:
      main:
        image:
          repository: quay.io/keycloak/keycloak
          tag: "{{ $.Values.global.tags.keycloak }}"
          pullPolicy: IfNotPresent
        args:
          - start
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: "Europe/Berlin"
          JAVA_OPTS_APPEND: '-Djgroups.dns.query={{ $.Release.Name }}-headless.{{ $.Release.Namespace }}.svc.cluster.local'
          KC_BOOTSTRAP_ADMIN_PASSWORD: /opt/bitnami/keycloak/secrets/password
          KC_BOOTSTRAP_ADMIN_USERNAME: admin
          KC_DB: postgres
          KC_DB_URL:
            valueFrom:
              secretKeyRef:
                name: "{{ .Release.Name }}-cluster-app"
                key: jdbc-uri
          KC_DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: "{{ .Release.Name }}-cluster-app"
                key: password
          KC_HOSTNAME: https://auth.verif.fyi
          KC_HOSTNAME_STRICT: 'false'
          KC_HEALTH_ENABLED: 'true'
          KC_HTTP_ENABLED: 'true'
          KC_HTTP_MANAGEMENT_PORT: '9000'
          KC_HTTP_PORT: '8080'
          KC_HTTP_RELATIVE_PATH: /
          KC_LOG_CONSOLE_OUTPUT: default
          KC_LOG_LEVEL: INFO
          KC_PROXY_HEADERS: xforwarded
          KC_SPI_ADMIN_REALM: master
          KEYCLOAK_PRODUCTION: 'true'
          KC_TELEMETRY_ENDPOINT: 'https://{{ .Release.Name }}-otel-collector:4317'
          KC_TELEMETRY_SERVICE_NAME: '{{ $.Release.Name }}'
          KC_TRACING_ENABLED: 'true'
          KC_TELEMETRY_LOGS_ENABLED: 'true'
          KC_METRICS_ENABLED: 'true'
          KUBERNETES_NAMESPACE:
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.namespace
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsGroup: 1001
          runAsNonRoot: true
          runAsUser: 1001
          seLinuxOptions: { }
          seccompProfile:
            type: RuntimeDefault
        resources:
          limits:
            cpu: '1'
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 1Gi
        probes:
          liveness:
            enabled: true
            path: /health/live
            type: HTTP
            spec:
              httpGet:
                port: http
          readiness:
            enabled: true
            path: /health/ready
            type: HTTP
            spec:
              httpGet:
                port: http
          startup:
            enabled: true
            path: /health
            type: HTTP
            spec:
              httpGet:
                port: http
              failureThreshold: 30
              periodSeconds: 5

rawResources:
  app:
    apiVersion: k8s.keycloak.org/v2beta1
    kind: Keycloak
    spec:
      spec:
        instances: 3
        db:
          database: app
          host: "{{ .Release.Name }}-cluster-rw"
          vendor: postgres
          usernameSecret:
            name: "{{ .Release.Name }}-cluster-app"
            key: username
          passwordSecret:
            name: "{{ .Release.Name }}-cluster-app"
            key: password
        ingress:
          tlsSecret: "{{ $.Release.Name }}-auth-tls"
        http:
          httpEnabled: false
          tlsSecret: "{{ $.Release.Name }}-auth-tls"
          annotations:
            traefik.ingress.kubernetes.io/service.serverstransport: "{{ $.Release.Namespace }}-{{ $.Release.Name }}-keycloak-transport@kubernetescrd"
            traefik.ingress.kubernetes.io/service.serversscheme: "https"
        hostname:
          hostname: auth.verif.fyi
        proxy:
          headers: xforwarded # double check your reverse proxy sets and overwrites the X-Forwarded-* headers
        telemetry:
          endpoint: 'https://{{ .Release.Name }}-otel-collector:4317'
        tracing:
          endpoint: 'https://{{ .Release.Name }}-otel-collector:4317'

  otel:
    enabled: true
    apiVersion: opentelemetry.io/v1beta1
    kind: OpenTelemetryCollector
    spec:
      spec:
        config:
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318

          processors:
            batch: { }

          exporters:
            debug: { }

          service:
            pipelines:
              traces:
                receivers:
                  - otlp
                processors:
                  - batch
                exporters:
                  - debug

  ext-secret:
    enabled: true
    apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    spec:
      spec:
        refreshInterval: 1h0m0s
        secretStoreRef:
          name: ssegning-aws
          kind: ClusterSecretStore
        target:
          name: '{{ .Release.Name }}-s3-creds'
          creationPolicy: Owner
        data:
          - secretKey: accessKeyId
            remoteRef:
              key: "prod/meta/test-app"
              property: s3_backup_cnpg_client_id
          - secretKey: secretKeyId
            remoteRef:
              key: "prod/meta/test-app"
              property: s3_backup_cnpg_secret

  scheduled-backup:
    enabled: true
    apiVersion: postgresql.cnpg.io/v1
    kind: ScheduledBackup
    spec:
      spec:
        cluster:
          name: '{{ .Release.Name }}-cluster'
        schedule: 0 0 */4 * * *
        method: plugin
        pluginConfiguration:
          name: barman-cloud.cloudnative-pg.io

  object-store:
    enabled: true
    apiVersion: barmancloud.cnpg.io/v1
    kind: ObjectStore
    spec:
      spec:
        configuration:
          destinationPath: s3://ssegning-k8s-state/keycloak-cnpg-backups
          endpointURL: https://nbg1.your-objectstorage.com
          s3Credentials:
            accessKeyId:
              key: accessKeyId
              name: '{{ .Release.Name }}-s3-creds'
            secretAccessKey:
              key: secretKeyId
              name: '{{ .Release.Name }}-s3-creds'
          wal:
            compression: gzip
        retentionPolicy: 30d

  cluster:
    enabled: true
    apiVersion: postgresql.cnpg.io/v1
    kind: Cluster
    spec:
      spec:
        instances: 3

        certificates:
          serverTLSSecret: '{{ .Release.Name }}-certificate-holder'
          serverCASecret: '{{ .Release.Name }}-certificate-holder'

        storage:
          size: 1Gi
          #storageClass: longhorn

        plugins:
          - name: barman-cloud.cloudnative-pg.io
            isWALArchiver: true
            parameters:
              barmanObjectName: '{{ .Release.Name }}-cluster'
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi

  certificate-holder:
    enabled: true
    apiVersion: v1
    kind: Secret
    #annotations:
    #  argocd.argoproj.io/compare-options: IgnoreExtraneous
    #  argocd.argoproj.io/sync-options: Prune=false
    labels:
      cnpg.io/reload: ""
    spec:
      data: { }

  certificate:
    enabled: true
    apiVersion: cert-manager.io/v1
    kind: Certificate
    spec:
      spec:
        secretName: '{{ .Release.Name }}-certificate-holder'
        usages:
          - server auth
        dnsNames:
          - '{{ .Release.Name }}-cluster-rw'
          - '{{ .Release.Name }}-cluster-rw.{{ .Release.Namespace }}'
          - '{{ .Release.Name }}-cluster-rw.{{ .Release.Namespace }}.svc'
          - '{{ .Release.Name }}-cluster-r'
          - '{{ .Release.Name }}-cluster-r.{{ .Release.Namespace }}'
          - '{{ .Release.Name }}-cluster-r.{{ .Release.Namespace }}.svc'
          - '{{ .Release.Name }}-cluster-ro'
          - '{{ .Release.Name }}-cluster-ro.{{ .Release.Namespace }}'
          - '{{ .Release.Name }}-cluster-ro.{{ .Release.Namespace }}.svc'
        issuerRef:
          name: self-signed-ca
          kind: ClusterIssuer
          group: cert-manager.io

  certificate-auth-tls:
    enabled: true
    apiVersion: cert-manager.io/v1
    kind: Certificate
    spec:
      spec:
        secretName: "{{ $.Release.Name }}-auth-tls"
        issuerRef:
          kind: ClusterIssuer
          name: cert-home-cert-http
          group: cert-manager.io
        dnsNames:
          - "auth.verif.fyi"

  keycloak-transport:
    apiVersion: traefik.io/v1alpha1
    kind: ServersTransport
    spec:
      spec:
        serverName: auth.verif.fyi