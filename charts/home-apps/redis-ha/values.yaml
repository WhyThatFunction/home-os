global:
  redis:
    image:
      repository: docker.io/redis
      tag: "8.0.3-trixie"
  redisinsight:
    image:
      repository: docker.io/redis/redisinsight
      tag: "latest"

controllers:
  redis:
    type: statefulset
    replicas: 3

    podDisruptionBudget:
      enabled: true
      minAvailable: 2

    statefulset:
      podManagementPolicy: Parallel
      volumeClaimTemplates:
        - name: data
          accessMode: ReadWriteOnce
          size: 5Gi
          #storageClass: your-rwo-sc
          globalMounts:
            - path: /data

    containers:
      app:
        image:
          repository: "{{ $.Values.global.redis.image.repository }}"
          tag: "{{ $.Values.global.redis.image.tag }}"

        env:
          POD_NAME:
            fieldRef:
              fieldPath: metadata.name
          POD_NAMESPACE:
            fieldRef:
              fieldPath: metadata.namespace
          MASTER_FQDN: "{{ $.Release.Name }}-redis-0.{{ $.Release.Name }}-redis-headless.{{ $.Release.Namespace }}.svc.cluster.local"
          RELEASE_NAME: "{{ $.Release.Name }}"

        command:
          - /bin/sh
          - -ec
        args:
          - |
            ORDINAL="${POD_NAME##*-}"
            POD_FQDN="${POD_NAME}.${RELEASE_NAME}-redis-headless.${POD_NAMESPACE}.svc.cluster.local"

            mkdir -p /data
            cp /bootstrap/redis.conf /data/redis.conf

            {
              echo "dir /data"
              echo "appendonly yes"
              echo "replica-announce-port 6379"
              echo "replica-announce-ip ${POD_FQDN}"
            } >> /data/redis.conf

            if [ "${ORDINAL}" != "0" ]; then
              echo "replicaof ${MASTER_FQDN} 6379" >> /data/redis.conf
            fi

            exec redis-server /data/redis.conf

        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 6379
              initialDelaySeconds: 10
              periodSeconds: 10
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 6379
              initialDelaySeconds: 5
              periodSeconds: 5
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 6379
              failureThreshold: 30
              periodSeconds: 5

        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            memory: 1Gi

  sentinel:
    type: statefulset
    replicas: 3

    podDisruptionBudget:
      enabled: true
      minAvailable: 2

    statefulset:
      podManagementPolicy: Parallel
      volumeClaimTemplates:
        - name: data
          accessMode: ReadWriteOnce
          size: 1Gi
          #storageClass: your-rwo-sc
          globalMounts:
            - path: /data

    containers:
      app:
        image:
          repository: "{{ $.Values.global.redis.image.repository }}"
          tag: "{{ $.Values.global.redis.image.tag }}"

        env:
          POD_NAME:
            fieldRef:
              fieldPath: metadata.name
          POD_NAMESPACE:
            fieldRef:
              fieldPath: metadata.namespace
          MASTER_NAME: "{{ $.Release.Name }}"
          MASTER_FQDN: "{{ $.Release.Name }}-redis-0.{{ $.Release.Name }}-redis-headless.{{ .Release.Namespace }}.svc.cluster.local"
          RELEASE_NAME: "{{ $.Release.Name }}"

        command:
          - /bin/sh
          - -ec
        args:
          - |
            POD_FQDN="${POD_NAME}.${RELEASE_NAME}-sentinel-headless.${POD_NAMESPACE}.svc.cluster.local"

            mkdir -p /data

            if [ ! -f /data/sentinel.conf ]; then
              cp /bootstrap/sentinel.conf /data/sentinel.conf

              {
                echo "sentinel monitor ${MASTER_NAME} ${MASTER_FQDN} 6379 2"
                echo "sentinel down-after-milliseconds ${MASTER_NAME} 5000"
                echo "sentinel failover-timeout ${MASTER_NAME} 60000"
                echo "sentinel parallel-syncs ${MASTER_NAME} 1"
                echo "sentinel resolve-hostnames yes"
                echo "sentinel announce-hostnames yes"
                echo "sentinel announce-ip ${POD_FQDN}"
                echo "sentinel announce-port 26379"
              } >> /data/sentinel.conf
            fi

            exec redis-sentinel /data/sentinel.conf

        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 26379
              initialDelaySeconds: 10
              periodSeconds: 10
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 26379
              initialDelaySeconds: 5
              periodSeconds: 5
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 26379
              failureThreshold: 30
              periodSeconds: 5

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 256Mi

  redisinsight:
    type: deployment
    replicas: 1

    containers:
      app:
        image:
          repository: "{{ $.Values.global.redis.image.repository }}"
          tag: "{{ $.Values.global.redis.image.tag }}"
        env:
          RI_APP_HOST: "0.0.0.0"
          RI_APP_PORT: "5540"
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 5540
              initialDelaySeconds: 20
              periodSeconds: 10
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 5540
              initialDelaySeconds: 10
              periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi

defaultPodOptions:
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/instance: '{{ $.Release.Name }}'

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app.kubernetes.io/instance: '{{ $.Release.Name }}'

service:
  redis:
    controller: redis
    primary: true
    type: ClusterIP
    ports:
      redis:
        port: 6379
        protocol: TCP

  redis-headless:
    controller: redis
    type: ClusterIP
    clusterIP: None
    publishNotReadyAddresses: true
    ports:
      redis:
        port: 6379
        protocol: TCP

  sentinel:
    controller: sentinel
    primary: true
    type: ClusterIP
    ports:
      sentinel:
        port: 26379
        protocol: TCP

  sentinel-headless:
    controller: sentinel
    type: ClusterIP
    clusterIP: None
    publishNotReadyAddresses: true
    ports:
      sentinel:
        port: 26379
        protocol: TCP

  redisinsight:
    controller: redisinsight
    type: ClusterIP
    ports:
      http:
        port: 5540
        protocol: TCP

ingress:
  redisinsight:
    annotations:
      cert-manager.io/cluster-issuer: self-signed-ca
    className: nginx
    hosts:
      - host: redisinsight.example.internal
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: redisinsight
              port: http
    tls:
      - secretName: "{{ $.Release.Name }}-redisinsight-tls"
        hosts:
          - redisinsight.example.internal

configMaps:
  redis-bootstrap:
    enabled: true
    data:
      redis.conf: |
        bind 0.0.0.0
        protected-mode yes

        port 0
        tls-port 6379

        tls-cert-file /tls/tls.crt
        tls-key-file /tls/tls.key
        tls-ca-cert-file /tls/ca.crt

        # Keep this if you want Redis clients to use only server-auth TLS.
        # Remove it if you want true mTLS for every client.
        tls-auth-clients no

        # Required so replica -> master links use TLS
        tls-replication yes

        save 900 1
        save 300 10
        save 60 10000

  sentinel-bootstrap:
    enabled: true
    data:
      sentinel.conf: |
        bind 0.0.0.0

        port 0
        tls-port 26379

        tls-cert-file /tls/tls.crt
        tls-key-file /tls/tls.key
        tls-ca-cert-file /tls/ca.crt

        # Same choice as Redis:
        # no = server-auth TLS only
        # remove for mTLS clients/sentinels
        tls-auth-clients no

        # Required for Sentinel -> Redis and Sentinel -> Sentinel TLS
        tls-replication yes

        protected-mode yes

persistence:
  redis-bootstrap:
    enabled: true
    type: configMap
    identifier: redis-bootstrap
    advancedMounts:
      redis:
        app:
          - path: /bootstrap/redis.conf
            subPath: redis.conf
            readOnly: true

  sentinel-bootstrap:
    enabled: true
    type: configMap
    identifier: sentinel-bootstrap
    advancedMounts:
      sentinel:
        app:
          - path: /bootstrap/sentinel.conf
            subPath: sentinel.conf
            readOnly: true

  redis-tls:
    enabled: true
    type: secret
    name: "{{ $.Release.Name }}-redis-tls"
    advancedMounts:
      redis:
        app:
          - path: /tls/tls.crt
            subPath: tls.crt
            readOnly: true
          - path: /tls/tls.key
            subPath: tls.key
            readOnly: true
          - path: /tls/ca.crt
            subPath: ca.crt
            readOnly: true

  sentinel-tls:
    enabled: true
    type: secret
    name: "{{ $.Release.Name }}-sentinel-tls"
    advancedMounts:
      sentinel:
        app:
          - path: /tls/tls.crt
            subPath: tls.crt
            readOnly: true
          - path: /tls/tls.key
            subPath: tls.key
            readOnly: true
          - path: /tls/ca.crt
            subPath: ca.crt
            readOnly: true

  redisinsight-data:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 1Gi
    advancedMounts:
      redisinsight:
        app:
          - path: /data

rawResources:
  redis-tls:
    enabled: true
    apiVersion: cert-manager.io/v1
    kind: Certificate
    spec:
      secretName: "{{ $.Release.Name }}-redis-tls"
      issuerRef:
        name: some-issuer
        kind: Issuer
      dnsNames:
        - "{{ $.Release.Name }}-redis"
        - "{{ $.Release.Name }}-redis.{{ $.Release.Namespace }}.svc"
        - "{{ $.Release.Name }}-redis.{{ $.Release.Namespace }}.svc.cluster.local"
        - "*.{{ $.Release.Name }}-redis-headless.{{ $.Release.Namespace }}.svc.cluster.local"

  sentinel-tls:
    enabled: true
    apiVersion: cert-manager.io/v1
    kind: Certificate
    spec:
      secretName: "{{ $.Release.Name }}-sentinel-tls"
      issuerRef:
        name: some-issuer
        kind: Issuer
      dnsNames:
        - "{{ $.Release.Name }}-sentinel"
        - "{{ $.Release.Name }}-sentinel.{{ $.Release.Namespace }}.svc"
        - "{{ $.Release.Name }}-sentinel.{{ $.Release.Namespace }}.svc.cluster.local"
        - "*.{{ $.Release.Name }}-sentinel-headless.{{ $.Release.Namespace }}.svc.cluster.local"

  redisinsight-tls:
    enabled: true
    apiVersion: cert-manager.io/v1
    kind: Certificate
    spec:
      secretName: "{{ $.Release.Name }}-redisinsight-tls"
      issuerRef:
        name: some-issuer
        kind: Issuer
      dnsNames:
        - "redisinsight.example.internal"