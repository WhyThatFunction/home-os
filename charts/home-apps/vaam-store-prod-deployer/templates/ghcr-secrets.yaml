{{- /*
  GHCR credentials for the argocd namespace, sourced from AWS SM
  prod/vaam/env (github_username / github_token) via the ssegning-aws
  ClusterSecretStore. These were previously created by hand with kubectl;
  declaring them here means a fresh cluster reprovisions them with no
  manual step.

    1) vaam-store-charts-oci-repo — ArgoCD repository credential so the
       vaam-store-prod-app Application can `helm pull` the private OCI
       chart oci://ghcr.io/vaam-store/charts/vaam-service. A GitHub-App
       git cred can't auth a GHCR Helm pull, so ArgoCD needs a
       repository-type secret (type: helm + enableOCI + user/pass).

    2) vaam-store-ghcr-pull — dockerconfigjson the argocd-image-updater
       controller uses (via each app's `<svc>.pull-secret` annotation)
       to list tags on the private service images.

  Requires github_username / github_token in prod/vaam/env (a PAT with
  read:packages on the vaam-store org).
*/}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vaam-store-charts-oci-repo
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: vaam-store-prod
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: ssegning-aws
    kind: ClusterSecretStore
  target:
    name: vaam-store-charts-oci-repo
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          # Tells ArgoCD to treat this Secret as a repository credential.
          argocd.argoproj.io/secret-type: repository
      data:
        name: vaam-store-charts
        type: helm
        url: ghcr.io/vaam-store/charts
        enableOCI: "true"
        username: "{{ `{{ .github_username }}` }}"
        password: "{{ `{{ .github_token }}` }}"
  data:
    - secretKey: github_username
      remoteRef:
        key: prod/vaam/env
        property: github_username
    - secretKey: github_token
      remoteRef:
        key: prod/vaam/env
        property: github_token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vaam-store-ghcr-pull
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: vaam-store-prod
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: ssegning-aws
    kind: ClusterSecretStore
  target:
    name: vaam-store-ghcr-pull
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {{ `{"auths":{"ghcr.io":{"username":"{{ .github_username }}","password":"{{ .github_token }}","auth":"{{ printf "%s:%s" .github_username .github_token | b64enc }}"}}}` }}
  data:
    - secretKey: github_username
      remoteRef:
        key: prod/vaam/env
        property: github_username
    - secretKey: github_token
      remoteRef:
        key: prod/vaam/env
        property: github_token
