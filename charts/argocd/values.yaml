global:
  domain: argocd.ssegning.me

controller:
  replicas: 2
  pdb:
    enabled: true
    minAvailable: 1

redis:
  enabled: true

server:
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: cert-cloudflare
    tls: true
    hostname: argocd.ssegning.me

repoServer:
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
  pdb:
    enabled: true
    minAvailable: 2

applicationSet:
  replicas: 3
  pdb:
    enabled: true
    minAvailable: 2

dex:
  pdb:
    enabled: true
    minAvailable: 1

notifications:
  pdb:
    enabled: true
    minAvailable: 1
  secret:
    create: false
  notifiers:
    service.github.whythatfunction: |
      appID: 2926172
      installationID: 111823929
      privateKey: $github-privateKey
    service.github.vymalo: |
      appID: 2926172
      installationID: 111824148
      privateKey: $github-privateKey
    service.github.stephane-segning: |
      appID: 2926172
      installationID: 111820839
      privateKey: $github-privateKey
    service.github.vaam-store: |
      appID: 2926172
      installationID: 111824144
      privateKey: $github-privateKey
    service.github.adorsys-gis: |
      appID: 2926172
      installationID: 112379420
      privateKey: $github-privateKey
    service.github.ndefokou: |
      appID: 2926172
      installationID: 115122720
      privateKey: $github-privateKey
    service.github.cratestack: |
      appID: 2926172
      installationID: 134478086
      privateKey: $github-privateKey

  templates:
    template.app-deployed: |
      message: |
        Application {{.app.metadata.name}} is synced and healthy.
      github:
        # `repoURLPath` and `revisionPath` are Go template
        # expressions evaluated against `.app`. They have to return
        # *strings*; an unquoted YAML token would be parsed as a
        # path. Both knobs below resolve to literals via the
        # `{{ "string" }}` template form — the dynamic alternatives
        # are wrong for this Application'a shape:
        #
        #   * `.app.spec.source.repoURL` is the OCI Helm registry
        #     (`ghcr.io/stephane-segning/charts`), not a GitHub repo
        #     — the GitHub service would 404 trying to POST a
        #     Deployment there.
        #   * `.app.status.operationState.syncResult.revision` is
        #     the chart's OCI digest (`sha256:...`), which GitHub's
        #     Deployments API rejects as `ref`. The clean way to
        #     anchor per-commit would be to surface the chart's
        #     `AppVersion` (the short SHA) in `app.status`, but
        #     ArgoCD doesn't expose it there; resolving it would
        #     require a webhook listener.
        #
        # Anchoring at `main` accepts that the Deployment points
        # at "head of main at sync time" rather than a specific
        # commit. For per-app URL + Environment surfacing — what
        # the GitHub UI cares about — that's enough.
        # The repo the GitHub service POSTs Deployments to. **Must
        # be a repo your App is installed on with `Deployments: write`**
        # — if the App can't reach this URL the controller logs
        # 403/404 and no Deployment is created. For consumers
        # tracking the upstream project directly, this is
        # `https://github.com/stephane-segning/opfs-webauthn`; for
        # forks, point at your fork.
        repoURLPath: '{{ "https://github.com/stephane-segning/opfs-webauthn" }}'
        revisionPath: '{{ "main" }}'
        deployment:
          # The Environment shown in the GitHub UI. Per-app, so
          # opfs-web and opfs-share-backend get separate entries.
          environment: '{{.app.metadata.name}}'
          # Pulled from the per-Application annotation set by the
          # patch files.
          environmentURL: '{{index .app.metadata.annotations "opfs.vaam.store/url"}}'
          # Link back into the ArgoCD UI for this Application.
          logURL: '{{.context.argocdUrl}}/applications/{{.app.metadata.name}}'
          # `success` for healthy syncs; the failed-template flips
          # this to `failure` (see below).
          state: success
          # `requiredContexts: []` disables GitHub's branch-protection
          # gate so the Deployment is recorded immediately.
          requiredContexts: []
          autoMerge: false
          # Set true if you want previews / per-PR environments —
          # GitHub auto-removes the Environment when the underlying
          # ref is deleted.
          transientEnvironment: false

    # `app-deployed-failed` posts state=failure when sync errored or
    # the app is reporting Degraded/Missing. Same surface, different
    # status string.
    template.app-deployed-failed: |
      message: |
        Application {{.app.metadata.name}} sync failed or app is unhealthy.
      github:
        # The repo the GitHub service POSTs Deployments to. **Must
        # be a repo your App is installed on with `Deployments: write`**
        # — if the App can't reach this URL the controller logs
        # 403/404 and no Deployment is created. For consumers
        # tracking the upstream project directly, this is
        # `https://github.com/stephane-segning/opfs-webauthn`; for
        # forks, point at your fork.
        repoURLPath: '{{ "https://github.com/stephane-segning/opfs-webauthn" }}'
        revisionPath: '{{ "main" }}'
        deployment:
          environment: '{{.app.metadata.name}}'
          environmentURL: '{{index .app.metadata.annotations "opfs.vaam.store/url"}}'
          logURL: '{{.context.argocdUrl}}/applications/{{.app.metadata.name}}'
          state: failure
          requiredContexts: []
          autoMerge: false
          transientEnvironment: false

    # ─── Triggers ──────────────────────────────────────────────────
    # `oncePer: app.status.sync.revision` makes sure we don't spam
    # GitHub with one Deployment per reconcile — only one per commit.
    #
    # Guard `operationState` explicitly: ArgoCD's
    # `app.status.operationState` is unset on fresh Applications
    # before the first sync (and during certain reconcile gaps).
    # A direct dereference would throw an expression-eval error
    # and the trigger would silently fail to fire for that cycle.
    # Keeping the nil check separate also avoids controller-version
    # differences in optional-chaining behavior.
    trigger.on-deployed: |
      - description: Application is synced and healthy. Once per commit.
        oncePer: app.status.sync.revision
        send: [app-deployed]
        when: app.status.operationState != nil
                and app.status.operationState.phase in ['Succeeded']
                and app.status?.health.status == 'Healthy'

    # No `oncePer` on failure — every fresh failure should re-stamp,
    # so the GitHub Environment doesn't lie about a transient red.
    trigger.on-deploy-failed: |
      - description: Sync failed or app went unhealthy.
        send: [app-deployed-failed]
        when: (app.status.operationState != nil
                and app.status.operationState.phase in ['Error', 'Failed'])
                or app.status?.health.status in ['Degraded', 'Missing']


commitServer:
  enabled: true

configs:
  secret:
    createSecret: true
  cm:
    url: https://argocd.ssegning.me

    exec.enabled: true

    # OIDC (OAuth2) configuration using the issuer behind your discovery endpoint
    oidc.config: |
      name: SSegning SSO
      issuer: https://auth.verif.fyi/realms/ssegning-internal
      clientID: argocd
      clientSecret: $oidc.keycloak.clientSecret
      cliClientID: argocd-cli
      enablePKCEAuthentication: true
      requestedScopes:
        - openid
        - profile
        - email
        - argocd_groups

    "resource.exclusions": |
      [ ]

  rbac:
    "policy.csv": |
      # --- Group-to-role mappings (from OIDC groups) ---
      g, ArgoCDAdmin, role:admin
      g, ArgoCDHyperswitch, role:hyperswitch
      g, ArgoCDAI, role:ai
      g, ArgoCDMboko, role:mboko
      g, ArgoCDKYC, role:kyc
      g, ArgoCDKeycloak, role:keycloak
      g, ArgoCDViewer, role:readonly

      # --- Hyperswitch role ---
      # hyperswitch project: read/write
      p, role:hyperswitch, projects, get, hyperswitch, allow
      p, role:hyperswitch, applications, get, hyperswitch/*, allow
      p, role:hyperswitch, applications, create, hyperswitch/*, allow
      p, role:hyperswitch, applications, update, hyperswitch/*, allow
      p, role:hyperswitch, applications, delete, hyperswitch/*, allow
      p, role:hyperswitch, applications, sync, hyperswitch/*, allow
      p, role:hyperswitch, applications, override, hyperswitch/*, allow
      p, role:hyperswitch, logs, get, hyperswitch/*, allow
      p, role:hyperswitch, exec, create, hyperswitch/*, allow

      # hyperswitch-base project: read-only
      p, role:hyperswitch, projects, get, hyperswitch-base, allow
      p, role:hyperswitch, applications, get, hyperswitch-base/*, allow
      p, role:hyperswitch, logs, get, hyperswitch-base/*, allow

      # --- AI role ---
      # ai project: read/write
      p, role:ai, projects, get, ai, allow
      p, role:ai, applications, get, ai/*, allow
      p, role:ai, applications, create, ai/*, allow
      p, role:ai, applications, update, ai/*, allow
      p, role:ai, applications, delete, ai/*, allow
      p, role:ai, applications, sync, ai/*, allow
      p, role:ai, applications, override, ai/*, allow
      p, role:ai, logs, get, ai/*, allow
      p, role:ai, exec, create, ai/*, allow

      # --- mboko role ---
      # mboko project: read/write
      p, role:mboko, projects, get, mboko, allow
      p, role:mboko, applications, get, mboko/*, allow
      p, role:mboko, applications, create, mboko/*, allow
      p, role:mboko, applications, update, mboko/*, allow
      p, role:mboko, applications, delete, mboko/*, allow
      p, role:mboko, applications, sync, mboko/*, allow
      p, role:mboko, applications, override, mboko/*, allow
      p, role:mboko, logs, get, mboko/*, allow
      p, role:mboko, exec, create, mboko/*, allow

      # --- kyc role ---
      # kyc project: read/write
      p, role:kyc, projects, get, kyc, allow
      p, role:kyc, applications, get, kyc/*, allow
      p, role:kyc, applications, create, kyc/*, allow
      p, role:kyc, applications, update, kyc/*, allow
      p, role:kyc, applications, delete, kyc/*, allow
      p, role:kyc, applications, sync, kyc/*, allow
      p, role:kyc, applications, override, kyc/*, allow
      p, role:kyc, logs, get, kyc/*, allow
      p, role:kyc, exec, create, kyc/*, allow

      # --- keycloak role ---
      # keycloak project: read/write
      p, role:keycloak, projects, get, keycloak, allow
      p, role:keycloak, applications, get, keycloak/*, allow
      p, role:keycloak, applications, create, keycloak/*, allow
      p, role:keycloak, applications, update, keycloak/*, allow
      p, role:keycloak, applications, delete, keycloak/*, allow
      p, role:keycloak, applications, sync, keycloak/*, allow
      p, role:keycloak, applications, override, keycloak/*, allow
      p, role:keycloak, logs, get, keycloak/*, allow
      p, role:keycloak, exec, create, keycloak/*, allow
