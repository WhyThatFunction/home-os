applications:
  - name: mail
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    sources:
      - repoURL: https://bokysan.github.io/docker-postfix
        targetRevision: 5.1.0
        chart: mail
        helm:
          valuesObject:
            existingSecret: mail-config
            config:
              general:
                TZ: "Europe/Berlin"
                ANONYMIZE_EMAILS: "smart"
            persistence:
              enabled: true
      - repoURL: https://bjw-s-labs.github.io/helm-charts
        targetRevision: 4.6.2
        chart: app-template
        helm:
          valuesObject:
            rawResources:
              mail-secret:
                enabled: true
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                spec:
                  spec:
                    refreshInterval: 1h0m0s
                    secretStoreRef:
                      name: ssegning-aws
                      kind: ClusterSecretStore
                    target:
                      name: mail-config
                      creationPolicy: Owner
                    data:
                      - secretKey: ALLOWED_SENDER_DOMAINS
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: allowed_sender_domains
                      - secretKey: RELAYHOST
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: relayhost
                      - secretKey: RELAYHOST_PASSWORD
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: relayhost_password
                      - secretKey: RELAYHOST_USERNAME
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: relayhost_username
                      - secretKey: SMTPD_SASL_USERS
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: smtpd_sasl_users

    destination:
      name: home-remote
      namespace: mail-system
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: local-mail
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    sources:
      - repoURL: https://bokysan.github.io/docker-postfix
        targetRevision: 5.1.0
        chart: mail
        helm:
          releaseName: mail
          valuesObject:
            existingSecret: mail-config
            config:
              general:
                TZ: "Europe/Berlin"
                ANONYMIZE_EMAILS: "smart"
            persistence:
              enabled: true
      - repoURL: https://bjw-s-labs.github.io/helm-charts
        targetRevision: 4.6.2
        chart: app-template
        helm:
          valuesObject:
            rawResources:
              mail-secret:
                enabled: true
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                spec:
                  spec:
                    refreshInterval: 1h0m0s
                    secretStoreRef:
                      name: ssegning-aws
                      kind: ClusterSecretStore
                    target:
                      name: mail-config
                      creationPolicy: Owner
                    data:
                      - secretKey: ALLOWED_SENDER_DOMAINS
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: allowed_sender_domains
                      - secretKey: RELAYHOST
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: relayhost
                      - secretKey: RELAYHOST_PASSWORD
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: relayhost_password
                      - secretKey: RELAYHOST_USERNAME
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: relayhost_username
                      - secretKey: SMTPD_SASL_USERS
                        remoteRef:
                          key: "prod/meta/test-app"
                          property: smtpd_sasl_users

    destination:
      server: https://kubernetes.default.svc
      namespace: mail-system
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

  - name: apprise
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: infrastructure
    sources:
      - repoURL: https://bjw-s-labs.github.io/helm-charts
        targetRevision: 4.6.2
        chart: app-template
        helm:
          releaseName: apprise
          valuesObject:
            controllers:
              apprise:
                strategy: RollingUpdate
                containers:
                  app:
                    image:
                      repository: caronc/apprise
                      tag: latest
                    env:
                      # gunicorn's default worker count scales with the node's
                      # CPU count ((2*cores)+1), and each apprise worker loads
                      # the full plugin set (~100Mi) — on a many-core node that
                      # OOMKilled the pod. This is a low-volume transactional
                      # gateway, so pin a small fixed count.
                      APPRISE_WORKER_COUNT: "2"
                      #LOG_LEVEL: "DEBUG"
                    probes:
                      liveness:
                        enabled: true
                        custom: true
                        spec:
                          tcpSocket: { port: 8000 }
                          initialDelaySeconds: 10
                          periodSeconds: 20
                      readiness:
                        enabled: true
                        custom: true
                        spec:
                          tcpSocket: { port: 8000 }
                          initialDelaySeconds: 5
                          periodSeconds: 10
                      startup:
                        enabled: false
                    resources:
                      requests:
                        cpu: 10m
                        memory: 128Mi
                      limits:
                        # 2 workers × ~100Mi + master, with headroom.
                        memory: 384Mi
            service:
              app:
                controller: apprise
                ports:
                  http:
                    port: 8000
            # TODO: NetworkPolicy disabled while Cilium's Envoy DNS proxy
            # (enable-envoy-config=true) is not yet enabled on the cluster.
            # Without it, CiliumNetworkPolicy toFQDNs can't learn resolved IPs
            # and egress to graph.facebook.com silently hangs — the standard
            # NetworkPolicy, combined with a broken CiliumNetworkPolicy, ends
            # up blocking all external HTTPS egress.
            # Re-enable once enable-envoy-config is added to the cilium-install
            # command in cluster/controlplane.yaml (kube-proxy-replacement
            # alone is not sufficient).
    destination:
      server: https://kubernetes.default.svc
      namespace: notification-system
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
      automated:
        prune: true
        selfHeal: true

